        // --- 2. REST NETWORK HARVESTER CONSOLE ---
        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) { return fallbackMockData; }
        }

        async function initializeSecurityGatekeeper() {
            try {
                dbStaff = await fetchNativeTable('staff', [
                    { id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'CPS2026', base_salary: 150000, status: 'Active', lat: 24.5854, lng: 73.7125, time: '10:00 AM' },
                    { id: 's_eng1', name: 'Hitesh Jain', role: 'Engineer', pass: 'site123', base_salary: 45000, status: 'Active', lat: 24.1234, lng: 73.5678, time: '09:15 AM' }
                ]);
                dbProjects = await fetchNativeTable('projects', [
                    { id: "1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur", contract_value: 4500000, lat: 24.5854, lng: 73.7125 },

                ]);
                dbGodowns = await fetchNativeTable('godowns', [{ id: "1", name: "Udaipur Central Godown", location: "Udaipur" }]);

                dbFinancials = await fetchNativeTable('financials', []);
                dbMachinery = await fetchNativeTable('machinery', []);
                dbTenders = await fetchNativeTable('tenders', []);
            } catch (e) { console.error("Sync barrier cleared."); }
            renderERP();
        }

        // --- 3. HARDWARE SIDEBAR INTERFACE ---
        function renderERP() {

                            <nav class="p-3 space-y-0.5">

                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Executive Dashboard</button>
                                <button onclick="switchTab('geo-viewer')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'geo-viewer' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🗺️ Geospatial Viewer</button>

            }
            else if (currentTab === "measurements") {
                container.innerHTML = `<div class="space-y-4"><div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3></div><div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div></div>`;

        // --- 5. NATIVE STAFF TRACKING MAP MATRIX RADAR ENGINE ---
        function renderLeafletRadarLayer() {
            const container = document.getElementById('vantage-staff-map'); if (!container) return;
            
            // Initial map coordinates centered over corporate headquarters grid
            liveMapPointer = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(liveMapPointer);

            // Fetch staff logs array coordinates and create live tracking anchors pins
            dbStaff.forEach(person => {
                const lat = Number(person.lat); const lng = Number(person.lng);

                if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
                    const marker = L.marker([lat, lng]).addTo(liveMapPointer);
                    const trackingContent = `
                        <div class="space-y-1 font-sans">
                            <p class="text-emerald-400 font-bold text-xs uppercase border-b border-borderGray pb-1">📡 ON-DUTY: ${person.name}</p>
                            <p class="text-gray-300"><b>Role:</b> ${person.role}</p>
                            <p class="text-gray-400"><b>Punch-In Time:</b> ${person.time || person.last_punch || '09:00 AM'}</p>
                            <p class="text-[10px] text-gray-500 font-mono">GPS Vector: ${lat.toFixed(4)}, ${lng.toFixed(4)}</p>
                        </div>
                    `;
                    marker.bindPopup(trackingContent);
                }
            });
        }

        function focusRadarPointer(lat, lng) { if (liveMapPointer) { liveMapPointer.setView([lat, lng], 13, { animate: true }); } }

        // --- 6. EXCEL MATRIX METHODS ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `<tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        async function executeProjectSubmit(e) { e.preventDefault(); const payload = [{ name: document.getElementById('p-name').value, client: document.getElementById('p-client').value, location: document.getElementById('p-loc').value, lat: Number(document.getElementById('p-lat').value), lng: Number(document.getElementById('p-lng').value), contract_value: Number(document.getElementById('p-val').value) }]; await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('p-mod'); initializeSecurityGatekeeper(); }
        function triggerProjectEdit(id, name, client, loc, val, lat, lng) { document.getElementById('edit-p-id').value = id; document.getElementById('edit-p-name').value = name; document.getElementById('edit-p-client').value = client; document.getElementById('edit-p-loc').value = loc; document.getElementById('edit-p-val').value = val; document.getElementById('edit-p-lat').value = lat; document.getElementById('edit-p-lng').value = lng; openModal('p-edit-mod'); }
        async function executeProjectModifySubmit(e) { e.preventDefault(); const id = document.getElementById('edit-p-id').value; const payload = { name: document.getElementById('edit-p-name').value, client: document.getElementById('edit-p-client').value, location: document.getElementById('edit-p-loc').value, lat: Number(document.getElementById('edit-p-lat').value), lng: Number(document.getElementById('edit-p-lng').value), contract_value: Number(document.getElementById('edit-p-val').value) }; await fetch(`${SUPABASE_REST_URL}/projects?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('p-edit-mod'); alert("Project changes frozen!"); initializeSecurityGatekeeper(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Bootstrap Core
        initializeSecurityGatekeeper();
    </script>
</body>
</html>
