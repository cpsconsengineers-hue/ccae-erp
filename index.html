<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. RUNTIME STATE SYNC CORE ---
        const currentMatrixVersion = "vantage_v9_excel_mbook";
        if (localStorage.getItem('vantage_matrix_version') !== currentMatrixVersion) {
            localStorage.clear();
            localStorage.setItem('vantage_matrix_version', currentMatrixVersion);
        }

        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); 
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_site_photos')) localStorage.setItem('vantage_site_photos', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        let currentTab = "measurements"; // Direct navigation override to M-Book tab for testing
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        // Active volatile matrix for multi-row data entry
        let activeExcelRows = [
            { chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', result: 187.5 }
        ];

        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>
                                <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                            </div>
                            <form id="setup-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Identity Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="Manoj Singh Rao"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim(); const pass = document.getElementById('setup-pass').value.trim();
                    if(pass !== document.getElementById('setup-confirm').value.trim()) { alert("Error: Keys mismatch."); return; }
                    localStorage.setItem('vantage_staff', JSON.stringify([{ id: 's_master', name, role: 'Master Admin', pass, baseSalary: 120000, status: 'Active', allottedWork: 'All Site Nodes' }]));
                    alert("Success: Credentials stored safely."); renderERP();
                });
                return;
            }

            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = JSON.parse(localStorage.getItem('vantage_staff')).find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP(); }
                    else { alert("Verification Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Core Grid</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Lifecycle</button>
                                ${isAdmin ? `<button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff & Payroll Matrix</button>` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Logout Node</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }

        // --- 5. EXCEL SPREADSHEET ENGINE MODULE ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [];
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];

            if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-panelBg border border-borderGray rounded-xl p-5 shadow-xl space-y-4">
                            <div class="flex justify-between items-center border-b border-borderGray pb-3">
                                <div>
                                    <h3 class="text-base font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3>
                                    <p class="text-gray-400 text-[11px] mt-0.5">Calculates Chainage Length, Cumulative Average Width, and Volume ($m^3$) or Area ($m^2$) Automatically</p>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="addExcelRow()" class="bg-gray-800 border border-borderGray hover:bg-gray-700 text-white font-bold px-3 py-1.5 rounded">+ Insert Row Line</button>
                                    <button onclick="saveExcelToDatabase()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded shadow-lg">💾 Save Sheet Batch</button>
                                </div>
                            </div>

                            <div class="max-w-xs">
                                <label class="block text-gray-400 font-bold mb-1">Target Infrastructure Node Project</label>
                                <select id="sheet-project-node" class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-semibold focus:border-blue-500 focus:outline-none">
                                    ${dbProjects.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                                </select>
                            </div>

                            <div class="overflow-x-auto border border-borderGray rounded-xl bg-darkBg">
                                <table class="w-full text-left text-xs border-collapse">
                                    <thead>
                                        <tr class="bg-panelBg/80 border-b border-borderGray text-gray-400 font-bold text-center uppercase tracking-wider">
                                            <th class="p-3 border-r border-borderGray w-12">Seq</th>
                                            <th class="p-3 border-r border-borderGray">Chainage From</th>
                                            <th class="p-3 border-r border-borderGray">Chainage To</th>
                                            <th class="p-3 border-r border-borderGray w-24">Length (m)</th>
                                            <th class="p-3 border-r border-borderGray w-24">Width (m)</th>
                                            <th class="p-3 border-r border-borderGray w-32">Avg Width (m)</th>
                                            <th class="p-3 border-r border-borderGray w-24">Thickness (m)</th>
                                            <th class="p-3 border-r border-borderGray w-36">Calculation Formula</th>
                                            <th class="p-3 w-36 text-right text-blue-400">Total Yield Output</th>
                                        </tr>
                                    </thead>
                                    <tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono">
                                        </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden shadow-xl">
                            <div class="p-3 bg-darkBg/60 font-bold text-gray-400 uppercase tracking-wider border-b border-borderGray">Saved Measurement Batch Registry Logs</div>
                            <table class="w-full text-left text-xs"><tr class="bg-darkBg text-gray-400 font-bold border-b border-borderGray uppercase"><th class="p-3">Timestamp</th><th class="p-3">Project Site Node</th><th class="p-3 text-center">Chainage Span</th><th class="p-3 text-center">Avg Width Matrix</th><th class="p-3 text-center">Calculated Profile Type</th><th class="p-3 text-right text-blue-400">Yield Output Quantity</th></tr>
                            ${dbMeasurements.length === 0 ? `<tr><td colspan="6" class="p-6 text-center text-gray-500 font-bold">No saved logs detected in local system cluster memory.</td></tr>` : ''}
                            ${dbMeasurements.map(m=>`<tr class="border-b border-borderGray"><td class="p-3 text-gray-500 font-mono">${m.timestamp}</td><td class="p-3 font-semibold text-white font-sans">${m.project}</td><td class="p-3 text-center font-mono">${m.span}</td><td class="p-3 text-center font-mono text-gray-400">${m.avgWidth}m</td><td class="p-3 text-center font-sans"><span class="px-2 py-0.5 rounded font-bold ${m.type==='Volume (m³)'?'bg-indigo-500/10 text-indigo-400':'bg-teal-500/10 text-teal-400'}">${m.type}</span></td><td class="p-3 text-right font-bold text-blue-400 font-mono">${m.yield}</td></tr>`).join('')}
                            </table>
                        </div>
                    </div>
                `;
                buildExcelRowsMatrixHTML();
            } else {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-500 font-bold uppercase">[ Panel Area '${currentTab}' Active ]</div>`;
            }
        }

        // --- 6. REALTIME MATHEMATICAL COMPILER SPREADSHEET MATRIX LOGIC ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body');
            if(!body) return;

            body.innerHTML = activeExcelRows.map((row, index) => {
                // 1. Process Chainage Extraction & Span Math
                let derivedLength = 0;
                const cFrom = parseChainageNumericString(row.chainageFrom);
                const cTo = parseChainageNumericString(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) {
                    derivedLength = Math.abs(cTo - cFrom);
                }

                // 2. Cumulative Average Width Math Matrix Logic
                let avgWidth = Number(row.width || 0);
                if (index > 0) {
                    const prevWidth = Number(activeExcelRows[index - 1].width || 0);
                    avgWidth = (Number(row.width || 0) + prevWidth) / 2;
                }

                // 3. Automated Formulas Processing Kernel Engine
                let calculatedYield = 0;
                const thickness = row.thickness ? Number(row.thickness) : 0;

                if (row.formula === 'Multiply') {
                    // Standard structural math: Length x Avg Width x Thickness (Optional)
                    calculatedYield = thickness > 0 ? (derivedLength * avgWidth * thickness) : (derivedLength * avgWidth);
                } else if (row.formula === 'Sum') {
                    calculatedYield = derivedLength + avgWidth + (thickness > 0 ? thickness : 0);
                } else if (row.formula === 'Average') {
                    calculatedYield = (derivedLength + avgWidth + (thickness > 0 ? thickness : 0)) / (thickness > 0 ? 3 : 2);
                } else if (row.formula === 'Subtraction') {
                    calculatedYield = derivedLength - avgWidth;
                } else if (row.formula === 'Percentage') {
                    calculatedYield = (derivedLength * avgWidth) / 100;
                }

                // Update runtime data reference safely
                activeExcelRows[index].computedLength = derivedLength;
                activeExcelRows[index].computedAvgWidth = avgWidth;
                activeExcelRows[index].yieldResult = calculatedYield;

                const yieldLabel = thickness > 0 ? `${calculatedYield.toFixed(3)} m³` : `${calculatedYield.toFixed(2)} m²`;

                return `
                    <tr class="hover:bg-panelBg/30 transition-colors text-center">
                        <td class="p-2 border-r border-borderGray font-bold text-gray-500">${index + 1}</td>
                        <td class="p-1 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index}, 'chainageFrom', this.value)" value="${row.chainageFrom}" class="w-full bg-transparent px-2 py-1 text-center text-white focus:bg-panelBg focus:outline-none rounded"></td>
                        <td class="p-1 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index}, 'chainageTo', this.value)" value="${row.chainageTo}" class="w-full bg-transparent px-2 py-1 text-center text-white focus:bg-panelBg focus:outline-none rounded"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-300">${derivedLength} m</td>
                        <td class="p-1 border-r border-borderGray"><input type="number" step="any" oninput="updateExcelCell(${index}, 'width', this.value)" value="${row.width}" class="w-full bg-transparent px-2 py-1 text-center text-white focus:bg-panelBg focus:outline-none font-bold rounded"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgWidth.toFixed(3)} m</td>
                        <td class="p-1 border-r border-borderGray"><input type="number" step="any" oninput="updateExcelCell(${index}, 'thickness', this.value)" value="${row.thickness}" placeholder="[ Optional ]" class="w-full bg-transparent px-2 py-1 text-center text-white focus:bg-panelBg focus:outline-none text-emerald-400 font-bold rounded"></td>
                        <td class="p-1 border-r border-borderGray">
                            <select onchange="updateExcelCell(${index}, 'formula', this.value)" class="w-full bg-darkBg border border-borderGray rounded p-1 text-gray-300 font-sans text-[11px] font-semibold focus:outline-none">
                                <option value="Multiply" ${row.formula==='Multiply'?'selected':''}>✖️ Multiply (Standard)</option>
                                <option value="Sum" ${row.formula==='Sum'?'selected':''}>➕ Sum</option>
                                <option value="Average" ${row.formula==='Average'?'selected':''}>📊 Average</option>
                                <option value="Subtraction" ${row.formula==='Subtraction'?'selected':''}>➖ Subtraction</option>
                                <option value="Percentage" ${row.formula==='Percentage'?'selected':''}>📈 Percentage</option>
                            </select>
                        </td>
                        <td class="p-2 text-right font-extrabold text-blue-400 pr-4 text-sm">${yieldLabel}</td>
                    </tr>
                `;
            }).join('');
        }

        function updateExcelCell(idx, field, value) {
            activeExcelRows[idx][field] = value;
            buildExcelRowsMatrixHTML(); // Re-compile parameters output calculation grid in realtime
        }

        function addExcelRow() {
            // Fetch configuration bounds of last line entry row to automatically extrapolate chainage continuity data
            const lastRow = activeExcelRows[activeExcelRows.length - 1];
            const nextFrom = lastRow ? lastRow.chainageTo : '0/000';
            activeExcelRows.push({ chainageFrom: nextFrom, chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 });
            buildExcelRowsMatrixHTML();
        }

        function parseChainageNumericString(str) {
            if (!str) return NaN;
            // Clears structural slash strings ('0/025' -> '025' -> 25)
            const cleanStr = str.replace('/', '.'); 
            const parts = cleanStr.split('.');
            if(parts.length === 2) {
                return (Number(parts[0]) * 1000) + Number(parts[1]);
            }
            return Number(str);
        }

        function saveExcelToDatabase() {
            const project = document.getElementById('sheet-project-node').value;
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];

            activeExcelRows.forEach(row => {
                const typeLabel = row.thickness ? "Volume (m³)" : "Area (m²)";
                const yieldFormatted = row.thickness ? `${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²`;
                
                dbMeasurements.unshift({
                    id: 'm_' + Date.now() + Math.random(),
                    timestamp: new Date().toLocaleString(),
                    project: project,
                    span: `${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`,
                    avgWidth: row.computedAvgWidth.toFixed(3),
                    type: typeLabel,
                    yield: yieldFormatted
                });
            });

            localStorage.setItem('vantage_measurements', JSON.stringify(dbMeasurements));
            alert("Database Synced: Complete batch rows added safely into Project M-Book History records Matrix.");
            
            // Re-initialize spreadsheet back to blank kora status slate
            activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }];
            renderERP();
        }

        function openProjectModal() { switchTab('lifecycle'); }
        renderERP();
    </script>
</body>
</html>
