<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS Vantage - Final Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { background: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 text-xs">
    <div id="app-root" class="flex">
        <aside class="w-64 bg-[#111827] h-screen border-r border-[#1f2937] p-4 fixed">
            <h1 class="font-bold text-white mb-6">CPS CONSULTANTS</h1>
            <nav id="nav-container" class="space-y-1"></nav>
        </aside>
        <main class="ml-64 p-8 w-full" id="content-area">
            <h2 id="view-title" class="text-xl font-bold mb-4">DASHBOARD</h2>
            <div id="view-content">Select a module...</div>
        </main>
    </div>

    <script>
        const modules = [
            { id: 'inventory', label: '📦 Inventory Hub' },
            { id: 'inward', label: '📥 Material Inward' },
            { id: 'machinery', label: '⚙️ Machinery Fleet' },
            { id: 'attendance', label: '✅ Daily Attendance' },
            { id: 'ledger', label: '💰 Financial Ledger' },
            { id: 'petty-cash', label: '💸 Petty Cash' },
            { id: 'staff', label: '👥 Staff Management' }
        ];

        // Global Router (Freeze-Proof)
        window.loadModule = (id) => {
            document.getElementById('view-title').innerText = id.toUpperCase();
            const content = document.getElementById('view-content');
            
            // Buttons ko wapas active karne ke liye listeners
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            event.target.classList.add('nav-active');

            // Module Switcher
            switch(id) {
                case 'inventory': content.innerHTML = `<div class="p-4 bg-gray-900 rounded">Inventory Entry Logic Here...</div>`; break;
                case 'machinery': content.innerHTML = `<div class="p-4 bg-gray-900 rounded">Machinery Fleet Logic Here...</div>`; break;
                case 'attendance': content.innerHTML = `<div class="p-4 bg-gray-900 rounded">Attendance Geo-Lock Logic Here...</div>`; break;
                case 'ledger': content.innerHTML = `<div class="p-4 bg-gray-900 rounded">Financial Ledger Logic Here...</div>`; break;
                case 'staff': content.innerHTML = `<div class="p-4 bg-gray-900 rounded">Staff Management Logic Here...</div>`; break;
                default: content.innerHTML = "Module Active";
            }
        };

        // Render Sidebar
        const nav = document.getElementById('nav-container');
        nav.innerHTML = modules.map(m => 
            `<button onclick="loadModule('${m.id}')" class="nav-btn w-full text-left p-2 rounded hover:bg-gray-800">${m.label}</button>`
        ).join('');
    </script>
</body>
</html>
