<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-gray-200">
    <div id="app" class="flex">
        <aside class="w-64 bg-[#111827] h-screen p-4 border-r border-[#1f2937]" id="sidebar"></aside>
        <main class="p-8 w-full" id="content"></main>
    </div>

    <script>
        const userRole = JSON.parse(sessionStorage.getItem('vantage_user'))?.role || 'Staff';

        // Modules Definition
        const modules = [
            { id: 'attendance', label: '✅ Daily Attendance', secret: false },
            { id: 'measurements', label: '📐 Measurement Sheet', secret: false },
            { id: 'tenders', label: '📄 Tender Matrix Node', secret: false },
            { id: 'projects', label: '🏢 Lifecycle Projects', secret: false },
            { id: 'geo', label: '🌍 Geospatial View', secret: true },
            { id: 'tracking', label: '📍 Live Tracking', secret: true },
            { id: 'history', label: '📜 Telegraphy History', secret: true }
        ];

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = modules.map(m => {
                // Secret logic: Agar module secret hai aur user Admin nahi hai, toh return blank
                if (m.secret && userRole !== 'Master Admin') return '';
                return `<button onclick="load('${m.id}')" class="w-full text-left p-3 hover:bg-blue-600 rounded">${m.label}</button>`;
            }).join('');
        }

        function load(id) {
            document.getElementById('content').innerHTML = `<h2>${id.toUpperCase()} MODULE LOADED</h2>`;
        }

        renderSidebar();
    </script>
</body>
</html>
