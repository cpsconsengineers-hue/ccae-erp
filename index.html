<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. SUPABASE CLOUD CONNECTOR CONFIG MATRIX (100% PRE-SET LOCK) ---
        const SUPABASE_URL = "https://nshstymfggjffuhstghw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let dbProjects = []; let dbStaff = []; let dbAttendance = []; let dbMeasurements = [];
        let dbFinancials = []; let dbMaterials = []; let dbOdometer = []; let dbPhotos = [];
        let dbGodowns = []; let dbStockBook = []; let dbReturns = [];

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        // --- 2. UNIVERSAL CLOUD RECON DATA SYNC ENGINE ---
        async function syncSupabaseCloudAndRender() {
            if (!currentUser) { renderERP(); return; }
            try {
                const [proj, staff, att, meas, fin, mat, odo, photo, gd, st, ret] = await Promise.all([
                    supabase.from('projects').select('*'), supabase.from('staff').select('*'),
                    supabase.from('attendance').select('*').order('created_at', { ascending: false }),
                    supabase.from('measurements').select('*').order('created_at', { ascending: false }),
                    supabase.from('financials').select('*').order('created_at', { ascending: false }),
                    supabase.from('materials').select('*'), supabase.from('odometer').select('*'),
                    supabase.from('site_photos').select('*').order('created_at', { ascending: false }),
                    supabase.from('godowns').select('*'), supabase.from('stock_book').select('*'),
                    supabase.from('supplier_returns').select('*').order('created_at', { ascending: false })
                ]);

                dbProjects = proj.data || []; dbStaff = staff.data || []; dbAttendance = att.data || [];
                dbMeasurements = meas.data || []; dbFinancials = fin.data || []; dbMaterials = mat.data || [];
                dbOdometer = odo.data || []; dbPhotos = photo.data || []; dbGodowns = gd.data || [];
                dbStockBook = st.data || []; dbReturns = ret.data || [];

                renderERP();
            } catch (error) {
                console.error("Supabase Sync Interruption:", error);
            }
        }

        // --- 3. UI RENDERING FRAMEWORK MATRIX ---
        async function renderERP() {
            const root = document.getElementById('app-root');
            if (!currentUser) {
                const { data: adminCheck } = await supabase.from('staff').select('*').eq('role', 'Master Admin');
                if (!adminCheck || adminCheck.length === 0) {
                    root.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                            <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                                <div class="text-center mb-6">
                                    <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">Supabase Connected</span>
                                    <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                                </div>
                                <form id="setup-form" class="space-y-4 text-xs">
                                    <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Pass Key Code</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase transition-colors">Lock Cloud Credentials</button>
                                </form>
                            </div>
                        </div>
                    `;
                    document.getElementById('setup-form').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        const name = document.getElementById('setup-name').value.trim();
                        const pass = document.getElementById('setup-pass').value.trim();
                        await supabase.from('staff').insert([{ name, role: 'Master Admin', pass, base_salary: 150000, status: 'Active', allotted_work: 'All Site Nodes' }]);
                        alert("Cloud Master Lock Configured!"); location.reload();
                    });
                } else {
                    root.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                            <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                                <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Supabase Cloud Center</p></div>
                                <form id="login-form" class="space-y-4 text-xs">
                                    <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase">Authenticate App</button>
                                </form>
                            </div>
                        </div>
                    `;
                    document.getElementById('login-form').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        const name = document.getElementById('login-name').value.trim();
                        const pass = document.getElementById('login-pass').value.trim();
                        const { data: userLogin } = await supabase.from('staff').select('*').eq('name', name).eq('pass', pass);
                        if (userLogin && userLogin.length > 0) {
                            const user = userLogin[0];
                            if(user.status === 'Blocked' || user.status === 'Terminated') { alert("Access suspended."); return; }
                            currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); syncSupabaseCloudAndRender();
                        } else { alert("Cryptographic Mismatch."); }
                    });
                }
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-emerald-400 font-bold uppercase">⚡ SUPABASE DB ONLINE</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('site-photos')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'site-photos' ? 'bg-blue-600 text-white' : 'text-emerald-400 hover:bg-gray-800'}">📷 Site Photo Vault</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Nodes</button>
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED PRIVILEGES</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 LOGOUT CLOUD</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }

        // --- 4. DYNAMIC VIEW MODULE ROUTERS BLOCK ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Sites</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Nodes</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Warehouse Hubs</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Units</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">M-Book Batches</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbMeasurements.length} Logs</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Workforce Base</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbStaff.length} Accounts</h3></div>
                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-emerald-400 font-mono font-bold uppercase tracking-wider">⚡ POSTGRESQL HOSTED ENGINE OPERATIONAL: ALL FIELD PARAMETERS SYNCING GLOBALLY IN REALTIME.</div>
                `;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Infrastructure Cluster</h3>${isAdmin ? `<button onclick="openModal('p-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">+ Provision New Site</button>` : ''}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative overflow-hidden">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-2">${p.name}</h4>
                                    <p class="text-gray-400 text-[11px] pt-1">🏢 Client: ${p.client} | Valuation: <span class="text-green-400 font-mono">₹${Number(p.contract_value || 0).toLocaleString()}</span></p>
                                    <p class="text-gray-500 font-mono text-[10px]">📍 GPS: ${p.lat}, ${p.lng}</p>
                                    ${isAdmin ? `<div class="pt-2 mt-1 border-t border-borderGray/40"><button onclick="deleteProjectCloud('${p.id}')" class="bg-red-950/40 text-red-400 border border-red-900/60 px-3 py-1 rounded font-bold w-full">Purge Document</button></div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div id="p-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-3">
                            <h4 class="font-bold text-white">Deploy Project Parameter</h4>
                            <form id="p-form" class="space-y-2">
                                <input type="text" id="p-name" placeholder="Project Name" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="text" id="p-client" placeholder="Client Label" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="text" id="p-loc" placeholder="Physical Address" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="number" id="p-val" placeholder="Contract Valuation sum (₹)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono">
                                <div class="grid grid-cols-2 gap-2"><input type="number" step="any" id="p-lat" placeholder="Latitude" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="number" step="any" id="p-lng" placeholder="Longitude" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Commit Parameters</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('p-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();
                    await supabase.from('projects').insert([{
                        name: document.getElementById('p-name').value, client: document.getElementById('p-client').value,
                        location: document.getElementById('p-loc').value, contract_value: Number(document.getElementById('p-val').value),
                        lat: Number(document.getElementById('p-lat').value), lng: Number(document.getElementById('p-lng').value), status: 'Active'
                    }]);
                    closeModal('p-mod'); syncSupabaseCloudAndRender();
                });
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3><div class="flex space-x-2"><button onclick="addExcelRow()" class="bg-gray-800 border border-borderGray text-white font-bold px-3 py-1 rounded">+ Insert Row</button><button onclick="saveExcelToSupabase()" class="bg-blue-600 font-bold px-3 py-1 rounded">💾 Cloud Sync Sheet</button></div></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><label class="block text-gray-400 mb-1">Select Active Project</label><select id="sheet-project-node" class="bg-darkBg border border-borderGray p-2 rounded text-white w-48">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                        <div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold"><th>Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th>Formula</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold font-sans"><th class="p-3">Saved Cloud Logs</th><th class="p-3">Span Section</th><th class="p-3 text-right">Yield Quantity Output</th></tr>${dbMeasurements.map(m=>`<tr class="border-b border-borderGray font-mono"><td class="p-3 text-white font-sans font-bold">${m.project}</td><td class="p-3 text-center text-gray-400">${m.span}</td><td class="p-3 text-right text-blue-400 font-bold">${m.yield_output}</td></tr>`).join('')}</table></div>
                    </div>
                `;
                buildExcelRowsMatrixHTML();
            }

            else if (currentTab === "materials") {
                container.innerHTML = `

                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Storage & Godown Management Pipeline</h3><div class="flex space-x-2">${isAdmin?`<button onclick="openModal('g-mod')" class="bg-gray-800 px-3 py-1 rounded font-bold">+ Create Godown</button><button onclick="openModal('s-mod')" class="bg-emerald-950 text-emerald-400 px-3 py-1 rounded font-bold">+ Stock Inward</button>`:''}<button onclick="openModal('d-mod')" class="bg-blue-600 px-3 py-1 rounded font-bold">+ Dispatch to Site</button></div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 font-sans"><h4 class="text-gray-400 font-bold uppercase mb-2">Registered Godowns</h4><div class="space-y-1">${dbGodowns.map(g=>`<div class="bg-darkBg p-2 rounded border border-borderGray font-bold text-white">${g.name}</div>`).join('')}</div></div>
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 lg:col-span-2"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Warehouse</th><th class="p-2">Material</th><th class="p-2 text-right">Balance Stock</th></tr>${dbStockBook.map(s=>`<tr><td class="p-2 text-gray-400">${s.godown_name || s.godownName}</td><td class="p-2 text-white font-bold">${s.item}</td><td class="p-2 text-right text-blue-400 font-bold font-mono">${s.qty} ${s.unit}</td></tr>`).join('')}</table></div>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "financial") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">💰 Central Operational Financial Cloud Ledger</h3></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left border-collapse text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Date</th><th class="p-3">Stream</th><th class="p-3">Category</th><th class="p-3">Project Node</th><th class="p-3">Operator</th><th class="p-3 text-right">Transaction Amount</th></tr>
                        ${dbFinancials.map(f=>`
                            <tr class="border-b border-borderGray"><td class="p-3 font-mono text-gray-500">${f.date}</td><td class="p-3 font-bold">${f.stream}</td><td class="p-3 text-gray-300 font-medium">${f.category}</td><td class="p-3 text-gray-400">${f.project}</td><td class="p-3 text-gray-400 font-bold">${f.user}</td><td class="p-3 text-right font-bold font-mono text-gray-200">₹${f.amount.toLocaleString()}</td></tr>
                        `).join('')}</table></div>
                    </div>
                `;
            }

            else if (currentTab === "staff-mgmt") {
                if (!isAdmin) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Human Capital Assets Matrix</h3><button onclick="openModal('s-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold font-sans transition-colors">+ Provision Profile Node</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left text-xs"><tr class="bg-darkBg font-bold text-gray-400 border-b border-borderGray uppercase"><th class="p-3">Identity Name</th><th class="p-3">Designation Role</th><th class="p-3">Security Pass Key</th><th class="p-3">Allotted Work Node</th><th class="p-3 text-right">Base Salary</th><th class="p-3 text-center">Cloud Action</th></tr>
                        ${dbStaff.map(s=>{
                            return `<tr class="border-b border-borderGray font-medium"><td class="p-3 text-white font-bold">${s.name}</td><td class="p-3 text-gray-400">${s.role}</td><td class="p-3 font-mono text-gray-500">${s.pass}</td><td class="p-3 text-gray-400 truncate max-w-[120px]">${s.allotted_work || s.allottedWork}</td><td class="p-3 text-right font-mono">₹${s.base_salary || s.baseSalary}</td><td class="p-3 text-center"><button onclick="deleteStaffCloud('${s.id}')" class="bg-red-950/40 text-red-400 border border-red-900/60 px-2 py-0.5 rounded font-bold">Purge</button></td></tr>`;
                        }).join('')}</table></div>
                    </div>
                    <div id="s-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4"><h4 class="font-bold text-white text-sm border-b border-borderGray pb-1">Provision Profile Node</h4><form id="s-form" class="space-y-3"><input type="text" id="s-name" placeholder="Full Identity Name ID" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-medium"><select id="s-role" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><option value="Engineer">Civil Site Engineer</option><option value="Accountant">Accountant / surveyor node</option><option value="Supervisor">Site Supervisor</option></select><input type="text" id="s-pass" placeholder="Access Security Pass Key Code" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><select id="s-work" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select><input type="number" id="s-salary" placeholder="Salary Rate Metric Value" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Deploy Node</button></form></div>
                    </div>
                `;
                document.getElementById('s-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();
                    await supabase.from('staff').insert([{
                        name: document.getElementById('s-name').value.trim(), role: document.getElementById('s-role').value,
                        pass: document.getElementById('s-pass').value.trim(), allotted_work: document.getElementById('s-work').value,
                        base_salary: Number(document.getElementById('s-salary').value), status: 'Active'
                    }]);
                    closeModal('s-mod'); syncSupabaseCloudAndRender();
                });
            }
            else { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-600 uppercase tracking-widest">[ Cloud Active Component View Mode ]</div>`; }
        }

        // --- 5. HARDWARE CORE EXCEL MATRIX COMPILER ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `
                    <tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td>
                        <td class="p-1 border-r border-borderGray"><select class="bg-darkBg text-gray-300 font-sans focus:outline-none"><option value="Multiply">✖️ Multiply</option></select></td>
                        <td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        async function saveExcelToSupabase() {
            const project = document.getElementById('sheet-project-node').value;
            const insertRows = activeExcelRows.map(row => ({
                project,
                span: `${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`,
                avg_width: Number(row.computedAvgWidth.toFixed(3)),
                yield_output: row.thickness ? `${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²`
            }));
            await supabase.from('measurements').insert(insertRows);
            alert("Spreadsheet Batch Synced onto Cloud!");
            activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }];
            syncSupabaseCloudAndRender();
        }

        async function deleteProjectCloud(id) { if(confirm("Purge Node?")) { await supabase.from('projects').delete().eq('id', id); syncSupabaseCloudAndRender(); } }
        async function deleteStaffCloud(id) { if(confirm("Purge Profile?")) { await supabase.from('staff').delete().eq('id', id); syncSupabaseCloudAndRender(); } }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        syncSupabaseCloudAndRender();
    </script>
</body>
</html>
