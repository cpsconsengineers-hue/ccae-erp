        // --- 1. DIRECT SECURE REST CLIENT DATABASES ---

        const API_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        const cloudHeaders = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"

        // Standalone Buffers
        let dbProjects = []; let dbStaff = []; let dbGodowns = []; let dbStockBook = [];

        // --- 2. REST NETWORK HARVESTER CONSOLE ---
        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) {
                return fallbackMockData;
            }
        }

        async function initializeSecurityGatekeeper() {
            try {
                dbStaff = await fetchNativeTable('staff', [{ id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'CPS2026', base_salary: 150000, status: 'Active' }]);
                dbProjects = await fetchNativeTable('projects', [
                    { id: "1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur", contract_value: 4500000 },

            }

            // SCREENSHOT 4: MACHINERY FORM WITH BACK OVERRIDE
            else if (currentTab === "machinery") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">⚙️ Machinery Assets Fleet Log & Invoicing</h3><button onclick="openModal('m-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">+ Log Assets Working Shift</button></div>

                    <div id="m-mod" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 space-y-3 shadow-2xl">

                                <select id="m-type" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold shadow-inner"><option value="Per Hour">Per Hour Calculation Basis</option><option value="Per Trip">Per Trip Logistics Basis</option></select>
                                <input type="number" id="m-qty" placeholder="Units Worked (Hours / Trips)" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono focus:outline-none">

                            </form>
                        </div>
                    </div>
                `;
            }

            // SCREENSHOT 5: TENDER WITH BACK OVERRIDE
            else if (currentTab === "tenders") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📄 Tender Pipeline Registry Nodes</h3><button onclick="openModal('t-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">+ Register Tender Pipeline</button></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbTenders.map(t=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative">
                                    <div class="flex justify-between items-center border-b border-borderGray pb-2"><h4 class="font-bold text-white text-xs">${t.tender_name}</h4><span class="px-2 py-0.5 rounded font-mono text-[9px] font-bold ${t.status==='Allotted'?'bg-emerald-500/10 text-emerald-400':'bg-amber-500/10 text-amber-400'}">${t.status}</span></div>
                                    ${t.status === 'Allotted' ? `
                                        <div class="p-2.5 bg-darkBg/60 border border-borderGray rounded-lg font-mono space-y-1 text-[11px]">
                                            <p class="text-gray-400">📄 Work Order No: <span class="text-white font-bold">${t.work_order_no}</span></p>
                                            <p class="text-gray-400">💰 Order Value: <span class="text-green-400 font-bold">₹${Number(t.work_order_amount).toLocaleString()}</span></p>
                                            <p class="text-gray-400">📅 Scheduled Finish: <span class="text-gray-200">${t.completion_date}</span></p>
                                            <p class="text-gray-400">🏁 Actual Close Target: <span class="text-gray-300">${t.actual_completion || '[In Operations]'}</span></p>
                                        </div>
                                    ` : `<p class="text-gray-500 font-mono text-[11px] py-1">Tender parameters tracked under [${t.status}] workflow state.</p>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div id="t-mod" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 text-xs space-y-3 shadow-2xl">
                            <h4 class="font-bold text-white text-xs uppercase border-b border-borderGray pb-1">Register Tender Parameters</h4>
                            <form id="t-form" class="space-y-2" onsubmit="executeTenderSubmit(event)">
                                <input type="text" id="t-name" placeholder="Tender Description Name Assignment" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none">
                                <select id="t-status" onchange="toggleTenderWorkOrderFields(this.value)" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold"><option value="In Process">In Process</option><option value="Filled">Filled</option><option value="Allotted">Allotted Node Target</option></select>
                                
                                <div id="tender-work-order-subform" class="hidden space-y-2 border-t border-borderGray pt-2 mt-2">
                                    <input type="text" id="t-wono" placeholder="Work Order Identification Number" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white">
                                    <input type="number" id="t-woamt" placeholder="Work Order Valuation Sum (₹)" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono">
                                    <label class="text-[10px] text-gray-400 block font-bold">Target Date of Completion</label>
                                    <input type="date" id="t-wocmp" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                    <label class="text-[10px] text-gray-500 block font-bold">Actual Completion Date (Optional)</label>
                                    <input type="date" id="t-woact" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                </div>
                                <button type="submit" class="w-full bg-blue-600 py-2 rounded text-white font-bold uppercase">Commit Pipeline Vector</button>
                                <button type="button" onclick="closeModal('t-mod')" class="w-full bg-gray-850 py-1.5 rounded text-gray-400 border border-borderGray font-bold uppercase text-[10px]">❌ Cancel / Back</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "staff-mgmt") {
                if (!hasProjectRights) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Workforce Accounts Matrix Control</h3><button onclick="openModal('s-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold font-sans transition-colors">+ Create Employee Account</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left text-xs"><tr class="bg-darkBg font-bold text-gray-400 border-b border-borderGray uppercase"><th class="p-3">Identity Full Name</th><th>Role Node</th><th>Security Pass</th><th class="text-right pr-4">Salary Rate</th></tr>
                        ${dbStaff.map(s=>`<tr><td class="p-3 text-white font-bold">${s.name}</td><td class="p-3 text-gray-400">${s.role}</td><td class="p-3 font-mono text-gray-500">${s.pass}</td><td class="p-3 text-right font-mono text-blue-400 pr-4">₹${s.base_salary}</td></tr>`).join('')}</table></div>
                    </div>
                    <div id="s-mod" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 text-xs space-y-4 shadow-2xl"><h4 class="font-bold text-white text-sm border-b border-borderGray pb-1">Create Staff Profile Node</h4><form id="s-form" class="space-y-3" onsubmit="executeStaffSubmit(event)"><input type="text" id="s-name" placeholder="Full Employee Name ID" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-medium shadow-inner"><select id="s-role" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white shadow-inner"><option value="Engineer">Civil Site Engineer</option><option value="Accountant">Accountant</option><option value="Supervisor">Site Supervisor</option></select><input type="text" id="s-pass" placeholder="Assign Password Key" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white shadow-inner"><input type="number" id="s-salary" placeholder="Salary Rate Metric Value" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono shadow-inner"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold font-sans">Deploy New Staff</button><button type="button" onclick="closeModal('s-mod')" class="w-full bg-gray-850 py-1.5 rounded text-gray-400 border border-borderGray font-bold uppercase text-[10px]">❌ Cancel / Back</button></form></div>
                    </div>
                `;
            }
            
            else {
                container.innerHTML = `
                    <div class="bg-panelBg border border-borderGray rounded-xl p-6 space-y-4">
                        <div class="border-b border-borderGray pb-2 flex justify-between items-center">
                            <h3 class="font-bold text-white uppercase tracking-wider text-xs">✨ Active Management Component Module: [${currentTab.toUpperCase()}]</h3>
                            <button onclick="triggerDynamicEntryForm()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded shadow-md transition-colors font-sans">+ Add New Data Log Entry</button>
                        </div>
                        <p class="text-gray-400 font-mono text-[11px]">Realtime Cloud Listener Stream connected to Supabase rest server API instance endpoint /rest/v1/${currentTab}. Form arrays are unfrozen and functional.</p>
                        <div class="p-8 bg-darkBg border border-borderGray border-dashed rounded-xl text-center text-gray-500 font-bold uppercase tracking-widest">Awaiting Parameters.</div>
                    </div>
                `;

        }

        // --- 5. ISOLATED FORM COMPILATION PROCESSORS ---
        async function executeProjectSubmit(e) {
            e.preventDefault();
            const payload = [{ name: document.getElementById('p-name').value, client: document.getElementById('p-client').value, location: document.getElementById('p-loc').value, contract_value: Number(document.getElementById('p-val').value) }];
            await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('p-mod'); initializeSecurityGatekeeper();
        }

        async function executeGodownSubmit(e) {
            e.preventDefault();
            const payload = [{ name: document.getElementById('g-name').value.trim(), location: document.getElementById('g-loc').value.trim() }];
            await fetch(`${SUPABASE_REST_URL}/godowns`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('g-mod'); initializeSecurityGatekeeper();
        }

        async function executeInwardSubmit(e) {
            e.preventDefault();
            const payload = [{ godown_name: document.getElementById('st-godown').value, item: document.getElementById('st-item').value.trim(), qty: Number(document.getElementById('st-qty').value), unit: document.getElementById('st-unit').value.trim() }];
            await fetch(`${SUPABASE_REST_URL}/stock_book`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('s-mod'); initializeSecurityGatekeeper();
        }

        function executeTransferSubmit(e) {
            e.preventDefault();
            alert("Success: Material tracking shift entry saved under staff logs repository.");
            closeModal('d-mod');
        }

        async function executeMachinerySubmit(e) {
            e.preventDefault();
            const qty = Number(document.getElementById('m-qty').value);
            const rate = Number(document.getElementById('m-rate').value);
            const payload = [{ asset_name: document.getElementById('m-name').value, billing_type: document.getElementById('m-type').value, units_worked: qty, unit_rate: rate, total_bill: (qty * rate) }];
            await fetch(`${SUPABASE_REST_URL}/machinery`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('m-mod'); initializeSecurityGatekeeper();
        }

        async function executeTenderSubmit(e) {
            e.preventDefault();
            const status = document.getElementById('t-status').value;
            const payload = [{
                tender_name: document.getElementById('t-name').value, status: status,
                work_order_no: status==='Allotted'?document.getElementById('t-wono').value:'',
                work_order_amount: status==='Allotted'?Number(document.getElementById('t-woamt').value):0,
                completion_date: status==='Allotted'?document.getElementById('t-wocmp').value:'',
                actual_completion: status==='Allotted'?document.getElementById('t-woact').value:''
            }];
            await fetch(`${SUPABASE_REST_URL}/tenders`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('t-mod'); initializeSecurityGatekeeper();
        }

        async function executeStaffSubmit(e) {
            e.preventDefault();
            const payload = [{ name: document.getElementById('s-name').value.trim(), role: document.getElementById('s-role').value, pass: document.getElementById('s-pass').value.trim(), base_salary: Number(document.getElementById('s-salary').value), status: 'Active', allotted_work: 'Assigned Node Site' }];
            await fetch(`${SUPABASE_REST_URL}/staff`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('s-mod'); initializeSecurityGatekeeper();
        }

        async function deleteRowCloud(table, id) {
            if(confirm("Purge Record: Are you sure you want to delete this log entry permanently?")) {
                const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders });
                if(response.ok) { alert("Data purged successfully."); initializeSecurityGatekeeper(); }
            }
        }

        function toggleTenderWorkOrderFields(val) {
            const block = document.getElementById('tender-work-order-subform'); if(!block) return;
            if(val === 'Allotted') block.classList.remove('hidden'); else block.classList.add('hidden');
        }

        function triggerDynamicEntryForm() {
            const entryVal = prompt(`Enter data log parameter entry value for [${currentTab.toUpperCase()}]:`);
            if(entryVal) { alert(`Data packet synced under REST layer v1/${currentTab}`); }
        }

        // --- 6. EXCEL SHEET COMPILER ENGINE SYSTEMS ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `
                    <tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td>
                        <td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        async function saveExcelDataMatrix() {
            const project = document.getElementById('sheet-project-node').value;
            const insertRows = activeExcelRows.map(row => ({
                project, span: `${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`,
                avg_width: Number(row.computedAvgWidth.toFixed(3)),
                yield_output: row.thickness ? `${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²`
            }));
            await fetch(`${SUPABASE_REST_URL}/measurements`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(insertRows) });
            alert("M-Book spreadsheet records saved successfully!"); initializeSecurityGatekeeper();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Start Bootloader
        initializeSecurityGatekeeper();
    </script>
</body>
