<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS ERP | OPERATIONAL CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen font-sans">

    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 flex flex-col">
        <h1 class="text-blue-500 font-bold mb-6 text-lg">CPS COMMAND CENTER</h1>
        <div id="nav-menu" class="space-y-2 flex-grow overflow-y-auto"></div>
        
        <div class="mt-4 pt-4 border-t border-gray-800">
            <p class="text-xs text-gray-400 mb-1">Logged in as:</p>
            <p id="user-profile" class="text-sm font-bold text-blue-400 mb-3 uppercase">Master Admin</p>
            <button onclick="logout()" class="w-full bg-red-900/30 text-red-500 text-xs py-2 rounded border border-red-900 hover:bg-red-900 transition">TERMINATE SESSION</button>
            <div class="mt-4 text-[10px] text-gray-500">SYSTEM STATUS: <span class="text-green-500">HEALTHY</span></div>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div id="workspace-content">
            <h2 id="workspace-title" class="text-2xl font-bold mb-6">Select a Module</h2>
            <div id="op-widgets" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10"></div>
            <h2 id="admin-title" class="text-sm uppercase text-red-500 mb-4 tracking-widest">Restricted Modules</h2>
            <div id="admin-widgets" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <script>
        const modules = [
            { name: 'Live Projects', type: 'op' }, { name: 'Site Photos', type: 'op' }, 
            { name: 'Inventory Hub', type: 'op' }, { name: 'Attendance', type: 'op' },
            { name: 'Measurement', type: 'op' }, { name: 'Machinery', type: 'op' },
            { name: 'Subcontractors', type: 'op' }, { name: 'Executive Dashboard', type: 'op' },
            { name: 'Financial Ledger', type: 'admin' }, { name: 'Live Tracking', type: 'admin' },
            { name: 'Billing Section', type: 'admin' }, { name: 'Petty Cash', type: 'admin' },
            { name: 'Tenders Matrix', type: 'admin' }, { name: 'Telemetry', type: 'admin' },
            { name: 'Staff Identity', type: 'admin' }
        ];

        function loadModule(name) {
            document.getElementById('workspace-title').innerText = name + " WORKSPACE";
            document.getElementById('op-widgets').innerHTML = `<p class="text-gray-500">Workspace for ${name} is now loaded. Database connection active...</p>`;
            document.getElementById('admin-widgets').innerHTML = '';
        }

        function logout() {
            alert("Terminating session...");
            location.reload();
        }

        function initApp() {
            const navMenu = document.getElementById('nav-menu');
            modules.forEach(m => {
                navMenu.innerHTML += `<button onclick="loadModule('${m.name}')" class="w-full text-left p-2 text-sm hover:bg-gray-800 rounded transition">${m.name}</button>`;
            });
            // Dashboard render logic here... (jaise pehle tha)
        }
        initApp();
    </script>
</body>
</html>
