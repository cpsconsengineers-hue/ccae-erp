<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center bg-darkBg" id="sync-loader">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-gray-400 font-mono tracking-widest uppercase text-[10px]">SYNCING WITH VANTAGE CLOUD LEDGER...</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE NETWORK CREDENTIALS ---
        const SUPABASE_URL = "https://nshstymfggjffuhstghw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        let supabase = null;
        let isUsingFallback = false;
        let networkErrorsLog = [];

        // Safe Initialization
        try {
            const clientCreator = window.supabase?.createClient || window.supabaseJs?.createClient;
            if (typeof clientCreator === 'function') {
                supabase = clientCreator(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (e) {
            console.error("Initialization library mismatch:", e);
            networkErrorsLog.push("Lib Load Fail");
        }

        // Global Dynamic Memory Streams
        let dbProjects = []; let dbStaff = []; let dbGodowns = [];
        let dbStockBook = []; let dbMeasurements = []; let dbFinancials = [];

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        // --- 2. ISOLATED SILENT DATA SYNC ENGINE ---
        async function fetchTableDataSafely(tableName, defaultData) {
            if (!supabase) return defaultData;
            try {
                const { data, error } = await supabase.from(tableName).select('*');
                if (error) {
                    console.warn(`Table ${tableName} read blocked or missing. using structural fallback.`);
                    networkErrorsLog.push(`${tableName} (Blocked)`);
                    return defaultData;
                }
                return data || defaultData;
            } catch (err) {
                console.warn(`Exception reading table ${tableName}:`, err);
                return defaultData;
            }
        }

        async function initVantageSystemCore() {
            // If supabase library failed to load from CDN entirely
            if (!supabase) {
                isUsingFallback = true;
                activateLocalFallbackEngine("CDN Engine Offline");
                return;
            }

            // Fetch each stream independently so one error doesn't crash the whole application
            dbProjects = await fetchTableDataSafely('projects', [
                { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", contract_value: 4500000 },
                { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", contract_value: 7500000 }
            ]);

            dbStaff = await fetchTableDataSafely('staff', [
                { id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'admin123', base_salary: 150000 }
            ]);

            dbGodowns = await fetchTableDataSafely('godowns', [
                { id: "g1", name: "Udaipur Central Godown", location: "Udaipur" }
            ]);

            dbStockBook = await fetchTableDataSafely('stock_book', [
                { godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }
            ]);

            dbMeasurements = await fetchTableDataSafely('measurements', []);
            dbFinancials = await fetchTableDataSafely('financials', []);

            // Handle alert injection if any tables are bypassed
            if (networkErrorsLog.length > 0) {
                isUsingFallback = true;
                injectNetworkWarningBanner(`Hybrid Sync Mode Active. Offline Fallback Used For: ${networkErrorsLog.join(', ')}`);
            }

            renderERP();
        }

        function activateLocalFallbackEngine(reason) {
            dbProjects = [{ id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", contract_value: 4500000 }, { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", contract_value: 7500000 }];
            dbStaff = [{ id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'admin123', base_salary: 150000 }];
            dbGodowns = [{ id: "g1", name: "Udaipur Central Godown", location: "Udaipur" }];
            dbStockBook = [{ godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }];
            injectNetworkWarningBanner(`⚠️ HARDWARE OFFLINE STORAGE ACTIVE (${reason})`);
            renderERP();
        }

        function injectNetworkWarningBanner(msg) {
            if (document.getElementById('vantage-alert-bar')) return;
            const indicator = document.createElement('div');
            indicator.id = 'vantage-alert-bar';
            indicator.className = "bg-amber-600 text-white font-mono text-[9px] text-center p-1 uppercase font-bold tracking-wider fixed top-0 left-0 w-full z-50 shadow";
            indicator.innerHTML = msg;
            document.body.appendChild(indicator);
        }

        // --- 3. PRESENTATION UI INTERFACE CONTROL ---
        function renderERP() {
            const root = document.getElementById('app-root');
            
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2>
                                <p class="text-xs text-blue-400 font-mono mt-1 uppercase tracking-widest">[ VANTAGE DIRECT CORE NODE ]</p>
                            </div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required value="Manoj Singh" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Security Access Password</label><input type="password" id="login-pass" required value="admin123" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-mono"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase font-sans tracking-wider transition-colors shadow-lg">Authenticate Command Session</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('login-name').value.trim();
                    const pass = document.getElementById('login-pass').value.trim();
                    const user = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                    if (user) {
                        currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP();
                    } else { alert("Verification Security Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs ${isUsingFallback ? 'pt-6' : ''}">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-500 font-bold uppercase">Vantage Node Matrix</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Site Nodes</button>
                                ${isAdmin ? `<div class="pt-2 mt-2 border-t border-borderGray"><button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button></div>` : ''}

                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 LOGOUT</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg"><div id="tab-content-window"></div></main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }

        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Projects</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Sites</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Warehouse Units</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Godowns</h3></div>
                        <div class="
