<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS Vantage - Final Unfrozen Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Anti-Freeze Global Pointer */
        .sidebar-btn { width: 100%; text-align: left; padding: 12px; border-radius: 8px; color: #9ca3af; transition: 0.2s; }
        .sidebar-btn:hover { background: #1f2937; color: white; }
        .active-tab { background: #2563eb !important; color: white !important; font-weight: bold; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#111827] border-r border-[#1f2937] p-4 fixed h-screen overflow-y-auto">
            <h1 class="text-white font-bold mb-6 text-sm">CPS CONSULTANTS</h1>
            <nav id="nav-container" class="space-y-1"></nav>
        </aside>

        <main class="ml-64 p-8 w-full" id="content-area">
            <h2 id="view-title" class="text-xl font-bold mb-6 uppercase text-white">DASHBOARD</h2>
            <div id="module-view"></div>
        </main>
    </div>

    <script>
        // Module Registry
        const menu = [
            { id: 'dashboard', label: '📊 Executive Dashboard' },
            { id: 'lifecycle', label: '🏢 Lifecycle Projects' },
            { id: 'measurements', label: '📐 Measurement Sheets' },
            { id: 'site-photos', label: '📷 Site Photo Updates' },
            { id: 'materials', label: '📦 Inventory Hub' },
            { id: 'inward', label: '📥 Material Inward' },
            { id: 'attendance', label: '✅ Attendance Logs' },
            { id: 'machinery', label: '⚙️ Machinery Fleet' },
            { id: 'petty-cash', label: '💸 Petty Cash Logs' },
            { id: 'tenders', label: '📄 Tenders Matrix' },
            { id: 'billing', label: '🧾 Billing & Invoices' },
            { id: 'ledger', label: '💰 Financial Ledger' },
            { id: 'staff-mgmt', label: '👥 Staff Management' }
        ];

        // Sidebar Generator (Event-Delegation based)
        const nav = document.getElementById('nav-container');
        nav.innerHTML = menu.map(m => 
            `<button onclick="renderModule('${m.id}')" class="sidebar-btn" id="btn-${m.id}">${m.label}</button>`
        ).join('');

        // Global Router (Unfrozen)
        window.renderModule = (id) => {
            // Highlight Button
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`btn-${id}`).classList.add('active-tab');

            // Render Content
            const view = document.getElementById('module-view');
            document.getElementById('view-title').innerText = id.replace(/-/g, ' ');
            
            // Unfrozen Entry Logic
            view.innerHTML = `<div class="p-6 bg-[#111827] border border-[#1f2937] rounded-xl">
                <p class="text-gray-400 mb-4">Module: ${id.toUpperCase()} (UNFROZEN)</p>
                <div class="space-y-3">
                    <input class="w-full bg-black border border-[#1f2937] p-3 rounded" placeholder="Enter data for ${id}...">
                    <button class="bg-blue-600 px-6 py-2 rounded text-white font-bold">Submit Entry</button>
                </div>
            </div>`;
        };

        // Initialize
        window.renderModule('dashboard');
    </script>
</body>
</html>
