<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center bg-darkBg">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-gray-400 font-mono tracking-widest uppercase text-[10px]">ENFORCING LEVEL 17 CORE OPERATION MATRIX...</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CLOUD CENTRAL REST CONFIG MATRIX ---
        const SUPABASE_REST_URL = "https://nshstymfggjffuhstghw.supabase.co/rest/v1";
        const API_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        const cloudHeaders = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        // Standard Storage Streams
        let dbProjects = []; let dbStaff = []; let dbGodowns = []; let dbStockBook = []; 
        let dbMeasurements = []; let dbFinancials = []; let dbMachinery = []; let dbTenders = [];

        let currentTab = "dashboard";
        let currentUser = JSON.parse(sessionStorage.getItem('vantage_active_session')) || null;
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        async function fetchNativeTable(endpoint, fallback) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallback;
                const data = await response.json();
                return data && data.length > 0 ? data : fallback;
            } catch (e) { return fallback; }
        }

        async function initializeSecurityGatekeeper() {
            dbStaff = await fetchNativeTable('staff', [{ id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'CPS2026', base_salary: 150000, status: 'Active' }]);
            dbProjects = await fetchNativeTable('projects', [
                { id: "1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur", contract_value: 4500000 },
                { id: "2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", contract_value: 7500000 }
            ]);
            dbGodowns = await fetchNativeTable('godowns', [{ id: "1", name: "Udaipur Central Godown", location: "Udaipur" }]);
            dbStockBook = await fetchNativeTable('stock_book', [{ id: "1", godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }]);
            dbMeasurements = await fetchNativeTable('measurements', [{ id: "1", project: "Udaipur City Flyover Survey", span: "0/000 to 0/025", avg_width: "7.500", yield_output: "187.50 m²" }]);
            dbFinancials = await fetchNativeTable('financials', []);
            dbMachinery = await fetchNativeTable('machinery', []);
            dbTenders = await fetchNativeTable('tenders', []);

            renderERP();
        }

        // --- 2. MAIN APPLICATION WORKSPACE SHELL ---
        function renderERP() {
            const root = document.getElementById('app-root');
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2>
                                <p class="text-xs text-blue-500 font-mono mt-1 uppercase tracking-widest">[ SECURITY AUTH MATRIX ]</p>
                            </div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Identity User ID</label><input type="text" id="login-name" required placeholder="User ID" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Password</label><input type="password" id="login-pass" required placeholder="••••••••" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-mono"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase font-sans tracking-wider transition-colors shadow-lg">Authenticate Secure Session</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('login-name').value.trim();
                    const pass = document.getElementById('login-pass').value.trim();
                    const userMatch = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                    if (userMatch) {
                        currentUser = userMatch;
                        sessionStorage.setItem('vantage_active_session', JSON.stringify(userMatch));
                        renderERP();
                    } else { alert("Verification Security Coordinates Mismatch!"); }
                });
                return;
            }

            // ROLES PARAMETERS CHECKING
            const isMasterAdmin = (currentUser.role === 'Master Admin' || currentUser.name.toLowerCase() === 'manoj singh');
            const isAccountant = (currentUser.role === 'Accountant');
            const isCivilEngineer = (currentUser.role === 'Engineer');
            const isSupervisor = (currentUser.role === 'Supervisor');

            const hasProjectRights = (isMasterAdmin || isAccountant);
            const hasMBookRights = (isMasterAdmin || isAccountant || isCivilEngineer || isSupervisor);
            const hasInventoryAdminRights = (isMasterAdmin || isAccountant);

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0 overflow-y-auto max-h-screen">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-500 font-bold uppercase">Vantage Shell Core</p></div>
                            <nav class="p-3 space-y-1">
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-1">Main Intelligence</p>
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Executive Dashboard</button>
                                
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-2">Project Operations</p>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏢 Lifecycle Projects</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Measurement Sheets (M-Book)</button>
                                
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-2">Human Capital & Assets</p>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Inventory Hub (Godown)</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery Assets Fleet</button>
                                
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-2">Enterprise Strategy</p>
                                <button onclick="switchTab('tenders')" class="w-full text-left px-3 py-1.5 rounded ${currentTab === 'tenders' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📄 Tender Pipeline Registry</button>
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-1">👤 ${currentUser.name}</p>
                            <p class="text-[9px] text-blue-400 uppercase font-mono font-bold mb-2">${currentUser.role}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1 rounded font-bold border border-borderGray text-[10px]">🔒 LOGOUT</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg"><div id="tab-content-window"></div></main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; sessionStorage.removeItem('vantage_active_session'); location.reload(); }

        // --- 3. DYNAMIC TAB INTERFACES WITH INDEPENDENT FORMS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const isMasterAdmin = (currentUser.role === 'Master Admin' || currentUser.name.toLowerCase() === 'manoj singh');
            const isAccountant = (currentUser.role === 'Accountant');
            const isCivilEngineer = (currentUser.role === 'Engineer');
            const isSupervisor = (currentUser.role === 'Supervisor');

            const hasProjectRights = (isMasterAdmin || isAccountant);
            const hasMBookRights = (isMasterAdmin || isAccountant || isCivilEngineer || isSupervisor);
            const hasInventoryAdminRights = (isMasterAdmin || isAccountant);

            if (currentTab === "dashboard") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-blue-400 font-mono font-bold uppercase tracking-wider">⚡ WELCOME TO CPS TERMINAL V17. ALL INTERFACES BOUND TO PROTECTION MATRIX LAUNCHED.</div>`;
            }

            // SCREENSHOT 1: LIFECYCLE PROJECTS MODULE
            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Infrastructure Registry Nodes</h3>
                            ${hasProjectRights ? `<button onclick="openModal('p-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold font-sans">+ Provision New Site</button>` : `<span class="text-gray-500 font-mono">[Write Lock Restrict]</span>`}
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-1 relative">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-1.5 mb-1">${p.name}</h4>
                                    <p class="text-gray-400">🏢 Client: <span class="text-gray-200">${p.client}</span></p>
                                    <p class="text-gray-400">📍 Location: <span class="text-gray-200">${p.location}</span></p>
                                    <p class="text-gray-400">💰 Contract: <span class="text-green-400 font-mono font-bold">₹${Number(p.contract_value || 0).toLocaleString()}</span></p>
                                    ${hasProjectRights ? `<button onclick="deleteRowCloud('projects','${p.id}')" class="absolute bottom-4 right-4 bg-red-950/40 text-red-400 border border-red-900/60 px-2 py-0.5 rounded font-mono text-[9px]">Purge Data</button>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div id="p-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3">
                            <h4 class="font-bold text-white text-xs uppercase">Provision New Site Entry</h4>
                            <form id="p-form" class="space-y-2">
                                <input type="text" id="p-name" placeholder="Project Site Name" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="text" id="p-client" placeholder="Client Name" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="text" id="p-loc" placeholder="Physical Location" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">
                                <input type="number" id="p-val" placeholder="Contract Amount (₹)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono">
                                <button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold font-sans">Save Project Parameter</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('p-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();
                    const payload = [{ name: document.getElementById('p-name').value, client: document.getElementById('p-client').value, location: document.getElementById('p-loc').value, contract_value: Number(document.getElementById('p-val').value) }];
                    await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
                    closeModal('p-mod'); initializeSecurityGatekeeper();
                });
            }

            // SCREENSHOT 2: ADVANCED EXCEL M-BOOK GRID
            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">
