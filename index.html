<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. HARDWARE STORAGE FALLBACK INITIALIZATION ---
        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contract_value: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contract_value: 7500000, status: "Active" }
        ];

        // Seed core variables in localStorage so they are instantly ready offline
        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_godowns')) localStorage.setItem('vantage_godowns', JSON.stringify([{ id: "g1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" }]));
        if (!localStorage.getItem('vantage_stock_book')) localStorage.setItem('vantage_stock_book', JSON.stringify([{ godownName: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }]));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([{ id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'admin123', base_salary: 150000, status: 'Active', allotted_work: 'All Site Nodes' }]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));

        // Global memory streams
        let dbProjects = JSON.parse(localStorage.getItem('vantage_projects'));
        let dbStaff = JSON.parse(localStorage.getItem('vantage_staff'));
        let dbGodowns = JSON.parse(localStorage.getItem('vantage_godowns'));
        let dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book'));
        let dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];
        let dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
        let dbOdometer = []; let dbPhotos = []; let dbReturns = [];

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        // --- 2. CORE WORKSPACE UI MODULE CONTROLLER ---
        function renderERP() {
            const root = document.getElementById('app-root');
            
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2>
                                <p class="text-xs text-blue-400 font-mono mt-1 uppercase tracking-widest">[ VANTAGE CORE NODE UNLOCKED ]</p>
                            </div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div>
                                    <label class="block text-gray-400 mb-1 font-bold uppercase">Identity Code ID</label>
                                    <input type="text" id="login-name" required value="Manoj Singh" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium">
                                </div>
                                <div>
                                    <label class="block text-gray-400 mb-1 font-bold uppercase">Security Access Password</label>
                                    <input type="password" id="login-pass" required value="admin123" class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-mono" placeholder="••••••••">
                                </div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase font-sans tracking-wider transition-colors shadow-lg">Authenticate Secure Session</button>
                            </form>
                            <p class="text-[10px] text-gray-500 font-mono text-center mt-4">Default Profile: Manoj Singh / Pass: admin123</p>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('login-name').value.trim();
                    const pass = document.getElementById('login-pass').value.trim();
                    const user = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                    if (user) {
                        currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP();
                    } else { alert("Verification Security Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-500 font-bold uppercase">Vantage Production Core</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Site Nodes</button>
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED PRIVILEGES</p>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 LOGOUT</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }

        // --- 3. DYNAMIC WORKSPACE COMPONENT VIEW PANELS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Projects</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Sites</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Warehouse Units</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Godowns</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">M-Book Logs</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbMeasurements.length} Rows</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Staff Personnel</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbStaff.length} Accounts</h3></div>
                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-blue-400 font-mono font-bold uppercase tracking-wider">⚡ VANTAGE ENGINE STABLE RUNTIME UNLOCKED. ALL CORE SYSTEMS FULLY ACTIVE.</div>
                `;
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3><div class="flex space-x-2"><button onclick="addExcelRow()" class="bg-gray-800 border border-borderGray text-white font-bold px-3 py-1 rounded">+ Insert Row</button><button onclick="saveExcelDataMatrix()" class="bg-blue-600 font-bold px-4 py-1 rounded shadow-lg">💾 Save Spreadsheet</button></div></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><label class="block text-gray-400 mb-1 font-bold">Target Project Site</label><select id="sheet-project-node" class="bg-darkBg border border-borderGray p-2 rounded text-white font-bold w-64">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                        <div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><div class="p-3 bg-darkBg/60 border-b border-borderGray font-bold text-gray-400">Registry M-Book Historical Ledger</div><table class="w-full text-left text-xs">${dbMeasurements.map(m=>`<tr class="border-b border-borderGray font-mono"><td class="p-3 text-white font-sans font-bold">${m.project}</td><td class="p-3 text-center text-gray-400">${m.span}</td><td class="p-3 text-right text-blue-400 font-bold pr-4">${m.yield_output || m.yield}</td></tr>`).join('')}</table></div>
                    </div>
                `;
                buildExcelRowsMatrixHTML();
            }

            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Storage & Material Tracker</h3><div class="flex space-x-2">${isAdmin?`<button onclick="openModal('g-mod')" class="bg-gray-800 px-3 py-1 rounded font-bold">+ Create Godown</button><button onclick="openModal('s-mod')" class="bg-emerald-950 text-emerald-400 px-3 py-1 rounded font-bold">+ Stock Inward</button>`:''}<button onclick="openModal('d-mod')" class="bg-blue-600 px-3 py-1 rounded font-bold">+ Dispatch to Site</button></div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 font-sans"><h4 class="text-gray-400 font-bold uppercase mb-2 text-[10px]">Registered Warehouses</h4><div class="space-y-1">${dbGodowns.map(g=>`<div class="bg-darkBg p-2.5 rounded border border-borderGray font-bold text-white">${g.name}</div>`).join('')}</div></div>
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 lg:col-span-2"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Godown Location</th><th class="p-2">Material Item</th><th class="p-2 text-right">Available Stock</th></tr>${dbStockBook.map(s=>`<tr><td class="p-2 text-gray-400 font-medium">${s.godown_name || s.godownName}</td><td class="p-2 text-white font-bold">${s.item}</td><td class="p-2 text-right text-blue-400 font-bold font-mono">${s.qty} ${s.unit}</td></tr>`).join('')}</table></div>
                        </div>
                    </div>
                    
                    <div id="g-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3"><h4 class="font-bold text-white text-xs">🏢 Create Godown Profile</h4><form id="g-form" class="space-y-2"><input type="text" id="g-name" placeholder="Godown Name" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="text" id="g-loc" placeholder="Address Location" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Deploy Godown</button></form></div>
                    </div>
                    <div id="s-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3"><h4 class="font-bold text-white text-xs">📥 Inward Stock Material</h4><form id="s-form" class="space-y-2"><select id="st-godown" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select><input type="text" id="st-item" placeholder="Material Description" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><div class="grid grid-cols-2 gap-2"><input type="number" id="st-qty" placeholder="Qty" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="text" id="st-unit" placeholder="Bags/Tons" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div><button type="submit" class="w-full bg-emerald-600 p-2 rounded text-white font-bold">Commit Stock</button></form></div>
                    </div>
                `;
                document.getElementById('g-form')?.addEventListener('submit', function(e){
                    e.preventDefault(); const n = document.getElementById('g-name').value.trim(); const l = document.getElementById('g-loc').value.trim();
                    dbGodowns.push({ name:n, location:l }); localStorage.setItem('vantage_godowns', JSON.stringify(dbGodowns));
                    closeModal('g-mod'); renderERP();
                });
                document.getElementById('s-form')?.addEventListener('submit', function(e){
                    e.preventDefault();
                    const g = document.getElementById('st-godown').value; const item = document.getElementById('st-item').value.trim();
                    const qty = Number(document.getElementById('st-qty').value); const unit = document.getElementById('st-unit').value.trim();
                    const match = dbStockBook.find(x => (x.godown_name||x.godownName)===g && x.item.toLowerCase()===item.toLowerCase());
                    if(match) { match.qty += qty; } else { dbStockBook.push({ godownName:g, item, qty, unit }); }
                    localStorage.setItem('vantage_stock_book', JSON.stringify(dbStockBook)); closeModal('s-mod'); renderERP();
                });
            }

            else if (currentTab === "financial") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">💰 Central Audited Financial Ledger</h3><button onclick="openModal('f-mod')" class="bg-blue-600 px-4 py-1.5 rounded font-bold text-white shadow-md">+ Record Ledger Entry</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left border-collapse text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Date</th><th class="p-3">Stream</th><th class="p-3">Category Component</th><th class="p-3">Project Site</th><th class="p-3">Operator</th><th class="p-3 text-right">Transaction Value</th></tr>
                        ${dbFinancials.map(f=>`
                            <tr class="border-b border-borderGray"><td class="p-3 font-mono text-gray-500">${f.date}</td><td class="p-3 font-bold">${f.stream}</td><td class="p-3 text-gray-300 font-medium">${f.category}</td><td class="p-3 text-gray-400">${f.project}</td><td class="p-3 text-gray-400 font-bold">${f.user}</td><td class="p-3 text-right font-bold font-mono text-gray-200">₹${f.amount.toLocaleString()}</td></tr>
                        `).join('')}</table></div>
                    </div>
                    <div id="f-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-3"><h4 class="font-bold text-white text-sm">Record Transaction</h4><form id="f-form" class="space-y-2"><select id="f-stream" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold"><option value="Payment OUT">📉 Payment OUT (Expense)</option><option value="Payment IN">📈 Payment IN (Inflow)</option></select><input type="text" id="f-cat" placeholder="Category Type (e.g. Material Purchase)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><select id="f-proj" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select><input type="number" id="f-amt" placeholder="Amount (₹)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono"><input type="text" id="f-desc" placeholder="Remarks details..." required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Commit Entry</button></form></div>
                    </div>
                `;
                document.getElementById('f-form')?.addEventListener('submit', function(e){
                    e.preventDefault();
                    const newFin = { date: new Date().toISOString().split('T')[0], stream: document.getElementById('f-stream').value, category: document.getElementById('f-cat').value, project: document.getElementById('f-proj').value, user: currentUser.name, amount: Number(document.getElementById('f-amt').value), desc: document.getElementById('f-desc').value, status:'Approved' };
                    dbFinancials.unshift(newFin); localStorage.setItem('vantage_financials', JSON.stringify(dbFinancials));
                    closeModal('f-mod'); renderERP();
                });
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Infrastructure Registry Nodes</h3></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-1">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-1.5 mb-1">${p.name}</h4>
                                    <p class="text-gray-400">🏢 Client Name: <span class="text-gray-200 font-medium">${p.client}</span></p>
                                    <p class="text-gray-400">📍 Physical Site: <span class="text-gray-200 font-medium">${p.location}</span></p>
                                    <p class="text-gray-400">💰 Valuation: <span class="text-green-400 font-mono font-bold">₹${p.contract_value || p.contractValue}</span></p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "staff-mgmt") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Human Capital Assets Control Matrix</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left text-xs"><tr class="bg-darkBg font-bold text-gray-400 border-b border-borderGray uppercase"><th class="p-3">Identity Full Name</th><th class="p-3">Role Node</th><th class="p-3">Security Access Pass</th><th class="p-3 text-right">Base Salary Metric Rate</th></tr>
                        ${dbStaff.map(s=>`<tr><td class="p-3 text-white font-bold">${s.name}</td><td class="p-3 text-gray-400"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded">${s.role}</span></td><td class="p-3 font-mono text-gray-500">${s.pass}</td><td class="p-3 text-right font-mono text-blue-400 font-bold">₹${Number(s.base_salary || s.baseSalary).toLocaleString()}</td></tr>`).join('')}</table></div>
                    </div>
                `;
            }
        }

        // --- 6. CORE EXCEL SHEET CALCULATOR GRID ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `
                    <tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td>
                        <td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        function saveExcelDataMatrix() {
            const project = document.getElementById('sheet-project-node').value;
            activeExcelRows.forEach(row => {
                dbMeasurements.unshift({ project, span: `${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`, avg_width: row.computedAvgWidth.toFixed(3), yield_output: row.thickness ? `${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²` });
            });
            localStorage.setItem('vantage_measurements', JSON.stringify(dbMeasurements));
            alert("Spreadsheet batch lines stored safely inside local storage cluster logs!");
            activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }];
            renderERP();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Start App Instance Driver Instantly
        renderERP();
    </script>
</body>
</html>
