<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS ERP | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen font-sans">

    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 flex flex-col">
        <h1 class="text-blue-500 font-bold mb-6 text-lg">CPS COMMAND CENTER</h1>
        <div id="nav-menu" class="space-y-1 flex-grow overflow-y-auto"></div>
        
        <div class="mt-4 pt-4 border-t border-gray-800">
            <p class="text-[10px] text-gray-500 uppercase">Logged in as:</p>
            <p id="user-profile" class="text-sm font-bold text-blue-400 mb-3 uppercase">Manoj Singh Rao</p>
            <button onclick="logout()" class="w-full bg-red-900/20 text-red-500 text-xs py-2 rounded border border-red-900 hover:bg-red-900 transition">TERMINATE SESSION</button>
            <div class="mt-4 text-[10px] text-gray-500">SYSTEM STATUS: <span class="text-green-500 font-bold">HEALTHY</span></div>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto" id="workspace">
        <h2 id="workspace-title" class="text-2xl font-bold mb-8 text-white">EXECUTIVE DASHBOARD</h2>
        <div id="content-area"></div>
    </main>

    <script>
        const modules = [
            { name: 'Live Projects' }, { name: 'Site Photos' }, { name: 'Inventory Hub' }, 
            { name: 'Attendance' }, { name: 'Measurement' }, { name: 'Machinery Fleet' },
            { name: 'Subcontractors' }, { name: 'Executive Dashboard' }, { name: 'Financial Ledger' }, 
            { name: 'Live Tracking' }, { name: 'Billing Section' }, { name: 'Petty Cash' }, 
            { name: 'Tenders Matrix' }, { name: 'Telemetry' }, { name: 'Staff Identity' }
        ];

        function loadModule(name) {
            document.getElementById('workspace-title').innerText = name + " WORKSPACE";
            const area = document.getElementById('content-area');
            
            if (name === 'Inventory Hub') {
                area.innerHTML = `
                <div id="inventory-workspace" class="bg-gray-900 p-6 rounded border border-gray-800">
                    <div id="admin-stock-control" class="bg-black p-6 rounded border border-blue-900 mb-8">
                        <h3 class="text-blue-400 font-bold mb-4">+ PURCHASE & STOCK ENTRY (Admin Only)</h3>
                        <div class="grid grid-cols-4 gap-4">
                            <input type="text" id="m-name" placeholder="Item Name" class="bg-gray-900 p-2 rounded text-sm">
                            <input type="number" id="m-qty" placeholder="Quantity" class="bg-gray-900 p-2 rounded text-sm">
                            <input type="text" id="m-unit" placeholder="Unit (Bag/MT/Cft)" class="bg-gray-900 p-2 rounded text-sm">
                            <button onclick="addStock()" class="bg-blue-600 p-2 rounded font-bold text-sm">ADD TO STOCK</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <button onclick="transferMaterial('send')" class="bg-emerald-600 p-4 rounded font-bold">📤 TRANSFER (Capture Photo)</button>
                        <button onclick="transferMaterial('receive')" class="bg-purple-600 p-4 rounded font-bold">📥 RECEIVE (Capture Photo)</button>
                    </div>
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="text-gray-500 uppercase border-b border-gray-800">
                            <tr><th class="p-2">Sr.</th><th>Item</th><th>Qty</th><th>Site/Godown</th><th>Transfer Log</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="inventory-list"></tbody>
                    </table>
                </div>`;
            } else if (name === 'Live Projects') {
                area.innerHTML = `<div class="bg-gray-900 p-6 rounded border border-gray-800">...Project Form Code...</div>`;
            } else {
                area.innerHTML = `<div class="p-10 bg-gray-900 border border-gray-800 rounded text-center text-gray-400">Workspace for ${name} initialized...</div>`;
            }
        }

        // Logic Functions
        function addStock() { alert("Stock Entry recorded!"); }
        function transferMaterial(mode) { 
            navigator.geolocation.getCurrentPosition((pos) => {
                alert(mode.toUpperCase() + " verified at " + pos.coords.latitude.toFixed(4));
            }, () => alert("GPS Required!"));
        }

        function logout() { location.reload(); }

        function initApp() {
            const navMenu = document.getElementById('nav-menu');
            modules.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-2 text-sm hover:bg-gray-800 rounded transition';
                btn.innerText = m.name;
                btn.onclick = () => loadModule(m.name);
                navMenu.appendChild(btn);
            });
        }
        initApp();
    </script>
</body>
</html>
