<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. HARDWARE SYSTEM FORCE RESET RUNTIME ---
        const currentMatrixVersion = "vantage_v13_final_admin_lock_fix";
        if (localStorage.getItem('vantage_matrix_version') !== currentMatrixVersion) {
            localStorage.clear();
            localStorage.setItem('vantage_matrix_version', currentMatrixVersion);
        }

        // --- 2. ENTERPRISE DATA MATRICES SEEDING ---
        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); 
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_site_photos')) localStorage.setItem('vantage_site_photos', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));
        if (!localStorage.getItem('vantage_godowns')) localStorage.setItem('vantage_godowns', JSON.stringify([{ id: "g1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" }]));
        if (!localStorage.getItem('vantage_stock_book')) localStorage.setItem('vantage_stock_book', JSON.stringify([{ godownName: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }]));
        if (!localStorage.getItem('vantage_dispatches')) localStorage.setItem('vantage_dispatches', JSON.stringify([]));
        if (!localStorage.getItem('vantage_supplier_returns')) localStorage.setItem('vantage_supplier_returns', JSON.stringify([]));

        let currentTab = "dashboard"; 
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        // Excel sheet active runtime rows state
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        // --- 3. REGISTRATION & AUTHLOCK CORE ENGINE ---
        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            
            // Checks if a Master Admin profile node exists in registry database
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            // Phase A: Fresh Master Admin Registration Configuration
            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>
                                <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                                <p class="text-xs text-gray-400 mt-1">Configure your primary corporate administration identity keys.</p>
                            </div>
                            <form id="setup-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Identity Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="Manoj Singh"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors shadow-lg">Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim();
                    const pass = document.getElementById('setup-pass').value.trim();
                    if(pass !== document.getElementById('setup-confirm').value.trim()) { alert("Error: Security Keys do not match."); return; }
                    
                    const freshList = [{ id: 's_master', name, role: 'Master Admin', pass, baseSalary: 150000, status: 'Active', allottedWork: 'All Site Nodes' }];
                    localStorage.setItem('vantage_staff', JSON.stringify(freshList));
                    alert("Success: Master profile generated."); renderERP();
                });
                return;
            }

            // Phase B: Secure Portal Authorization Lock
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const uList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
                    const user = uList.find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { 
                        if(user.status === 'Blocked' || user.status === 'Terminated') { alert("Access Denied: Node suspended."); return; }
                        currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); currentTab = "dashboard"; renderERP(); 
                    } else { alert("Verification Mismatch."); }
                });
                return;
            }

            // STRICT STABLE ROLE-BASED MATCH CONTROLLER MATRIX (Fixes the frozen tabs anomaly)
            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');
            const notifications = JSON.parse(localStorage.getItem('vantage_notifications')) || {};

            // Phase C: Main Navigation Dynamic Workspace Framework
            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div class="overflow-y-auto max-h-[85vh]">
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Operations Hub</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('site-photos')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'site-photos' ? 'bg-blue-600 text-white' : 'text-emerald-400 hover:bg-gray-800'}">📷 Site Photo Vault</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Site Nodes</button>
                                
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED PRIVILEGES</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase text-[10px]">${currentUser.name.substring(0,2)}</div>
                                <div class="truncate"><p class="font-medium text-white truncate">${currentUser.name}</p><p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">${currentUser.role}</p></div>
                            </div>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 hover:text-red-400 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 LOGOUT NODE</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        ${notifications[currentUser.name] ? `<div class="bg-blue-600 text-white p-3 rounded-xl font-bold mb-4 flex justify-between items-center"><span>⚡ NOTIFICATION: ${notifications[currentUser.name]}</span><button onclick="clearNotification('${currentUser.name}')" class="bg-black/20 px-2 py-0.5 rounded text-[10px]">OK</button></div>` : ''}
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }
        function clearNotification(user) { const n = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; delete n[user]; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP(); }

        // --- 4. DYNAMIC UNFREEZE TARGET CONTENT BLOCKS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [];
            const dbStaff = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const dbAttendance = JSON.parse(localStorage.getItem('vantage_attendance')) || [];
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];
            const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
            const dbMaterials = JSON.parse(localStorage.getItem('vantage_materials')) || [];
            const dbOdometer = JSON.parse(localStorage.getItem('vantage_odometer')) || [];
            const dbPhotos = JSON.parse(localStorage.getItem('vantage_site_photos')) || [];
            const dbGodowns = JSON.parse(localStorage.getItem('vantage_godowns')) || [];
            const dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || [];
            const dbReturns = JSON.parse(localStorage.getItem('vantage_supplier_returns')) || [];
            const dbDeductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Projects</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Sites</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Odometer Telemetry</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbOdometer.length} Submissions</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Storage Godowns</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Units</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Total Personnel</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbStaff.length} Accounts</h3></div>
                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-500 font-bold uppercase tracking-wider">Vantage Node Matrix Framework Active. Click submenus to execute parameters.</div>
                `;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Site Infrastructure Configuration</h3>${isAdmin ? `<button onclick="openModal('p-mod')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-bold transition-colors">+ Provision New Site</button>` : ''}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative overflow-hidden">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-2">${p.name}</h4>
                                    <div class="space-y-1 text-gray-400 text-[11px] pt-1">
                                        <p>📍 Location: <span class="text-gray-200 font-medium">${p.location}</span></p>
                                        <p>🏢 Client Name: <span class="text-gray-200 font-medium">${p.client}</span></p>
                                        ${isAdmin ? `<p>💰 Contract Sum Valuation: <span class="text-green-400 font-bold font-mono">₹${Number(p.contractValue).toLocaleString()}</span></p>` : ''}
                                        <p>🎯 GPS Vectors: <span class="text-gray-400 font-mono">${p.lat}, ${p.lng}</span></p>
                                    </div>
                                    ${isAdmin ? `<div class="flex space-x-2 pt-2 border-t border-borderGray/40 mt-2"><button onclick="editProjectAction('${p.id}')" class="flex-1 bg-gray-800 text-gray-200 py-1 rounded font-bold">Modify</button><button onclick="deleteProjectAction('${p.id}')" class="bg-red-950/40 text-red-400 border border-red-900/60 px-3 py-1 rounded font-bold">Purge</button></div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div id="p-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 id="modal-project-title" class="text-sm font-bold text-white">Provision New Construction Node</h4>
                            <form id="p-form" class="space-y-3">
                                <input type="hidden" id="p-edit-id">
                                <div><label class="text-gray-400 block mb-1">Project Site Name</label><input type="text" id="p-name" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Client Title</label><input type="text" id="p-client" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Physical Location</label><input type="text" id="p-loc" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Contract Valuation Sum (₹)</label><input type="number" id="p-val" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="text-gray-400 block mb-1">GPS Latitude</label><input type="number" step="any" id="p-lat" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white" placeholder="24.5854"></div>
                                    <div><label class="text-gray-400 block mb-1">GPS Longitude</label><input type="number" step="any" id="p-lng" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white" placeholder="73.7125"></div>
                                </div>
                                <div class="flex justify-end space-x-2 pt-2"><button type="button" onclick="closeModal('p-mod')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold">Commit Node</button></div>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('p-form')?.addEventListener('submit', function(e){
                    e.preventDefault(); const id = document.getElementById('p-edit-id').value; const name = document.getElementById('p-name').value; const client = document.getElementById('p-client').value; const location = document.getElementById('p-loc').value; const contractValue = document.getElementById('p-val').value; const lat = document.getElementById('p-lat').value; const lng = document.getElementById('p-lng').value;
                    let pList = JSON.parse(localStorage.getItem('vantage_projects'));
                    if (id) { pList = pList.map(p => p.id === id ? { id, name, client, location, contractValue, lat, lng, status: p.status } : p); } 
                    else { pList.push({ id: 'p_' + Date.now(), name, client, location, contractValue, lat, lng, status: 'Active' }); }
                    localStorage.setItem('vantage_projects', JSON.stringify(pList)); closeModal('p-mod'); renderERP();
                });
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3><div class="flex space-x-2"><button onclick="addExcelRow()" class="bg-gray-800 border border-borderGray text-white font-bold px-3 py-1 rounded">+ Insert Row</button><button onclick="saveExcelToDatabase()" class="bg-blue-600 font-bold px-3 py-1 rounded">💾 Save Spreadsheet</button></div></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><label class="block text-gray-400 mb-1">Select Project</label><select id="sheet-project-node" class="bg-darkBg border border-borderGray p-2 rounded text-white w-48">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                        <div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold"><th>Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th>Formula</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold font-sans"> Weimar <th class="p-3">Saved Dynamic Logs</th><th class="p-3">Span Section</th><th class="p-3 text-right">Yield Quantity Output</th></tr>${dbMeasurements.map(m=>`<tr class="border-b border-borderGray font-mono"><td class="p-3 text-white font-sans font-bold">${m.project}</td><td class="p-3 text-gray-400 text-center">${m.span}</td><td class="p-3 text-right text-blue-400 font-bold">${m.yield}</td></tr>`).join('')}</table></div>
                    </div>
                `;
                buildExcelRowsMatrixHTML();
            }

            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Storage & Godown Management Pipeline</h3><div class="flex space-x-2">${isAdmin?`<button onclick="openModal('g-mod')" class="bg-gray-800 px-3 py-1 rounded font-bold">+ Create Godown</button><button onclick="openModal('s-mod')" class="bg-emerald-950 text-emerald-400 px-3 py-1 rounded font-bold">+ Stock Inward</button><button onclick="openSupplierReturnModal()" class="bg-red-950 text-red-400 px-3 py-1 rounded font-bold">⏪ Supplier Return</button>`:''}<button onclick="openModal('d-mod')" class="bg-blue-600 px-3 py-1 rounded font-bold">+ Dispatch to Site</button></div></div>

        function buildExcelRowsMatrixHTML() {

                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                else if (row.formula === 'Sum') { yld = len + avgW + thick; }
                else if (row.formula === 'Average') { yld = (len + avgW + thick) / (thick > 0 ? 3 : 2); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `
                    <tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent px-2 text-center text-white focus:outline-none"></td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent px-2 text-center text-white focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td>
                        <td class="p-1 border-r border-borderGray"><select onchange="updateExcelCell(${index},'formula',this.value)" class="bg-darkBg text-gray-300 font-sans focus:outline-none"><option value="Multiply" ${row.formula==='Multiply'?'selected':''}>✖️ Multiply</option><option value="Sum" ${row.formula==='Sum'?'selected':''}>➕ Sum</option></select></td>
                        <td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }
        function saveExcelToDatabase() {
            const project = document.getElementById('sheet-project-node').value; const dbM = JSON.parse(localStorage.getItem('vantage_measurements')) || [];
            activeExcelRows.forEach(row => { dbM.unshift({ id:'m_'+Date.now()+Math.random(), timestamp:new Date().toLocaleString(), project, span:`${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`, avgWidth:row.computedAvgWidth.toFixed(3), type:row.thickness?"Volume (m³)":"Area (m²)", yield:row.thickness?`${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²` }); });
            localStorage.setItem('vantage_measurements', JSON.stringify(dbM)); alert("Batch rows added to M-Book Logs."); activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }]; renderERP();
        }

        // Logistics Interceptors Engine
        function populateLogisticsDropdown(sId, tId) {
            const s = document.getElementById(sId); const t = document.getElementById(tId); if(!s || !t) return;
            const items = (JSON.parse(localStorage.getItem('vantage_stock_book')) || []).filter(x => x.godownName === s.value);
            t.innerHTML = items.map(x => `<option value="${x.item}">${x.item} (Avail: ${x.qty} ${x.unit})</option>`).join('');
        }
        document.body.addEventListener('submit', function(e){
            if(e.target.id === 'g-form'){ e.preventDefault(); const db = JSON.parse(localStorage.getItem('vantage_godowns')); db.push({id:'g_'+Date.now(), name:document.getElementById('g-name').value.trim(), location:document.getElementById('g-loc').value.trim()}); localStorage.setItem('vantage_godowns', JSON.stringify(db)); closeModal('g-mod'); renderERP(); }
            if(e.target.id === 's-form') { e.preventDefault(); const g = document.getElementById('st-godown').value; const item = document.getElementById('st-item').value.trim(); const qty = Number(document.getElementById('st-qty').value); const unit = document.getElementById('st-unit').value.trim(); let db = JSON.parse(localStorage.getItem('vantage_stock_book')); const ex = db.find(x=>x.godownName===g&&x.item.toLowerCase()===item.toLowerCase()); if(ex){ex.qty+=qty;}else{db.push({godownName:g,item,qty,unit});} localStorage.setItem('vantage_stock_book', JSON.stringify(db)); closeModal('s-mod'); renderERP(); }
            if(e.target.id === 'd-form') { e.preventDefault(); const f = document.getElementById('ds-from').value; const item = document.getElementById('ds-item').value; const qty = Number(document.getElementById('ds-qty').value); const to = document.getElementById('ds-to').value; let db = JSON.parse(localStorage.getItem('vantage_stock_book')); const st = db.find(x=>x.godownName===f&&x.item===item); if(!st||st.qty<qty){alert("Insufficient stock."); return;} st.qty-=qty; localStorage.setItem('vantage_stock_book', JSON.stringify(db)); let disp = JSON.parse(localStorage.getItem('vantage_dispatches')); disp.unshift({id:'d_'+Date.now(), fromGodown:f, toSite:to, item, qty, unit:st.unit, timestamp:new Date().toLocaleString()}); localStorage.setItem('vantage_dispatches', JSON.stringify(disp)); closeModal('d-mod'); renderERP(); }
            if(e.target.id === 'r-form') { e.preventDefault(); const g = document.getElementById('ret-from').value; const item = document.getElementById('ret-item').value; const qty = Number(document.getElementById('ret-qty').value); let db = JSON.parse(localStorage.getItem('vantage_stock_book')); const st = db.find(x=>x.godownName===g&&x.item===item); if(!st||st.qty<qty){alert("Insufficient stock matrix."); return;} st.qty-=qty; localStorage.setItem('vantage_stock_book', JSON.stringify(db)); let ret = JSON.parse(localStorage.getItem('vantage_supplier_returns')); ret.unshift({id:'r_'+Date.now(), godownName:g, item, qty, unit:st.unit, timestamp:new Date().toLocaleString()}); localStorage.setItem('vantage_supplier_returns', JSON.stringify(ret)); closeModal('r-mod'); renderERP(); }
        });
        function confirmMaterialReceipt(id) { let mats = JSON.parse(localStorage.getItem('vantage_materials')) || []; const t = mats.find(x=>x.id===id); if(t){t.received=true; localStorage.setItem('vantage_materials', JSON.stringify(mats)); renderERP();} }
        function triggerOdoPunch(type) { const r = prompt(`Odometer entry for ${type} (km):`); if(!r||isNaN(r)) return; let odo = JSON.parse(localStorage.getItem('vantage_odometer')); if(type==='Morning'){odo.unshift({id:'o_'+Date.now(), user:currentUser.name, morning:r, evening:'', cleared:false});}else{const ex=odo.find(x=>x.user===currentUser.name&&x.evening===''); if(ex){ex.evening=r;}else{alert("Morning entry missing."); return;}} localStorage.setItem('vantage_odometer', JSON.stringify(odo)); renderERP(); }
        function clearFuelVoucher(id, name) { let odo = JSON.parse(localStorage.getItem('vantage_odometer')); const t = odo.find(x=>x.id===id); if(t){t.cleared=true; localStorage.setItem('vantage_odometer', JSON.stringify(odo)); const n = JSON.parse(localStorage.getItem('vantage_notifications')); n[name]="Fuel claims approved."; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP();} }
        function executeShiftPunch(type) { const day = new Date().toISOString().split('T')[0]; let att = JSON.parse(localStorage.getItem('vantage_attendance')); let cur = att.find(x=>x.staffName===currentUser.name&&x.date===day); if(type==='In'){if(!cur){att.unshift({staffName:currentUser.name, date:day, punchIn:new Date().toLocaleTimeString(), punchOut:'', status:'PRESENT'});} alert("Shift started.");}else{if(cur){cur.punchOut=new Date().toLocaleTimeString();} alert("Shift closed.");} localStorage.setItem('vantage_attendance', JSON.stringify(att)); renderERP(); }
        function triggerOdoPunch(type) { const r = prompt(`Odometer entry for ${type} (km):`); if(!r||isNaN(r)) return; let odo = JSON.parse(localStorage.getItem('vantage_odometer')) || []; if(type==='Morning'){odo.unshift({id:'o_'+Date.now(), user:currentUser.name, morning:r, evening:'', cleared:false});}else{const ex=odo.find(x=>x.user===currentUser.name&&x.evening===''); if(ex){ex.evening=r;}else{alert("Morning entry missing."); return;}} localStorage.setItem('vantage_odometer', JSON.stringify(odo)); renderERP(); }

        renderERP();
    </script>
</body>
</html>
