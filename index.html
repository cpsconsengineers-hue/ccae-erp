<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center bg-darkBg">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>

            </div>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE CLOUD CONNECTOR CONFIG MATRIX (100% SECURE PRE-SET) ---
        const SUPABASE_URL = "https://nshstymfggjffuhstghw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        let supabase = null;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            console.error("Client Boot Error:", e);
        }

        // Global Runtime Memory Repositories
        let dbProjects = []; let dbStaff = []; let dbAttendance = []; let dbMeasurements = [];
        let dbFinancials = []; let dbMaterials = []; let dbOdometer = []; let dbPhotos = [];
        let dbGodowns = []; let dbStockBook = []; let dbReturns = []; let dbDeductions = {};

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 187.5 }];

        // --- 2. UNIVERSAL HARDWARE CLOUD SYNC KERNEL ---
        async function syncSupabaseCloudAndRender() {
            const root = document.getElementById('app-root');
            
            // Fail-safe logic if client generation instances mismatch
            if(!supabase) {
                loadLocalFallbackMatrix("Supabase Module Generation Mismatch");
                return;
            }

            try {
                // Parallel asynchronous query streams fetcher loop
                const [proj, staff, att, meas, fin, mat, odo, photo, gd, st, ret] = await Promise.all([
                    supabase.from('projects').select('*'), supabase.from('staff').select('*'),
                    supabase.from('attendance').select('*'), supabase.from('measurements').select('*'),
                    supabase.from('financials').select('*'), supabase.from('materials').select('*'),
                    supabase.from('odometer').select('*'), supabase.from('site_photos').select('*'),
                    supabase.from('godowns').select('*'), supabase.from('stock_book').select('*'),
                    supabase.from('supplier_returns').select('*')
                ]);

                // Trap explicit relational structural layout errors
                if (proj.error || staff.error) {
                    console.warn("Table routing gap captured, launching local fail-safe stub.");
                    loadLocalFallbackMatrix(`Table Schema Missing: ${proj.error?.message || staff.error?.message}`);
                    return;
                }

                dbProjects = proj.data || []; dbStaff = staff.data || []; dbAttendance = att.data || [];
                dbMeasurements = meas.data || []; dbFinancials = fin.data || []; dbMaterials = mat.data || [];
                dbOdometer = odo.data || []; dbPhotos = photo.data || []; dbGodowns = gd.data || [];
                dbStockBook = st.data || []; dbReturns = ret.data || [];

                renderERP();
            } catch (error) {
                console.error("Supabase Connection Exception:", error);
                loadLocalFallbackMatrix(error.message);
            }
        }

        // --- 3. HARDWARE LOCAL FALLBACK STUB DRIVER (Prevents Blank Screen) ---
        function loadLocalFallbackMatrix(reasonString) {
            console.log("Engaging local offline matrix engine driver...");
            
            // Hard Seed local mock stubs to instantly unfreeze Manoj ji's dashboard viewport
            dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [
                { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contract_value: 4500000, status: "Active" },
                { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contract_value: 7500000, status: "Active" }
            ];
            
            // Local fallback master credentials logic
            const localStaff = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            if(localStaff.length === 0) {
                localStaff.push({ id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'admin123', base_salary: 150000, status: 'Active', allotted_work: 'All Site Nodes' });
                localStorage.setItem('vantage_staff', JSON.stringify(localStaff));
            }
            dbStaff = localStaff;
            dbGodowns = JSON.parse(localStorage.getItem('vantage_godowns')) || [{ id: "g1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" }];
            dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || [{ godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }];
            dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];
            dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
            dbReturns = JSON.parse(localStorage.getItem('vantage_supplier_returns')) || [];

            // Injects absolute visual debugger warning notice banner layout onto top viewport frame dynamically
            const errorBanner = document.createElement('div');
            errorBanner.className = "bg-red-600 text-white p-2 font-mono text-[10px] text-center font-bold uppercase tracking-wider z-50 fixed top-0 left-0 w-full shadow-lg";
            errorBanner.innerHTML = `⚠️ OFFLINE LOCAL MATRIX RUNTIME ENGAGED | REASON: ${reasonString}`;
            document.body.appendChild(errorBanner);

            renderERP();
        }

        // --- 4. MAIN UI DESKTOP RENDERING INTERFACE MODULE ---
        function renderERP() {
            const root = document.getElementById('app-root');
            
            if (!currentUser) {
                // Filter admin status node within active buffer variables
                const hasAdmin = dbStaff.some(u => u.role === 'Master Admin');

                if (!hasAdmin) {
                    root.innerHTML = `

                                    <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                                </div>
                                <form id="setup-form" class="space-y-4 text-xs">
                                    <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Pass Key Code</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase transition-colors font-sans">Initialize Database Lock</button>
                                </form>
                            </div>
                        </div>
                    `;
                    document.getElementById('setup-form').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        const name = document.getElementById('setup-name').value.trim();
                        const pass = document.getElementById('setup-pass').value.trim();
                        
                        const newAdmin = { name, role: 'Master Admin', pass, base_salary: 150000, status: 'Active', allotted_work: 'All Site Nodes' };
                        if(supabase && !document.body.innerText.includes("OFFLINE")) {
                            await supabase.from('staff').insert([newAdmin]);
                        } else {
                            dbStaff.push(newAdmin); localStorage.setItem('vantage_staff', JSON.stringify(dbStaff));
                        }
                        alert("Master Profile Generated Successfully!"); location.reload();
                    });
                } else {
                    root.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                            <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                                <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                                <form id="login-form" class="space-y-4 text-xs">
                                    <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase font-sans">Authenticate App</button>
                                </form>
                            </div>
                        </div>
                    `;
                    document.getElementById('login-form').addEventListener('submit', function(e) {
                        e.preventDefault();
                        const name = document.getElementById('login-name').value.trim();
                        const pass = document.getElementById('login-pass').value.trim();
                        
                        const user = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                        if (user) {
                            if(user.status === 'Blocked' || user.status === 'Terminated') { alert("Access suspended."); return; }
                            currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP();
                        } else { alert("Verification Mismatch."); }
                    });
                }
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs pt-6">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div class="overflow-y-auto max-h-[85vh]">
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Core Command</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('site-photos')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'site-photos' ? 'bg-blue-600 text-white' : 'text-emerald-400 hover:bg-gray-800'}">📷 Site Photo Vault</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Nodes</button>
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED PRIVILEGES</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 LOGOUT PORTAL</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        // --- 5. RENDER TAB HANDLER MODULE CONTENTS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Projects</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Sites</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Telemetry Log</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbOdometer.length} Logs</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Storage Godowns</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Units</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Total Personnel</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbStaff.length} Accounts</h3></div>
                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-blue-400 font-mono font-bold uppercase tracking-wider">⚡ VANTAGE MATRIX UNFREEZE ENGINE ONLINE AND LIVE. READY FOR PARAMETER ENTRIES.</div>
                `;
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">

                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><label class="block text-gray-400 mb-1">Select Active Project</label><select id="sheet-project-node" class="bg-darkBg border border-borderGray p-2 rounded text-white w-48">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                        <div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold"><th>Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th>Formula</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold font-sans"><th class="p-3">Saved Registry Storage Logs</th><th class="p-3 text-center">Span Section Target</th><th class="p-3 text-right">Yield Quantity</th></tr>${dbMeasurements.map(m=>`<tr class="border-b border-borderGray font-mono"><td class="p-3 text-white font-sans font-bold">${m.project}</td><td class="p-3 text-center text-gray-400">${m.span}</td><td class="p-3 text-right text-blue-400 font-bold">${m.yield_output || m.yield}</td></tr>`).join('')}</table></div>
                    </div>
                `;
                buildExcelRowsMatrixHTML();
            }

            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Storage & Godown Hub</h3><div class="flex space-x-2">${isAdmin?`<button onclick="openModal('g-mod')" class="bg-gray-800 px-3 py-1 rounded font-bold">+ Create Godown</button><button onclick="openModal('s-mod')" class="bg-emerald-950 text-emerald-400 px-3 py-1 rounded font-bold">+ Stock Inward</button>`:''}<button onclick="openModal('d-mod')" class="bg-blue-600 px-3 py-1 rounded font-bold">+ Dispatch to Site</button></div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 font-sans"><h4 class="text-gray-400 font-bold uppercase mb-2">Registered Godowns</h4><div class="space-y-1">${dbGodowns.map(g=>`<div class="bg-darkBg p-2 rounded border border-borderGray font-bold text-white">${g.name}</div>`).join('')}</div></div>
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 lg:col-span-2"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Warehouse Location</th><th class="p-2">Material</th><th class="p-2 text-right">Balance Stock</th></tr>${dbStockBook.map(s=>`<tr><td class="p-2 text-gray-400">${s.godown_name || s.godownName}</td><td class="p-2 text-white font-bold">${s.item}</td><td class="p-2 text-right text-blue-400 font-bold font-mono">${s.qty} ${s.unit}</td></tr>`).join('')}</table></div>
                        </div>
                    </div>
                    
                    <div id="g-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3"><h4 class="font-bold text-white text-xs">🏢 Create Godown Profile</h4><form id="g-form" class="space-y-2"><input type="text" id="g-name" placeholder="Godown Name" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="text" id="g-loc" placeholder="Address" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Commit Profile</button></form></div>

                    <div id="s-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">

                document.getElementById('g-form')?.addEventListener('submit', async function(e){

                    const n = document.getElementById('g-name').value.trim(); const l = document.getElementById('g-loc').value.trim();
                    if(document.body.innerText.includes("OFFLINE")) {
                        dbGodowns.push({ name:n, location:l }); localStorage.setItem('vantage_godowns', JSON.stringify(dbGodowns));
                    } else { await supabase.from('godowns').insert([{ name: n, location: l }]); }
                    closeModal('g-mod'); location.reload();
                });
                document.getElementById('s-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();

                    const qty = Number(document.getElementById('st-qty').value); const unit = document.getElementById('st-unit').value.trim();
                    const match = dbStockBook.find(x => (x.godown_name||x.godownName)===g && x.item.toLowerCase()===item.toLowerCase());
                    if(match) {
                        match.qty += qty;
                        if(!document.body.innerText.includes("OFFLINE")) { await supabase.from('stock_book').update({ qty: match.qty }).eq('id', match.id); }

                        if(document.body.innerText.includes("OFFLINE")) { dbStockBook.push({ godownName:g, item, qty, unit }); }

                    }
                    if(document.body.innerText.includes("OFFLINE")) localStorage.setItem('vantage_stock_book', JSON.stringify(dbStockBook));

                    </div>
                    <div id="f-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-3"><h4 class="font-bold text-white text-sm">Record Transaction</h4><form id="f-form" class="space-y-2"><select id="f-stream" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold"><option value="Payment OUT">📉 Payment OUT (Expense)</option><option value="Payment IN">📈 Payment IN (Inflow)</option></select><input type="text" id="f-cat" placeholder="Category Type (e.g. Material Purchase)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><select id="f-proj" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select><input type="number" id="f-amt" placeholder="Amount (₹)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono"><input type="text" id="f-desc" placeholder="Remarks Summary Description" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Commit Entry</button></form></div>
                    </div>
                `;
                document.getElementById('f-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();
                    const newFin = { date: new Date().toISOString().split('T')[0], stream: document.getElementById('f-stream').value, category: document.getElementById('f-cat').value, project: document.getElementById('f-proj').value, user: currentUser.name, amount: Number(document.getElementById('f-amt').value), desc: document.getElementById('f-desc').value, status:'Approved' };
                    if(document.body.innerText.includes("OFFLINE")) { dbFinancials.unshift(newFin); localStorage.setItem('vantage_financials', JSON.stringify(dbFinancials)); }
                    else { await supabase.from('financials').insert([newFin]); }
                    closeModal('f-mod'); location.reload();
                });
            }

            else if (currentTab === "staff-mgmt") {
                if (!isAdmin) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Human Capital Assets Control Panel</h3><button onclick="openModal('s-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold font-sans transition-colors">+ Provision Profile Node</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left text-xs"><tr class="bg-darkBg font-bold text-gray-400 border-b border-borderGray uppercase"><th class="p-3">Identity Name</th><th class="p-3">Clearance Designation</th><th class="p-3">Security Password Key</th><th class="p-3 text-right">Base Salary Matrix Rate</th></tr>
                        ${dbStaff.map(s=>{
                            return `<tr class="border-b border-borderGray font-medium"><td class="p-3 text-white font-bold">${s.name}</td><td class="p-3 text-gray-400"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded text-gray-300">${s.role}</span></td><td class="p-3 font-mono text-gray-500">${s.pass}</td><td class="p-3 text-right font-mono text-blue-400 font-bold">₹${Number(s.base_salary || s.baseSalary).toLocaleString()}</td></tr>`;
                        }).join('')}</table></div>
                    </div>
                    <div id="s-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-3"><h4 class="font-bold text-white text-xs">Provision New Node</h4><form id="s-form" class="space-y-2"><input type="text" id="s-name" placeholder="Full Identity Name ID" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><select id="s-role" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><option value="Engineer">Civil Site Engineer</option><option value="Accountant">Accountant / surveyor node</option></select><input type="text" id="s-pass" placeholder="Security Password Key" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="number" id="s-salary" placeholder="Salary Sum (₹)" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><button type="submit" class="w-full bg-blue-600 p-2 rounded text-white font-bold">Deploy Profile Profile Node</button></form></div>
                    </div>
                `;
                document.getElementById('s-form')?.addEventListener('submit', async function(e){
                    e.preventDefault();
                    const newStaff = { name: document.getElementById('s-name').value.trim(), role: document.getElementById('s-role').value, pass: document.getElementById('s-pass').value.trim(), base_salary: Number(document.getElementById('s-salary').value), status: 'Active', allotted_work: 'All Site Nodes' };
                    if(document.body.innerText.includes("OFFLINE")) { dbStaff.push(newStaff); localStorage.setItem('vantage_staff', JSON.stringify(dbStaff)); }
                    else { await supabase.from('staff').insert([newStaff]); }
                    closeModal('s-mod'); location.reload();
                });
            }
            
            else { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-600 uppercase tracking-widest">[ Selected Operational Node Component Frame Open ]</div>`; }
        }

        // --- 6. EXCEL MATRIX COMPILER SYSTEMS ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `
                    <tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center text-white focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td>
                        <td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td>
                        <td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td>
                        <td class="p-1 border-r border-borderGray font-bold font-sans">Multiply</td>
                        <td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        async function saveExcelDataMatrix() {
            const project = document.getElementById('sheet-project-node').value;
            const insertRows = activeExcelRows.map(row => ({
                project, span: `${row.chainageFrom} to ${row.chainageTo} (L: ${row.computedLength}m)`,
                avg_width: Number(row.computedAvgWidth.toFixed(3)),
                yield_output: row.thickness ? `${row.yieldResult.toFixed(3)} m³` : `${row.yieldResult.toFixed(2)} m²`
            }));
            if(document.body.innerText.includes("OFFLINE")) {
                insertRows.forEach(r => dbMeasurements.unshift(r)); localStorage.setItem('vantage_measurements', JSON.stringify(dbMeasurements));
            } else { await supabase.from('measurements').insert(insertRows); }
            alert("Spreadsheet parameters batch stored successfully.");
            activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }];
            location.reload();
        }

        async function deleteProjectCloud(id) { if(confirm("Purge Node?")) { await supabase.from('projects').delete().eq('id', id); location.reload(); } }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        syncSupabaseCloudAndRender();
    </script>
</body>
</html>
