                const data = await response.json();

            } catch (e) { return fallbackMockData; }

            else if (currentTab === "tenders") { container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">Tenders Matrix Nodes</h3>`; }
            else if (currentTab === "geo-viewer") { container.innerHTML = `<div id="vantage-live-map" class="w-full h-[450px]"></div>`; setTimeout(renderLeafletMapLayer, 100); }
            else if (currentTab === "staff-tracking") { container.innerHTML = `<div id="vantage-staff-map" class="w-full h-[450px]"></div>`; setTimeout(renderLeafletRadarLayer, 100); }
        }

        // --- 6. 📋 IMAGE TWO SPECIFIC DYNAMIC MULTI-ROW MATRIX ROW LOGIC ---
        window.buildInvoiceGridRowsHTML = function() {
            const tbody = document.getElementById('invoice-items-tbody');
            if(!tbody) return;

            let grossBaseSum = 0;
            let totalDiscountSum = 0;

            tbody.innerHTML = activeInvoiceRows.map((row, index) => {
                // Dynamic cell cost evaluations
                const rowQty = Number(row.qty || 0);
                const rowPrice = Number(row.price || 0);
                const rowDiscPct = Number(row.discount || 0);
                const rowTaxPct = Number(row.tax || 0);

                const rawAmount = rowQty * rowPrice;
                const discountDeduction = rawAmount * (rowDiscPct / 100);
                const netAfterDiscount = rawAmount - discountDeduction;
                const taxAddition = netAfterDiscount * (rowTaxPct / 100);
                const finalRowAmount = netAfterDiscount + taxAddition;

                grossBaseSum += rawAmount;
                totalDiscountSum += discountDeduction;

                return `
                    <tr class="hover:bg-darkBg/40 transition-colors">
                        <td class="p-2 border-r border-borderGray/40 text-gray-500 font-bold">${index + 1}</td>
                        <td class="p-0 border-r border-borderGray/40">
                            <input type="text" oninput="window.updateInvoiceRowCell(${index}, 'item', this.value)" value="${row.item}" placeholder="Enter specific description..." required class="w-full bg-transparent px-2 py-2.5 focus:outline-none text-left font-sans text-white text-xs font-medium">
                        </td>
                        <td class="p-0 border-r border-borderGray/40">
                            <input type="number" oninput="window.updateInvoiceRowCell(${index}, 'qty', this.value)" value="${row.qty}" required class="w-full bg-transparent p-2 text-center font-mono text-white focus:outline-none">
                        </td>
                        <td class="p-0 border-r border-borderGray/40">
                            <select onchange="window.updateInvoiceRowCell(${index}, 'unit', this.value)" class="w-full bg-transparent p-2 text-center focus:outline-none font-bold text-gray-300">
                                <option value="Sqf" ${row.unit==='Sqf'?'selected':''}>Sqf</option>
                                <option value="Cum" ${row.unit==='Cum'?'selected':''}>Cum</option>
                                <option value="Sqm" ${row.unit==='Sqm'?'selected':''}>Sqm</option>
                                <option value="Tons" ${row.unit==='Tons'?'selected':''}>Tons</option>
                                <option value="Nos" ${row.unit==='Nos'?'selected':''}>Nos</option>
                            </select>
                        </td>
                        <td class="p-0 border-r border-borderGray/40">
                            <input type="number" oninput="window.updateInvoiceRowCell(${index}, 'price', this.value)" value="${row.price}" required class="w-full bg-transparent p-2 text-center font-mono text-blue-400 font-bold focus:outline-none">
                        </td>
                        <td class="p-0 border-r border-borderGray/40">
                            <input type="number" oninput="window.updateInvoiceRowCell(${index}, 'discount', this.value)" value="${row.discount}" class="w-full bg-transparent p-2 text-center font-mono text-red-400 focus:outline-none" placeholder="0">
                        </td>
                        <td class="p-0 border-r border-borderGray/40">
                            <input type="number" oninput="window.updateInvoiceRowCell(${index}, 'tax', this.value)" value="${row.tax}" class="w-full bg-transparent p-2 text-center font-mono text-orange-400 focus:outline-none" placeholder="0">
                        </td>
                        <td class="p-2 border-r border-borderGray/40 text-right pr-4 text-white font-bold font-mono">
                            ₹${finalRowAmount.toFixed(2)}
                        </td>
                        <td class="p-1">
                            <button type="button" onclick="activeInvoiceRows.splice(${index}, 1); window.buildInvoiceGridRowsHTML();" class="text-red-500 hover:text-red-400 text-[10px] px-2 font-bold font-sans uppercase">Purge</button>
                        </td>
                    </tr>
                `;
            }).join('');

            // Update abstract matrix summaries labels
            const grandTotalSum = grossBaseSum - totalDiscountSum;
            document.getElementById('bill-base-lbl').innerText = "₹" + grossBaseSum.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('bill-disc-lbl').innerText = "₹" + totalDiscountSum.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('bill-grand-lbl').innerText = "₹" + grandTotalSum.toLocaleString(undefined, {minimumFractionDigits: 2});
        };

        window.updateInvoiceRowCell = function(index, field, value) {
            activeInvoiceRows[index][field] = (field === 'item' || field === 'unit') ? value : Number(value || 0);
            window.buildInvoiceGridRowsHTML();
        };

        window.addNewInvoiceItemRow = function() {
            activeInvoiceRows.push({ item: "", qty: 1, unit: "Sqf", price: 0, discount: 0, tax: 0 });
            window.buildInvoiceGridRowsHTML();
        };

        window.executeMasterInvoiceSave = async function(e) {
            e.preventDefault();
            
            // Recalculate ultimate aggregate value
            let finalBillAmount = 0;
            activeInvoiceRows.forEach(row => {
                const netRow = (row.qty * row.price) - ((row.qty * row.price) * ((row.discount || 0) / 100));
                finalBillAmount += netRow + (netRow * ((row.tax || 0) / 100));
            });

            const payload = {
                client_or_sub: document.getElementById('inv-type').value,
                name: document.getElementById('inv-party').value.trim(),
                invoice_no: document.getElementById('inv-no').value.trim(),
                date: document.getElementById('inv-date').value,
                bill_amount: Math.round(finalBillAmount)
            };

            const response = await fetch(`${SUPABASE_REST_URL}/billing_invoices`, { 
                method: "POST", 
                headers: cloudHeaders, 
                body: JSON.stringify([payload]) 
            });

            if (response.ok) {
                alert("🎉 Success: Invoice Entry successfully stored inside cloud nodes!");
                window.closeModal('invoice-extraction-modal');
                // Reset defaults back
                activeInvoiceRows = [{ item: "Dismantling of existing residential structure on labor basis", qty: 700, unit: "Sqf", price: 110, discount: 0, tax: 0 }];
                initializeSecurityGatekeeper(); // Refresh layout views
            } else {
                alert("Database transmission failed code error.");
            }
        };

        // --- 7. HARDWARE STREAM AND DISPOSAL DRIVERS ---
        window.closeLiveCameraInterface = function() { 
            if (cameraStream) { 
                try {
                    cameraStream.getTracks().forEach(t => { if(t) t.stop(); });
                } catch(e) {}
                cameraStream = null;
            } 
        };

        function renderLeafletMapLayer() { let m = document.getElementById('vantage-live-map'); if (!m) return; let mo = L.map('vantage-live-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mo); dbProjects.forEach(p => { if (p.lat) L.marker([p.lat, p.lng]).addTo(mo); }); }
        function renderLeafletRadarLayer() { let r = document.getElementById('vantage-staff-map'); if (!r) return; let ro = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(ro); dbStaff.forEach(s => { if (s.lat) L.marker([s.lat, s.lng]).addTo(ro); }); }
        window.buildExcelRowsMatrixHTML = function() { const body = document.getElementById('excel-rows-body'); if(!body) return; body.innerHTML = activeExcelRows.map((row, index) => `<tr class="text-center"><td class="p-2 border-r border-borderGray text-gray-500">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray text-gray-400">25 m</td><td class="p-0 border-r border-borderGray"><input type="number" value="${row.width}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">7.500 m</td><td class="p-0 border-r border-borderGray"><input type="number" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">187.50 m²</td></tr>`).join(''); };

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
