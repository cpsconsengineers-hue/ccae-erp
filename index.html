<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS Consultants - Master Core Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, button, aside, nav, main, div, input, select { pointer-events: auto !important; }
        .nav-btn { width: 100%; text-align: left; padding: 10px; border-radius: 8px; color: #9ca3af; }
        .nav-btn:hover { background: #1f2937; color: white; }
        .nav-active { background: #2563eb; color: white; font-weight: bold; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 text-xs">
    <div id="app" class="flex min-h-screen"></div>

    <script>
        // State Machine
        let state = {
            tab: 'dashboard',
            user: JSON.parse(sessionStorage.getItem('vantage_user')) || null,
            projects: [],
            tenders: [],
            invoices: []
        };

        const renderNav = () => {
            const tabs = [
                { id: 'dashboard', label: '📊 Dashboard' },
                { id: 'lifecycle', label: '🏢 Lifecycle Projects' },
                { id: 'tenders', label: '📄 Tenders Matrix' },
                { id: 'billing', label: '🧾 Billing Invoices' },
                { id: 'materials', label: '📦 Inventory Hub' },
                { id: 'staff-mgmt', label: '👥 Staff Management' },
                { id: 'financial', label: '💰 Ledger' }
            ];
            
            return `
                <aside class="w-64 bg-[#111827] h-screen border-r border-[#1f2937] p-4 fixed">
                    <h1 class="text-white font-bold mb-6">CPS CONSULTANTS</h1>
                    <nav class="space-y-1">
                        ${tabs.map(t => `<button onclick="window.nav('${t.id}')" class="nav-btn ${state.tab === t.id ? 'nav-active' : ''}">${t.label}</button>`).join('')}
                    </nav>
                    <button onclick="window.logout()" class="absolute bottom-4 left-4 bg-red-900/20 text-red-400 p-2 rounded text-[10px]">🔒 LOGOUT</button>
                </aside>
            `;
        };

        window.nav = (id) => { state.tab = id; renderApp(); };
        window.logout = () => { sessionStorage.removeItem('vantage_user'); state.user = null; renderApp(); };
        
        // Main Render Logic
        const renderApp = () => {
            const app = document.getElementById('app');
            if(!state.user) {
                app.innerHTML = `<div class="m-auto p-8 bg-[#111827] border rounded-xl border-[#1f2937]"><form onsubmit="window.login(event)"><input id="u" class="bg-black p-2 w-full mb-2" placeholder="User"><button class="bg-blue-600 w-full p-2">Login</button></form></div>`;
            } else {
                app.innerHTML = `${renderNav()}<main class="ml-64 p-8 w-full"><div id="main-content"></div></main>`;
                renderModuleContent();
            }
        };

        window.login = (e) => { e.preventDefault(); state.user = { name: 'Manoj Singh', role: 'Master Admin' }; sessionStorage.setItem('vantage_user', JSON.stringify(state.user)); renderApp(); };

        const renderModuleContent = () => {
            const content = document.getElementById('main-content');
            if (state.tab === 'billing') {
                content.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <h2 class="text-xl font-bold">INVOICE EXTRACTION</h2>
                        <button onclick="alert('Open Invoice Form')" class="bg-blue-600 px-4 py-2 rounded">+ Create Invoice</button>
                    </div>
                    <table class="w-full bg-[#111827] border border-[#1f2937]">
                        <tr class="border-b border-[#1f2937] text-left"><th class="p-3">Party</th><th class="p-3">Amount</th><th class="p-3">Action</th></tr>
                        <tr><td class="p-3">Geeta Sharma Ji</td><td class="p-3">₹77,000</td><td class="p-3"><button class="text-red-400">Delete</button></td></tr>
                    </table>
                `;
            } else {
                content.innerHTML = `<h2 class="text-xl font-bold">${state.tab.toUpperCase()}</h2><p>Module active.</p>`;
            }
        };

        renderApp();
    </script>
</body>
</html>
