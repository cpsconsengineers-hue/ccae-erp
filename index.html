        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) {
                return fallbackMockData;
            }
        }

                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Advanced Multi-Row Excel M-Book Grid</h3><div class="flex space-x-2"><button onclick="addExcelRow()" class="bg-gray-800 border border-borderGray text-white font-bold px-3 py-1 rounded">+ Insert Row</button><button onclick="saveExcelDataMatrix()" class="bg-blue-600 font-bold px-4 py-1 rounded shadow-lg">💾 Save Spreadsheet</button></div></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><label class="block text-gray-400 mb-1 font-bold">Target Project Site</label><select id="sheet-project-node" class="bg-darkBg border border-borderGray p-2 rounded text-white font-bold w-64">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                        <div class="overflow-x-auto border border-borderGray rounded-xl bg-panelBg"><table class="w-full text-center border-collapse"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Seq</th><th>Chainage From</th><th>Chainage To</th><th>Length</th><th>Width (m)</th><th>Avg Width</th><th>Thickness (m)</th><th class="text-right pr-4 text-blue-400">Yield Output</th></tr><tbody id="excel-rows-body" class="divide-y divide-borderGray font-mono"></tbody></table></div>
                    </div>
                `; buildExcelRowsMatrixHTML();
            }
            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Storage Hub Pipeline</h3><div class="flex space-x-2">${hasInventoryAdminRights ? `<button onclick="openModal('g-mod')" class="bg-gray-800 px-3 py-1 rounded font-bold">+ Create Godown</button><button onclick="openModal('s-mod')" class="bg-emerald-950 text-emerald-400 px-3 py-1 rounded font-bold">+ Stock Inward</button>` : ''}<button onclick="openModal('d-mod')" class="bg-blue-600 text-white px-3 py-1 rounded font-bold">🔄 Transfer Material</button></div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4"><div class="bg-panelBg border border-borderGray p-4 rounded-xl font-sans"><h4 class="text-gray-400 font-bold uppercase mb-2 text-[10px]">Warehouses</h4><div class="space-y-1">${dbGodowns.map(g=>`<div class="bg-darkBg p-2.5 rounded border border-borderGray font-bold text-white">${g.name}</div>`).join('')}</div></div><div class="bg-panelBg border border-borderGray p-4 rounded-xl lg:col-span-2"><table class="w-full text-left"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Godown</th><th>Material</th><th class="text-right pr-4">Stock</th></tr>${dbStockBook.map(s=>`<tr><td class="p-2 text-gray-400">${s.godown_name}</td><td class="p-2 text-white font-bold">${s.item}</td><td class="p-2 text-right text-blue-400 font-bold font-mono pr-4">${s.qty} ${s.unit}</td></tr>`).join('')}</table></div></div>
                    </div>
                `;
            }
            else if (currentTab === "machinery") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">⚙️ Machinery Assets Log</h3></div>`;
            }
            else if (currentTab === "tenders") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📄 Tender Pipeline Registry</h3></div>`;
            }
            else if (currentTab === "financial") {
                if (!hasProjectRights) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider"> Central Financial Ledger</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left border-collapse text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray font-bold uppercase"><th class="p-3">Date</th><th>Stream</th><th>Category Component</th><th>Project Site</th><th class="text-right pr-4">Transaction Value</th></tr>
                        ${dbFinancials.map(f=>`<tr class="border-b border-borderGray"><td class="p-3 font-mono text-gray-500">${f.date}</td><td class="p-3 font-bold">${f.stream}</td><td class="p-3 text-gray-300 font-medium">${f.category}</td><td class="p-3 text-gray-400">${f.project}</td><td class="p-3 text-right font-bold font-mono pr-4 text-gray-200">₹${f.amount}</td></tr>`).join('')}</table></div>
                    </div>
                `;
            }
            else {
                // UNIVERSAL VIEW WITH DYNAMIC INPUT MODALS FOR REST OF THE 15 HEADS
                container.innerHTML = `
                    <div class="bg-panelBg border border-borderGray rounded-xl p-6 space-y-4 shadow-xl">
                        <div class="border-b border-borderGray pb-3 flex justify-between items-center">
                            <h3 class="font-bold text-white uppercase tracking-wider text-xs">✨ Active Management Node Component Module: [${currentTab.toUpperCase().replace('-',' ')}]</h3>
                            <button onclick="openModal('universal-dyn-mod')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded font-sans transition-colors shadow-md">+ Add New Operational Log Entry</button>
                        </div>
                        <div class="p-8 bg-darkBg border border-borderGray border-dashed rounded-xl text-center font-mono">
                            <span class="text-blue-400 font-bold block mb-1 uppercase tracking-widest">[ ACCESS LAYERS RUNNING ]</span>
                            <span class="text-gray-500 text-[10px]">Awaiting inputs mapping parameters schema vector endpoint: /rest/v1/${currentTab}</span>
                        </div>
                    </div>
                    <div id="universal-dyn-mod" class="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white text-xs uppercase tracking-wider">📝 LOG NEW FIELD DATA PACKET</h4>
                            <form id="universal-dyn-form" class="space-y-3" onsubmit="executeUniversalDynamicSubmit(event)">
                                <input type="text" id="dyn-log-desc" required placeholder="Enter logging details or context data string..." class="w-full bg-darkBg border border-borderGray p-3 rounded text-white focus:outline-none">
                                <input type="number" id="dyn-log-val" placeholder="Valuation sum metric reference (Optional)" class="w-full bg-darkBg border border-borderGray p-3 rounded text-white font-mono focus:outline-none">
                                <button type="submit" class="w-full bg-blue-600 font-bold py-2.5 rounded uppercase tracking-wider shadow-md">Commit Parameters Matrix</button>
                                <button type="button" onclick="closeModal('universal-dyn-mod')" class="w-full bg-gray-800 text-gray-300 font-bold py-2 rounded uppercase border border-borderGray">❌ Close / Back</button>
                            </form>
                        </div>
                    </div>
                `;
            }
        }

        // --- 5. ISOLATED FORM COMPILATION PROCESSORS ---
        async function executeProjectSubmit(e) {
            e.preventDefault();
            const payload = [{ 
                name: document.getElementById('p-name').value, 
                client: document.getElementById('p-client').value, 
                location: document.getElementById('p-loc').value, 
                lat: Number(document.getElementById('p-lat').value),
                lng: Number(document.getElementById('p-lng').value),
                contract_value: Number(document.getElementById('p-val').value) 
            }];
            await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('p-mod'); initializeSecurityGatekeeper();
        }

        function triggerProjectEdit(id, name, client, loc, val, lat, lng) {
            document.getElementById('edit-p-id').value = id;
            document.getElementById('edit-p-name').value = name;
            document.getElementById('edit-p-client').value = client;
            document.getElementById('edit-p-loc').value = loc;
            document.getElementById('edit-p-val').value = val;
            document.getElementById('edit-p-lat').value = lat;
            document.getElementById('edit-p-lng').value = lng;
            openModal('p-edit-mod');
        }

        async function executeProjectModifySubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-p-id').value;
            const payload = {
                name: document.getElementById('edit-p-name').value,
                client: document.getElementById('edit-p-client').value,
                location: document.getElementById('edit-p-loc').value,
                lat: Number(document.getElementById('edit-p-lat').value),
                lng: Number(document.getElementById('edit-p-lng').value),
                contract_value: Number(document.getElementById('edit-p-val').value)
            };
            await fetch(`${SUPABASE_REST_URL}/projects?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('p-edit-mod'); alert("Project map markers modified and frozen successfully!"); initializeSecurityGatekeeper();
        }

        async function executeGodownSubmit(e) {
            e.preventDefault();
            const payload = [{ name: document.getElementById('g-name').value.trim(), location: document.getElementById('g-loc').value.trim() }];
            await fetch(`${SUPABASE_REST_URL}/godowns`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('g-mod'); initializeSecurityGatekeeper();
        }

        async function executeInwardSubmit(e) {
            e.preventDefault();
            const payload = [{ godown_name: document.getElementById('st-godown').value, item: document.getElementById('st-item').value.trim(), qty: Number(document.getElementById('st-qty').value), unit: document.getElementById('st-unit').value.trim() }];
            await fetch(`${SUPABASE_REST_URL}/stock_book`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            closeModal('s-mod'); initializeSecurityGatekeeper();
        }

        async function executeUniversalDynamicSubmit(e) {
            e.preventDefault();
            const payload = [{ category_node: currentTab, log_description: document.getElementById('dyn-log-desc').value.trim(), metric_value: Number(document.getElementById('dyn-log-val').value || 0), timestamp: new Date().toISOString(), operator_identity: currentUser.name }];
            await fetch(`${SUPABASE_REST_URL}/financials`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            alert("Success: Record saved to cloud matrix!"); closeModal('universal-dyn-mod'); initializeSecurityGatekeeper();
        }

        async function deleteRowCloud(table, id) {
            if(confirm("Purge Record?")) {
                const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders });
                if(response.ok) { alert("Data purged successfully."); initializeSecurityGatekeeper(); }
            }
        }

        // --- 6. EXCEL SHEET COMPILER ENGINE SYSTEMS ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `<tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center text-white focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center text-white focus:outline-none"></td><td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
