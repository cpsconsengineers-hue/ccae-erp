<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS ERP | OPERATIONAL CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen">

    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4">
        <h1 class="text-blue-500 font-bold mb-6">CPS COMMAND CENTER</h1>
        <div id="nav-menu" class="space-y-4"></div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h2 class="text-xl font-bold mb-6 text-emerald-400">OPERATIONAL MODULES (Access: All)</h2>
        <div id="op-widgets" class="grid grid-cols-3 gap-4 mb-10"></div>
        
        <h2 id="admin-title" class="text-xl font-bold mb-6 text-red-400">RESTRICTED MODULES (Access: Admin/Accountant Only)</h2>
        <div id="admin-widgets" class="grid grid-cols-3 gap-4"></div>
    </main>

    <script>
        const modules = [
            { name: 'Live Projects', type: 'op' }, { name: 'Site Photos', type: 'op' }, 
            { name: 'Inventory Hub', type: 'op' }, { name: 'Attendance', type: 'op' },
            { name: 'Measurement', type: 'op' }, { name: 'Machinery', type: 'op' },
            { name: 'Subcontractors', type: 'op' }, { name: 'Executive Dashboard', type: 'op' },
            { name: 'Financial Ledger', type: 'admin' }, { name: 'Live Tracking', type: 'admin' },
            { name: 'Billing Section', type: 'admin' }, { name: 'Petty Cash', type: 'admin' },
            { name: 'Tenders Matrix', type: 'admin' }, { name: 'Telemetry', type: 'admin' },
            { name: 'Staff Identity', type: 'admin' }
        ];

        function initApp() {
            const userRole = 'Admin'; // यहाँ से रोल हैंडल करें
            const opContainer = document.getElementById('op-widgets');
            const adminContainer = document.getElementById('admin-widgets');
            const adminTitle = document.getElementById('admin-title');

            modules.forEach(m => {
                const html = `<div class="bg-gray-900 p-6 rounded border border-gray-700 hover:border-blue-500 cursor-pointer" onclick="openModule('${m.name}')">
                    <h3 class="font-bold">${m.name}</h3>
                    <p class="text-[10px] text-gray-500">OPERATIONAL</p>
                </div>`;
                
                if(m.type === 'op') {
                    opContainer.innerHTML += html;
                } else if(userRole === 'Admin') {
                    adminContainer.innerHTML += html;
                }
            });

            // Staff ke liye Restricted section hide karein
            if(userRole !== 'Admin') {
                adminContainer.style.display = 'none';
                adminTitle.style.display = 'none';
            }
        }

        function openModule(name) {
            alert(name + " module is now operational. Redirecting to workspace...");
        }

        initApp();
    </script>
</body>
</html>
