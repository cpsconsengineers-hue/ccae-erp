<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS Vantage - Final Stable Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force pointer events on all sidebar buttons to prevent freezing */
        button { pointer-events: auto !important; cursor: pointer !important; }
        .tab-content { display: none; }
        .tab-active { display: block !important; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 text-xs">
    <div id="app" class="flex">
        <aside class="w-64 bg-[#111827] h-screen border-r border-[#1f2937] p-4 fixed">
            <h1 class="text-white font-bold mb-6">CPS CONSULTANTS</h1>
            <nav id="sidebar-nav" class="space-y-1"></nav>
        </aside>
        <main class="ml-64 p-8 w-full" id="content-area"></main>
    </div>

    <script>
        const tabs = [
            { id: 'dashboard', label: '📊 Dashboard' },
            { id: 'lifecycle', label: '🏢 Lifecycle Projects' },
            { id: 'measurements', label: '📐 M-Book Sheets' },
            { id: 'site-photos', label: '📷 Site Photos' },
            { id: 'materials', label: '📦 Inventory Hub' },
            { id: 'tenders', label: '📄 Tenders Matrix' },
            { id: 'billing', label: '🧾 Billing Invoices' },
            { id: 'subcontractors', label: '👥 Subcontractor Masters' },
            { id: 'financial', label: '💰 Financial Ledger' },
            { id: 'staff-mgmt', label: '👥 Staff Management' }
        ];

        function renderNav() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = tabs.map(t => `<button onclick="showTab('${t.id}')" class="w-full text-left p-2 rounded hover:bg-blue-600">${t.label}</button>`).join('');
        }

        window.showTab = (tabId) => {
            const content = document.getElementById('content-area');
            content.innerHTML = `<h2 class="text-2xl font-bold mb-4">${tabId.replace(/-/g, ' ').toUpperCase()}</h2><div id="module-data">Active Content Module...</div>`;
            // Add specific rendering logic for each module here
        };

        renderNav();
        window.showTab('dashboard');
    </script>
</body>
</html>
