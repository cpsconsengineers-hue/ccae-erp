<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }

        }

    <style>
        .leaflet-container { background: #0b0f19 !important; border-radius: 12px; }

    </style>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root" class="min-h-screen w-full relative">
        <div class="min-h-screen flex items-center justify-center bg-darkBg">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-gray-400 font-mono tracking-widest uppercase text-[10px]">INITIALIZING INVENTORY MATRIX INTERFACE v38...</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DATABASES & CONFIG CONFIGURATION ---
        const SUPABASE_REST_URL = "https://nshstymfggjffuhstghw.supabase.co/rest/v1";
        const API_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        const cloudHeaders = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        let dbProjects = []; let dbStaff = []; let dbGodowns = []; let dbStockBook = []; 
        let dbMeasurements = []; let dbTenders = []; let dbPhotos = [];
        let dbShiftingLogs = []; let dbReturnLogs = []; let dbInwardLogs = [];

        let currentTab = "materials"; // Defualt focus on requested Inventory Node
        let currentUser = JSON.parse(sessionStorage.getItem('vantage_active_session')) || null;
        
        let activeExcelRows = [{ chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply' }];
        let cameraStream = null;

        // --- 2. GLOBAL CRASH-PROOF ROUTER SYSTEM ---
        function switchTab(tabId) {
            if (cameraStream) {
                try {
                    cameraStream.getTracks().forEach(track => { if (track) track.stop(); });
                } catch(err) { console.warn("Stream cleanup caught."); }
                cameraStream = null;
            }
            currentTab = tabId;
            renderERP();
        }
        window.switchTab = switchTab;

        window.logoutSession = function() {
            currentUser = null;
            sessionStorage.removeItem('vantage_active_session');
            location.reload();
        };

        window.openModal = function(id) { document.getElementById(id).classList.remove('hidden'); };
        window.closeModal = function(id) { document.getElementById(id).classList.add('hidden'); };

        // --- 3. DATABASE REST FETCH PIPELINE ---
        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return data && data.length > 0 ? data : fallbackMockData;
            } catch (e) { return fallbackMockData; }
        }

        async function initializeSecurityGatekeeper() {
            try {
                dbStaff = await fetchNativeTable('staff', [
                    { id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'CPS2026', base_salary: 150000, status: 'Active', lat: 24.5854, lng: 73.7125 }
                ]);
                dbProjects = await fetchNativeTable('projects', [
                    { id: "1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur", contract_value: 4500000 },
                    { id: "2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", contract_value: 7500000 }
                ]);
                dbGodowns = await fetchNativeTable('godowns', [
                    { id: "g1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" },
                    { id: "g2", name: "Savina Main Branch Store", location: "Savina, Udaipur" }
                ]);
                dbStockBook = await fetchNativeTable('stock_book', [
                    { id: "s1", godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" },
                    { id: "s2", godown_name: "Savina Main Branch Store", item: "8mm TMT Steel Reinforcement", qty: 4.5, unit: "Tons" }
                ]);
                dbTenders = await fetchNativeTable('tenders', []);
                dbPhotos = await fetchNativeTable('site_photos', []);
                dbMeasurements = await fetchNativeTable('measurements', []);
                
                // Inventory Operations Tracking
                dbShiftingLogs = await fetchNativeTable('shifting_logs', []);
                dbReturnLogs = await fetchNativeTable('return_logs', []);
                dbInwardLogs = await fetchNativeTable('material_inward', []);
            } catch (e) { console.error("Database stack setup loaded."); }
            renderERP();
        }

        // --- 4. TERMINAL INTERFACE TEMPLATE ---
        function renderERP() {
            const root = document.getElementById('app-root');
            if (!root) return;
            
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2>
                                <p class="text-xs text-blue-500 font-mono mt-1 uppercase tracking-widest">[ SECURITY ACCESS TERMINAL ]</p>
                            </div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Password</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('login-name').value.trim();
                    const pass = document.getElementById('login-pass').value.trim();
                    const userMatch = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                    if (userMatch) { currentUser = userMatch; sessionStorage.setItem('vantage_active_session', JSON.stringify(userMatch)); renderERP(); } 
                    else { alert("Authentication Failure!"); }
                });
                return;
            }

            const isMasterAdmin = (currentUser.role === 'Master Admin' || currentUser.name.toLowerCase() === 'manoj singh');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0 h-screen sticky top-0 overflow-y-auto">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-500 font-bold uppercase">Control Core Center</p></div>
                            <nav class="p-3 space-y-1">
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-1">Main Intel</p>
                                <button type="button" onclick="window.switchTab('dashboard')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-2">Project Controls</p>
                                <button type="button" onclick="window.switchTab('lifecycle')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">🏢 Lifecycle Projects</button>
                                <button type="button" onclick="window.switchTab('measurements')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📐 M-Book Spreadsheet</button>
                                <button type="button" onclick="window.switchTab('tenders')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'tenders' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📄 Tenders Matrix Nodes</button>
                                <button type="button" onclick="window.switchTab('site-photos')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'site-photos' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📷 Site Photo Updates</button>
                                
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-2">Advanced Supply Chain</p>
                                <button type="button" onclick="window.switchTab('materials')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📦 Inventory Hub (Godowns)</button>
                                <button type="button" onclick="window.switchTab('material-inward')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'material-inward' ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-gray-800'}">📥 Material Inward Registry</button>
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate">👤 ${currentUser.name}</p>
                            <p class="text-[9px] text-emerald-400 uppercase font-mono font-bold mb-2">${currentUser.role}</p>
                            <button type="button" onclick="window.logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold border border-borderGray text-[10px]">🔒 LOGOUT</button>
                        </div>
                    </aside>
                    <main class="flex-1 p-6 bg-darkBg min-h-screen overflow-y-auto"><div id="tab-content-window"></div></main>
                </div>
            `;
            renderTabContent();
        }

        // --- 5. COMPONENT DOM WORKSPACE MATRIX ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            if(!container) return;

            if (currentTab === "dashboard") {
                container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">Dashboard</h3><p class="text-gray-400 mt-2">Welcome back to CPS Consultants Command Panel.</p>`;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">Lifecycle Projects</h3><div class="grid grid-cols-2 gap-4 mt-4">${dbProjects.map(p=>`<div class="bg-panelBg border border-borderGray p-4 rounded-xl"><h4 class="font-bold text-white mb-2">${p.name}</h4><p class="text-gray-400">Client: ${p.client}</p><p class="text-gray-400">Location: ${p.location}</p></div>`).join('')}</div>`;
            }

            else if (currentTab === "tenders") {
                container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">Tenders Matrix Control Nodes</h3><p class="text-gray-400 mt-2">No custom data entries loaded.</p>`;
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">📐 Measurement Sheets (M-Book)</h3>`;
            }

            else if (currentTab === "site-photos") {
                container.innerHTML = `<h3 class="text-sm font-bold text-white uppercase tracking-wider">📷 Site Photo Updates</h3>`;
            }

            // --- UPGRADED INVENTORY HUB MODULES ---
            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex flex-wrap gap-2 justify-between items-center border-b border-borderGray pb-3">
                            <div>
                                <h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 INVENTORY HUB (GODOWN CONTROL PLATFORM)</h3>
                                <p class="text-[10px] text-gray-400 mt-0.5">Manage stock pools, create godowns, shift materials between locations or return stocks back to vendors.</p>
                            </div>
                            <div class="flex gap-2">
                                <button type="button" onclick="window.openModal('mod-add-godown')" class="bg-gray-800 border border-borderGray hover:bg-gray-700 text-white px-3 py-1.5 rounded font-bold uppercase text-[10px]">🏢 Create Godown</button>
                                <button type="button" onclick="window.openModal('mod-add-stock')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-bold uppercase text-[10px] shadow-md">+ Add Direct Stock</button>
                                <button type="button" onclick="window.openModal('mod-shift-material')" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-1.5 rounded font-bold uppercase text-[10px] shadow-md">🔄 Shift Stock (Godown/Site)</button>
                                <button type="button" onclick="window.openModal('mod-return-shop')" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded font-bold uppercase text-[10px] shadow-md">↩️ Return to Shop</button>
                            </div>
                        </div>

                        <div class="bg-panelBg border border-borderGray rounded-xl p-4">
                            <h4 class="text-white font-bold uppercase text-[10px] mb-3 tracking-widest text-blue-400">📊 Live Stock Level Audit Matrix</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-darkBg text-gray-400 font-bold uppercase text-[9px] border-b border-borderGray">
                                            <th class="p-2.5">Allocation Godown Location</th>
                                            <th class="p-2.5">Material Item Name</th>
                                            <th class="p-2.5">Current Available Qty</th>
                                            <th class="p-2.5">Measurement Unit</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-borderGray/60 font-mono text-gray-300">
                                        ${dbStockBook.length === 0 ? `<tr><td colspan="4" class="p-4 text-center text-gray-500">No Inventory Items Available.</td></tr>` : 
                                        dbStockBook.map(s => `
                                            <tr class="hover:bg-darkBg/30">
                                                <td class="p-2.5 text-white font-sans font-medium">${s.godown_name}</td>
                                                <td class="p-2.5 text-blue-400 font-bold">${s.item}</td>
                                                <td class="p-2.5 text-emerald-400 font-bold">${s.qty}</td>
                                                <td class="p-2.5 text-gray-400 text-[10px] uppercase">${s.unit}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="mod-add-godown" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white uppercase border-b border-borderGray pb-2">🏢 REGISTER NEW WAREHOUSE / GODOWN</h4>
                            <form onsubmit="window.submitNewGodown(event)" class="space-y-3">
                                <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Godown Name</label><input type="text" id="g-name" required placeholder="e.g. Sukher Industrial Area Yard" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none"></div>
                                <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Geographic Location Address</label><input type="text" id="g-loc" required placeholder="Udaipur, Rajasthan" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none"></div>
                                <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold uppercase text-[10px]">Save Godown</button><button type="button" onclick="window.closeModal('mod-add-godown')" class="bg-gray-800 text-gray-300 px-4 py-2 rounded uppercase text-[10px]">Cancel</button></div>
                            </form>
                        </div>
                    </div>

                    <div id="mod-add-stock" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white uppercase border-b border-borderGray pb-2">📥 INJECT DIRECT INVENTORY ENTRY</h4>
                            <form onsubmit="window.submitDirectStock(event)" class="space-y-3">
                                <div>
                                    <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Select Godown Destination</label>
                                    <select id="s-godown" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-medium">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select>
                                </div>
                                <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Item Material Name</label><input type="text" id="s-item" required placeholder="e.g. Coarse Sand / Bajri" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none"></div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Quantity</label><input type="number" step="any" id="s-qty" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono focus:outline-none"></div>
                                    <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Unit</label><input type="text" id="s-unit" placeholder="Bags / Tons / Brass" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none"></div>
                                </div>
                                <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold uppercase text-[10px]">Commit Inventory</button><button type="button" onclick="window.closeModal('mod-add-stock')" class="bg-gray-800 text-gray-300 px-4 py-2 rounded uppercase text-[10px]">Cancel</button></div>
                            </form>

                                        <optgroup label="Godowns">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</optgroup>
                                        <optgroup label="Active Sites">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</optgroup>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Destination Node (To Where Godown/Site)</label>
                                    <select id="shift-to" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-medium">
                                        <optgroup label="Active Sites">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</optgroup>

                                <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Material Item Name</label><input type="text" id="shift-item" required placeholder="e.g. 53 Grade Cement" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"></div>

                                    <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Quantity to Shift</label><input type="number" step="any" id="shift-qty" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono"></div>
                                    <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Unit</label><input type="text" id="shift-unit" required placeholder="Bags / Brass" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"></div>

                                <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-amber-600 text-white py-2 rounded font-bold uppercase text-[10px]">Execute Node Shifting</button><button type="button" onclick="window.closeModal('mod-shift-material')" class="bg-gray-800 text-gray-300 px-4 py-2 rounded uppercase text-[10px]">Cancel</button></div>

                                <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Shop / Vendor Name</label><input type="text" id="ret-shop" required placeholder="e.g. Shrinath Hardware & Marbles" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"></div>
                                <div>
                                    <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Return Source From Godown</label>
                                    <select id="ret-godown" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-medium">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select>

                                    <div><label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Returned Qty</label><input type="number" step="any" id="ret-qty" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono"></div>

            else if (currentTab === "material-inward") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-borderGray pb-2">
                            <div>
                                <h3 class="text-sm font-bold text-white uppercase tracking-wider">📥 UPGRADED MATERIAL INWARD REGISTRY Matrix</h3>
                                <p class="text-[10px] text-gray-400 mt-0.5">Log fresh purchases into structural database records.</p>
                            </div>
                            <button type="button" onclick="window.openModal('mod-log-inward')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded font-sans uppercase text-[10px] shadow-md tracking-wider">+ Log Purchased Inward Material</button>
                        </div>

                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left border-collapse text-xs">
                                <thead>
                                    <tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase text-[9px] tracking-wider">
                                        <th class="p-3">Purchased Item Name</th>
                                        <th class="p-3">Received Quantity</th>
                                        <th class="p-3">Measurement Unit</th>
                                        <th class="p-3">Target Allocated Godown</th>
                                        <th class="p-3">Timestamp Logged</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-borderGray font-mono text-gray-300">
                                    ${dbInwardLogs.length === 0 ? `<tr><td colspan="5" class="p-4 text-center text-gray-600 font-sans">No inward transactions registered yet. Click button above to add.</td></tr>` : 
                                    dbInwardLogs.map(i => `
                                        <tr class="hover:bg-darkBg/40">
                                            <td class="p-3 text-white font-sans font-bold">${i.item}</td>
                                            <td class="p-3 text-blue-400 font-bold">${i.qty}</td>
                                            <td class="p-3 text-gray-400 uppercase text-[10px]">${i.unit}</td>
                                            <td class="p-3 font-sans text-gray-300">${i.godown_allocated || 'Main Hub Store'}</td>
                                            <td class="p-3 text-gray-500">${i.created_at || 'Just Now'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="mod-log-inward" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white uppercase border-b border-borderGray pb-2 tracking-wider">📥 PURCHASED INWARD REGISTRY RECORD</h4>
                            <form onsubmit="window.submitMaterialInward(event)" class="space-y-3">
                                <div>
                                    <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Purchased Item Material Name</label>
                                    <input type="text" id="in-item" required placeholder="e.g. UltraTech Cement Bags" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none focus:border-blue-500 text-xs">
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Quantity Received</label>
                                        <input type="number" step="any" id="in-qty" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono focus:outline-none text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Unit of Measure</label>
                                        <input type="text" id="in-unit" required placeholder="Bags / Brass / Tons" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:outline-none text-xs">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-gray-400 uppercase text-[9px] font-bold mb-1">Destination Target Allocation Godown</label>
                                    <select id="in-godown" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white text-xs font-medium">
                                        ${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="pt-2 space-y-1.5">
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded uppercase font-sans text-[10px] tracking-wider transition-colors shadow-md">Register Inward Node</button>
                                    <button type="button" onclick="window.closeModal('mod-log-inward')" class="w-full bg-gray-800 text-gray-300 font-bold py-2 rounded uppercase border border-borderGray text-[10px]">❌ Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }
        }

        // --- 6. ADVANCED INVENTORY SUBMIT TRANSACTIONS METRICS ---
        window.submitNewGodown = async function(e) {
            e.preventDefault();
            const payload = [{ name: document.getElementById('g-name').value.trim(), location: document.getElementById('g-loc').value.trim() }];
            const res = await fetch(`${SUPABASE_REST_URL}/godowns`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if (res.ok) { alert("🎉 New Godown Registered in Database Stack!"); window.closeModal('mod-add-godown'); initializeSecurityGatekeeper(); }
        };

        window.submitDirectStock = async function(e) {
            e.preventDefault();
            const payload = [{
                godown_name: document.getElementById('s-godown').value,
                item: document.getElementById('s-item').value.trim(),
                qty: Number(document.getElementById('s-qty').value || 0),
                unit: document.getElementById('s-unit').value.trim()
            }];
            const res = await fetch(`${SUPABASE_REST_URL}/stock_book`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if (res.ok) { alert("🎉 Direct Inventory Pool Updated Successfully!"); window.closeModal('mod-add-stock'); initializeSecurityGatekeeper(); }
        };

        window.submitMaterialShift = async function(e) {
            e.preventDefault();
            const payload = [{
                from_node: document.getElementById('shift-from').value,
                to_node: document.getElementById('shift-to').value,
                item: document.getElementById('shift-item').value.trim(),
                qty: Number(document.getElementById('shift-qty').value || 0),
                unit: document.getElementById('shift-unit').value.trim()
            }];
            const res = await fetch(`${SUPABASE_REST_URL}/shifting_logs`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if (res.ok) { alert("🔄 Material Flow Logged & Shifted Across Selected Nodes!"); window.closeModal('mod-shift-material'); initializeSecurityGatekeeper(); }
        };

        window.submitShopReturn = async function(e) {
            e.preventDefault();
            const payload = [{
                vendor_name: document.getElementById('ret-shop').value.trim(),
                godown_source: document.getElementById('ret-godown').value,
                item: document.getElementById('ret-item').value.trim(),
                qty: Number(document.getElementById('ret-qty').value || 0),
                unit: document.getElementById('ret-unit').value.trim()
            }];
            const res = await fetch(`${SUPABASE_REST_URL}/return_logs`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if (res.ok) { alert("↩️ Vendor Stock Return Log Committed Successfully!"); window.closeModal('mod-return-shop'); initializeSecurityGatekeeper(); }
        };

        window.submitMaterialInward = async function(e) {
            e.preventDefault();
            const payload = [{
                item: document.getElementById('in-item').value.trim(),
                qty: Number(document.getElementById('in-qty').value || 0),
                unit: document.getElementById('in-unit').value.trim(),
                godown_allocated: document.getElementById('in-godown').value,
                created_at: new Date().toISOString().replace('T',' ').split('.')[0]
            }];
            const res = await fetch(`${SUPABASE_REST_URL}/material_inward`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if (res.ok) { alert("📥 Fresh Purchase Registry Inward Node Locked!"); window.closeModal('mod-log-inward'); initializeSecurityGatekeeper(); }
        };

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
