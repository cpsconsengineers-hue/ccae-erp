<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. RUNTIME STATE SYNC CORE ---
        const currentMatrixVersion = "vantage_v11_financial_ledger_fix";
        if (localStorage.getItem('vantage_matrix_version') !== currentMatrixVersion) {
            localStorage.clear();
            localStorage.setItem('vantage_matrix_version', currentMatrixVersion);
        }

        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); 
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_site_photos')) localStorage.setItem('vantage_site_photos', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        let currentTab = "financial"; // Directly locks viewport to financial ledger tab for testing ease
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>
                                <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                            </div>
                            <form id="setup-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Identity Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="Manoj Singh Rao"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim(); const pass = document.getElementById('setup-pass').value.trim();
                    if(pass !== document.getElementById('setup-confirm').value.trim()) { alert("Error: Security Keys mismatch."); return; }
                    localStorage.setItem('vantage_staff', JSON.stringify([{ id: 's_master', name, role: 'Master Admin', pass, baseSalary: 120000, status: 'Active', allottedWork: 'All Site Nodes' }]));
                    alert("Success: Master profile generated."); renderERP();
                });
                return;
            }

            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = JSON.parse(localStorage.getItem('vantage_staff')).find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP(); }
                    else { alert("Verification Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');
            const notifications = JSON.parse(localStorage.getItem('vantage_notifications')) || {};

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Core Grid</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Excel Measurement Sheets</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Nodes</button>
                                ${isAdmin ? `<button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Logout Node</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        ${notifications[currentUser.name] ? `<div class="bg-blue-600 text-white p-3 rounded-xl font-bold mb-4 flex justify-between items-center font-sans"><span>⚡ NOTIFICATION: ${notifications[currentUser.name]}</span><button onclick="clearNotification('${currentUser.name}')" class="bg-black/20 px-2 py-0.5 rounded text-[10px]">OK</button></div>` : ''}
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }
        function clearNotification(user) { const n = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; delete n[user]; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP(); }

        // --- 4. EXPANDED FINANCIAL LEDGER INTERFACE PANELS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [];
            const dbStaff = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
            const dbDeductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-400 font-bold">Vantage Node Operations Active. Navigate via Sidebar items.</div>`;
            }

            else if (currentTab === "financial") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-panelBg border border-borderGray p-4 rounded-xl shadow-lg">
                            <div>
                                <h3 class="text-sm font-bold text-white uppercase tracking-wider">💰 Central Operational Financial Ledger Matrix</h3>
                                <p class="text-gray-400 text-[11px] mt-0.5">Track Client Payments, Material Procurement bills, and Staff Cash Outflows mapped to respective site components.</p>
                            </div>
                            <button onclick="openFinanceModal()" class="bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 font-bold px-4 py-2 rounded-lg text-xs uppercase tracking-wider transition-colors shadow-md">+ Record New Ledger Entry</button>
                        </div>

                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden shadow-xl">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold text-[10px] tracking-wider">
                                        <th class="p-3">Date</th>
                                        <th class="p-3">Stream Type</th>
                                        <th class="p-3">Category Component</th>
                                        <th class="p-3">Target Project Node Task</th>
                                        <th class="p-3">Operator Identity</th>
                                        <th class="p-3">Transaction Summary Remarks</th>
                                        <th class="p-3 text-right">Transaction Value</th>
                                        <th class="p-3 text-center">Audit Matrix Status</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-borderGray">
                                    ${dbFinancials.length === 0 ? `<tr><td colspan="8" class="p-6 text-center text-gray-500 font-mono">No financial transactions logged in core ledger memory.</td></tr>` : ''}
                                    ${dbFinancials.map(f=>`
                                        <tr class="hover:bg-darkBg/30 transition-colors">
                                            <td class="p-3 font-mono text-gray-500">${f.date}</td>
                                            <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${f.stream === 'Payment IN' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}">${f.stream}</span></td>
                                            <td class="p-3 font-medium text-gray-300"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded">${f.category}</span></td>
                                            <td class="p-3 text-gray-200 font-sans font-medium">${f.project}</td>
                                            <td class="p-3 text-gray-400 font-sans font-semibold">${f.user}</td>
                                            <td class="p-3 text-gray-400 max-w-[200px] truncate">${f.desc}</td>
                                            <td class="p-3 text-right font-bold font-mono ${f.stream === 'Payment IN' ? 'text-green-400' : 'text-red-400'}">${f.stream === 'Payment IN' ? '+' : '-'} ₹${Number(f.amount).toLocaleString()}</td>
                                            <td class="p-3 text-center">
                                                ${f.status === 'Pending' && isAdmin ? `
                                                    <div class="flex justify-center space-x-1">
                                                        <button onclick="auditVoucherExpense('${f.id}', 'Approved')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-2 py-0.5 rounded font-bold transition-colors">Approve</button>
                                                        <button onclick="auditVoucherExpense('${f.id}', 'Rejected')" class="bg-red-600 hover:bg-red-500 text-white px-2 py-0.5 rounded font-bold transition-colors">Reject & Deduct</button>
                                                    </div>
                                                ` : `<span class="px-2 py-0.5 rounded font-bold uppercase text-[9px] ${f.status==='Approved'?'bg-green-500/10 text-green-400':'bg-red-500/10 text-red-400'}">${f.status}</span>`}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="f-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 class="font-bold text-white text-sm border-b border-borderGray pb-2">📂 Record Advanced Financial Transaction Entry</h4>
                            <form id="f-form" class="space-y-3 text-xs">
                                
                                <div>
                                    <label class="text-gray-400 block mb-1 font-bold">Transaction Direction Stream</label>
                                    <select id="f-stream" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-bold focus:border-blue-500 focus:outline-none">
                                        <option value="Payment OUT">📉 Payment OUT (Expense / Vendor Supply Outflow)</option>
                                        <option value="Payment IN">📈 Payment IN (Milestone Realization / Client Inflow)</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-gray-400 block mb-1 font-bold">Operational Component Category</label>
                                    <select id="f-cat" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:border-blue-500 focus:outline-none">
                                        <option value="Material Purchase">📦 Material Purchase Procurement</option>
                                        <option value="Labour Wages">👥 Labour Wages / Subcontractor Payout</option>
                                        <option value="Fuel Logistics">⛽ Fuel Logistics & Fleet Maintenance</option>
                                        <option value="Client Settlement">🏢 Client Milestone Stage Clearance</option>
                                        <option value="Cash Advance">💵 Office Petty Cash Advance</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-gray-400 block mb-1 font-bold">Against Project Node Assignment Task</label>
                                    <select id="f-proj" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white focus:border-blue-500 focus:outline-none">
                                        ${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-gray-400 mb-1 font-bold">Voucher Numeric Transaction Amount (₹)</label>
                                    <input type="number" id="f-amt" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono font-bold focus:border-blue-500 focus:outline-none" placeholder="Enter sum in ₹ metric...">
                                </div>

                                <div>
                                    <label class="block text-gray-400 mb-1 font-bold">Detailed Description Summary & Party Remarks</label>
                                    <textarea id="f-desc" required rows="2" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white focus:border-blue-500 focus:outline-none" placeholder="Why was it paid/received? Enter vendor name, bill no, material quantity details..."></textarea>
                                </div>

                                <div class="flex justify-end space-x-2 pt-2">
                                    <button type="button" onclick="closeModal('f-mod')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button>
                                    <button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold uppercase tracking-wider">Commit Ledger Entry</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "measurements") { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-5 text-center text-gray-400">[ M-Book Core Spreadsheet Operational ]</div>`; }
            else if (currentTab === "lifecycle") { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-5 text-center text-gray-400">[ Project Site Profiles Operational ]</div>`; }
            else if (currentTab === "staff-mgmt") {
                if (!isAdmin) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Human Capital Assets & Payroll Deployment Matrix</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Identity Name</th><th class="p-3">Clearance Designation</th><th class="p-3 text-right">Base Salary</th><th class="p-3 text-right text-red-400">Voucher Rejection Penalties</th><th class="p-3 text-right text-blue-400">Net Final Earned</th></tr>
                            ${dbStaff.map(s => {
                                const penalty = dbDeductions[s.name] || 0;
                                return `
                                    <tr class="border-b border-borderGray">
                                        <td class="p-3 text-white font-bold">${s.name}</td>
                                        <td class="p-3 text-gray-400"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded">${s.role}</span></td>
                                        <td class="p-3 text-right font-mono text-gray-300">₹${Number(s.baseSalary).toLocaleString()}</td>
                                        <td class="p-3 text-right font-mono text-red-400 font-bold">-₹${penalty.toLocaleString()}</td>
                                        <td class="p-3 text-right font-mono font-extrabold text-blue-400 text-sm">₹${(s.baseSalary - penalty).toLocaleString()}</td>
                                    </tr>
                                `;
                            }).join('')}
                            </table>
                        </div>
                    </div>
                `;
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openFinanceModal() { document.getElementById('f-form').reset(); openModal('f-mod'); }

        // --- 5. COMPILER FINANCE TRANSACTION LOGIC SUBMITTER ---
        document.body.addEventListener('submit', function(e){
            if (e.target.id === 'f-form') {
                e.preventDefault();
                const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
                
                dbFinancials.unshift({
                    id: 'f_' + Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    stream: document.getElementById('f-stream').value,
                    category: document.getElementById('f-cat').value,
                    project: document.getElementById('f-proj').value,
                    user: currentUser.name,
                    amount: Number(document.getElementById('f-amt').value),
                    desc: document.getElementById('f-desc').value.trim(),
                    status: 'Pending'
                });

                localStorage.setItem('vantage_financials', JSON.stringify(dbFinancials));
                closeModal('f-mod');
                renderTabContent();
            }
        });

        function auditVoucherExpense(id, decision) {
            let financials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
            const record = financials.find(x => x.id === id); 
            if(!record) return;
            
            record.status = decision;
            localStorage.setItem('vantage_financials', JSON.stringify(financials));

            if(decision === 'Rejected') {
                let d = JSON.parse(localStorage.getItem('vantage_deductions')) || {};
                d[record.user] = (d[record.user] || 0) + record.amount;
                localStorage.setItem('vantage_deductions', JSON.stringify(d));
                
                const notes = JSON.parse(localStorage.getItem('vantage_notifications')) || {};
                notes[record.user] = `🚨 AUDIT WARNING: Site expense voucher of ₹${record.amount.toLocaleString()} for '${record.desc}' was UNAPPROVED and DEDUCTED from your monthly salary matrix.`;
                localStorage.setItem('vantage_notifications', JSON.stringify(notes));
            } else {
                const notes = JSON.parse(localStorage.getItem('vantage_notifications')) || {};
                notes[record.user] = `✅ APPROVED: Your site voucher expense entry of ₹${record.amount.toLocaleString()} has been approved.`;
                localStorage.setItem('vantage_notifications', JSON.stringify(notes));
            }
            renderERP();
        }

        renderERP();
    </script>
</body>
</html>
