<!DOCTYPE html>

<head>

<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root" class="min-h-screen w-full relative">

    <script>
        // --- 1. DIRECT SECURE REST CLIENT DATABASES ---
        const SUPABASE_REST_URL = "https://nshstymfggjffuhstghw.supabase.co/rest/v1";
        const API_KEY = "sb_publishable_nwFVnbQgukQb3KcUUT5oFQ_kY4UIxgi";

        const cloudHeaders = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        // Complete Standalone Tables Storage Buffers
        let dbProjects = []; let dbStaff = []; let dbGodowns = []; let dbStockBook = []; 
        let dbMeasurements = []; let dbFinancials = []; let dbMachinery = []; let dbTenders = [];
        let dbPhotos = [];

        let currentTab = "dashboard"; 
        let currentUser = JSON.parse(sessionStorage.getItem('vantage_active_session')) || null;
        
        let activeExcelRows = [
            { chainageFrom: '0/000', chainageTo: '0/025', width: 7.5, thickness: '', formula: 'Multiply' }
        ];

        // Camera stream dynamic control handles
        let cameraStream = null;
        let lockedLatitude = null;
        let lockedLongitude = null;
        let capturedImageBase64 = null;

        // --- 2. GLOBAL SYSTEM ROUTERS (FIXED STACK PROTECTION) ---
        window.switchTab = function(tabId) {
            console.log("Navigating directly towards:", tabId);
            window.closeLiveCameraInterface(); // Completely terminate media devices before redraw
            currentTab = tabId;
            renderERP();
        };

        window.logoutSession = function() {
            window.closeLiveCameraInterface();
            currentUser = null;
            sessionStorage.removeItem('vantage_active_session');
            location.reload();
        };

        window.openModal = function(id) { document.getElementById(id).classList.remove('hidden'); };
        window.closeModal = function(id) { document.getElementById(id).classList.add('hidden'); };

        // --- 3. REST NETWORK HARVESTER CONSOLE ---
        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) { return fallbackMockData; }
        }

        async function initializeSecurityGatekeeper() {
            try {
                dbStaff = await fetchNativeTable('staff', [
                    { id: 's_master', name: 'Manoj Singh', role: 'Master Admin', pass: 'CPS2026', base_salary: 150000, status: 'Active', lat: 24.5854, lng: 73.7125, last_punch: '10:00 AM' }
                ]);
                dbProjects = await fetchNativeTable('projects', [
                    { id: "1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur", contract_value: 4500000, lat: 24.5854, lng: 73.7125 },
                    { id: "2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", contract_value: 7500000, lat: 24.1234, lng: 73.5678 }
                ]);
                dbGodowns = await fetchNativeTable('godowns', [{ id: "1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" }]);
                dbStockBook = await fetchNativeTable('stock_book', [{ id: "1", godown_name: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" }]);
                dbMeasurements = await fetchNativeTable('measurements', [{ id: "1", project: "Udaipur City Flyover Survey", span: "0/000 to 0/025", avg_width: "7.500", yield_output: "187.50 m²" }]);
                dbFinancials = await fetchNativeTable('financials', []);
                dbMachinery = await fetchNativeTable('machinery', []);
                dbTenders = await fetchNativeTable('tenders', []);
                
                dbPhotos = await fetchNativeTable('site_photos', [
                    { id: "ph1", project_name: "Udaipur City Flyover Survey", timestamp: "2026-06-13 14:30", lat: 24.5854, lng: 73.7125, image_data: "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?w=400" }
                ]);
            } catch (e) { console.error("Sync exception cleared."); }
            renderERP();
        }

        // --- 4. HARDWARE SIDEBAR INTERFACE LAYOUTS ---

            const root = document.getElementById('app-root');
            if (!root) return;
            
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4 relative">

                            <div class="text-center mb-6">

                            </div>

                            </form>
                        </div>
                    </div>
                `;

                    e.preventDefault();

                    const pass = document.getElementById('login-pass').value.trim();
                    const userMatch = dbStaff.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                    if (userMatch) {
                        currentUser = userMatch;
                        sessionStorage.setItem('vantage_active_session', JSON.stringify(userMatch));
                        renderERP();
                    } else { alert("Authentication Failure!"); }
                });
                return;
            }

            const isMasterAdmin = (currentUser.role === 'Master Admin' || currentUser.name.toLowerCase() === 'manoj singh');
            const isAccountant = (currentUser.role === 'Accountant');
            const isElevatedPrivilege = (isMasterAdmin || isAccountant);

            root.innerHTML = `

                            <nav class="p-3 space-y-1">
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-1">Main Intelligence</p>
                                <button type="button" onclick="window.switchTab('dashboard')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">📊 Executive Dashboard</button>
                                <button type="button" onclick="window.switchTab('geo-viewer')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'geo-viewer' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">🗺️ Geospatial Viewer</button>
                                <button type="button" onclick="window.switchTab('staff-tracking')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-tracking' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">📡 Live Staff Tracking</button>
                                
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-2">Project Operations</p>
                                <button type="button" onclick="window.switchTab('lifecycle')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">🏢 Lifecycle Projects</button>
                                <button type="button" onclick="window.switchTab('measurements')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">📐 Measurement Sheets (M-Book)</button>

                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-2">Human Capital & Assets</p>
                                <button type="button" onclick="window.switchTab('materials')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">📦 Inventory Hub (Godown)</button>
                                <button type="button" onclick="window.switchTab('material-inward')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'material-inward' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">📥 Material Inward Registry</button>
                                <button type="button" onclick="window.switchTab('machinery')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'machinery' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">⚙️ Machinery Assets Fleet</button>
                                <button type="button" onclick="window.switchTab('attendance')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'attendance' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">✅ Daily Attendance</button>
                                
                                ${isElevatedPrivilege ? `
                                <div class="pt-2 border-t border-borderGray/40 space-y-1">
                                    <p class="text-[9px] font-bold text-red-400 uppercase tracking-widest px-3">Central Command & Audit</p>
                                    <button type="button" onclick="window.switchTab('financial')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">💰 Financial Ledger Matrix</button>
                                    <button type="button" onclick="window.switchTab('petty-cash')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'petty-cash' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">💸 Daily Petty Cash Tracker</button>
                                    <button type="button" onclick="window.switchTab('staff-mgmt')" class="w-full block text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}">👥 Staff Management</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40 shrink-0">
                            <p class="text-white font-bold truncate mb-1">👤 ${currentUser.name}</p>
                            <p class="text-[9px] text-emerald-400 uppercase font-mono font-bold mb-2">${currentUser.role}</p>
                            <button type="button" onclick="window.logoutSession()" class="w-full bg-gray-800 text-gray-400 py-1.5 rounded font-bold border border-borderGray uppercase text-[10px]">🔒 TERMINATE SESSION</button>
                        </div>
                    </aside>
                    <main class="flex-1 p-6 bg-darkBg min-h-screen overflow-y-auto"><div id="tab-content-window"></div></main>
                </div>
            `;
            renderTabContent();
        }

        // --- 5. COMPONENT PANELS RENDERING LAYER ---

            const container = document.getElementById('tab-content-window');

            const isMasterAdmin = (currentUser.role === 'Master Admin' || currentUser.name.toLowerCase() === 'manoj singh');
            const isAccountant = (currentUser.role === 'Accountant');

                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Warehouse Units</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbGodowns.length} Godowns</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">M-Book Records</p><h3 class="text-xl font-extrabold mt-1 text-white">${activeExcelRows.length} Rows</h3></div>

                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-emerald-400 font-mono font-bold uppercase tracking-wider">⚡ SHIELD ACTIVE. CHANNELS UNBLOCKED SUCCESSFULLY.</div>
                `;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Infrastructure Registry Nodes</h3>
                            ${isElevatedPrivilege ? `<button onclick="window.openModal('p-mod')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-bold font-sans transition-all shadow-md">+ Provision New Site</button>` : ''}
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 flex flex-col justify-between space-y-4 relative min-h-[160px]">
                                    <div class="space-y-1">
                                        <h4 class="font-bold text-white text-xs border-b border-borderGray pb-1.5 mb-1.5">${p.name}</h4>
                                        <p class="text-gray-400">🏢 Client: <span class="text-gray-200">${p.client}</span></p>

                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">📷 SITE PHOTO UPDATES MODULE</h3>
                            <button onclick="window.startLiveCameraInterface()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded shadow-md font-sans">📷 Click GPS Photo</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="photo-gallery-grid">
                            ${dbPhotos.map(ph=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden p-3 space-y-2 relative">
                                    <img src="${ph.image_data}" class="w-full h-40 object-cover rounded-lg bg-darkBg border border-borderGray">
                                    <div class="font-mono text-[10px] text-gray-400 space-y-0.5">
                                        <p class="text-white font-bold font-sans text-xs truncate">📍 Project: ${ph.project_name}</p>
                                        <p>📅 Timestamp: ${ph.timestamp}</p>
                                        <p class="text-emerald-400 font-bold">🌐 Coords: ${Number(ph.lat || 24.5854).toFixed(6)}, ${Number(ph.lng || 73.7125).toFixed(6)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div id="cam-mod" class="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white text-xs uppercase tracking-wider border-b border-borderGray pb-1.5">📸 LIVE GPS CAMERA CAPTURE</h4>
                            <form id="cam-upload-form" class="space-y-4" onsubmit="window.executePhotoVaultSubmit(event)">
                                <select id="cam-proj" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-bold">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select>
                                <div class="relative w-full h-56 bg-black border border-borderGray rounded-lg overflow-hidden">
                                    <video id="webcam-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                                    <canvas id="hidden-photo-canvas" class="hidden"></canvas>
                                    <img id="snapped-photo-preview" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                                </div>
                                <button type="button" onclick="window.captureSnapshotAndGPS()" class="w-full bg-emerald-600 text-white py-2.5 rounded font-bold uppercase tracking-wider">🎯 Capture Photo & GPS</button>
                                <div id="gps-lock-badge" class="hidden text-center p-2 bg-amber-500/10 border border-amber-500/30 text-amber-400 font-mono text-[10px] rounded-lg"></div>
                                <button type="submit" id="submit-vault-btn" disabled class="w-full bg-gray-700 text-gray-400 font-bold py-2.5 rounded uppercase">Save Geotagged Photo</button>
                                <button type="button" onclick="window.closeLiveCameraInterface()" class="w-full bg-gray-800 hover:bg-gray-750 text-gray-300 font-bold py-2 rounded uppercase border border-borderGray transition-all">❌ Cancel / Close</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "materials") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Inventory Hub (Godown)</h3><table class="w-full text-left bg-panelBg border border-borderGray rounded-xl"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Godown</th><th>Material</th><th class="text-right pr-4">Stock</th></tr>${dbStockBook.map(s=>`<tr><td class="p-2 text-gray-400">${s.godown_name}</td><td class="p-2 text-white font-bold">${s.item}</td><td class="p-2 text-right text-blue-400 font-bold font-mono pr-4">${s.qty} ${s.unit}</td></tr>`).join('')}</table></div>`;
            }
            else if (currentTab === "machinery") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">⚙️ Machinery Assets Fleet</h3><table class="w-full text-left bg-panelBg border border-borderGray rounded-xl"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Machine</th><th>Location</th></tr>${dbMachinery.map(m=>`<tr><td class="p-2 text-white font-bold">${m.name || 'JCB Excavator 3DX'}</td><td class="p-2 text-gray-400">${m.location || 'Flyover Site Node'}</td></tr>`).join('')}</table></div>`;
            }
            else if (currentTab === "tenders") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📄 Tenders Matrix Nodes</h3><table class="w-full text-left bg-panelBg border border-borderGray rounded-xl"><tr class="bg-darkBg border-b border-borderGray text-gray-400 font-bold uppercase"><th class="p-2">Tender Description</th><th class="text-right pr-4">Estimated Target Value</th></tr>${dbTenders.map(t=>`<tr><td class="p-2 text-white font-bold">${t.title || 'National Highway Bid'}</td><td class="p-2 text-right text-blue-400 font-mono pr-4">₹${Number(t.value || 12000000).toLocaleString()}</td></tr>`).join('')}</table></div>`;
            }
            else if (currentTab === "material-inward") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📥 Material Inward Registry</h3></div>`;
            }
            else if (currentTab === "petty-cash") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">💸 Daily Petty Cash Tracker</h3></div>`;
            }
            else if (currentTab === "financial") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">💰 Financial Ledger Matrix</h3></div>`;
            }
            else if (currentTab === "attendance") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">✅ Daily Attendance Logs</h3></div>`;
            }
            else if (currentTab === "staff-mgmt") {
                container.innerHTML = `<div class="space-y-4"><h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Staff Management Accounts</h3></div>`;
            }
            else if (currentTab === "geo-viewer") {
                container.innerHTML = `<div id="vantage-live-map" class="w-full h-[450px] relative z-40"></div>`;
                setTimeout(renderLeafletMapLayer, 100);
            }
            else if (currentTab === "staff-tracking") {
                container.innerHTML = `<div id="vantage-staff-map" class="w-full h-[450px] relative z-40"></div>`;
                setTimeout(renderLeafletRadarLayer, 100);
            }
        }

        // --- 6. WEBCAM & DISPOSAL ISOLATED PIPELINES ---
        window.startLiveCameraInterface = async function() {
            lockedLatitude = null; lockedLongitude = null; capturedImageBase64 = null; 
            window.openModal('cam-mod');
            const videoElement = document.getElementById('webcam-preview'); 
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false });
                if (videoElement) videoElement.srcObject = cameraStream;
            } catch (err) {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    if (videoElement) videoElement.srcObject = cameraStream;
                } catch (e) { console.warn("Camera fallback triggered."); }
            }
        };

        window.closeLiveCameraInterface = function() { 
            if (cameraStream) { 
                try {
                    const tracks = cameraStream.getTracks();
                    if (tracks && tracks.length > 0) {
                        for (let i = 0; i < tracks.length; i++) {
                            tracks[i].stop(); 
                        }
                    }
                } catch(e) { console.error("Stream clean bypassed."); }
                cameraStream = null;
            } 
            window.closeModal('cam-mod'); 
        };

        window.captureSnapshotAndGPS = function() {
            const video = document.getElementById('webcam-preview'); const canvas = document.getElementById('hidden-photo-canvas');
            const imgPreview = document.getElementById('snapped-photo-preview'); const statusBadge = document.getElementById('gps-lock-badge');
            const submitBtn = document.getElementById('submit-vault-btn'); if (!video || !canvas) return;

            canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.85); 
            if (imgPreview) { imgPreview.src = capturedImageBase64; imgPreview.classList.remove('hidden'); }
            if (statusBadge) { statusBadge.innerHTML = "📡 Synchronizing Satellite Data..."; statusBadge.classList.remove('hidden'); }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    lockedLatitude = position.coords.latitude; lockedLongitude = position.coords.longitude;
                    if (statusBadge) statusBadge.innerHTML = `Locked: ${lockedLatitude.toFixed(6)}, ${lockedLongitude.toFixed(6)}`;
                    if (submitBtn) { submitBtn.disabled = false; submitBtn.className = "w-full bg-blue-600 text-white font-bold py-2.5 rounded shadow-md"; }
                }, () => {
                    lockedLatitude = 24.5854; lockedLongitude = 73.7125;
                    if (statusBadge) statusBadge.innerHTML = `Locked Office: 24.5854, 73.7125`;
                    if (submitBtn) { submitBtn.disabled = false; submitBtn.className = "w-full bg-blue-600 text-white font-bold py-2.5 rounded shadow-md"; }
                });
            }
        };

        window.executePhotoVaultSubmit = async function(e) {
            e.preventDefault();
            const payload = { project_name: document.getElementById('cam-proj').value, timestamp: new Date().toISOString().replace('T',' ').split('.')[0], lat: lockedLatitude || 24.5854, lng: lockedLongitude || 73.7125, image_data: capturedImageBase64 };
            const response = await fetch(`${SUPABASE_REST_URL}/site_photos`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
            if(response.ok) { alert("📸 Geotagged Photo saved!"); window.closeLiveCameraInterface(); initializeSecurityGatekeeper(); }
        };

        // --- 7. MUTATION METHODS WITH WINDOW EXPOSURE ---
        window.executeProjectSubmit = async function(e) { e.preventDefault(); const payload = [{ name: document.getElementById('p-name').value, client: document.getElementById('p-client').value, location: document.getElementById('p-loc').value, lat: Number(document.getElementById('p-lat').value), lng: Number(document.getElementById('p-lng').value), contract_value: Number(document.getElementById('p-val').value) }]; await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); window.closeModal('p-mod'); initializeSecurityGatekeeper(); };
        window.triggerProjectEdit = function(id, name, client, loc, val, lat, lng) { document.getElementById('edit-p-id').value = id; document.getElementById('edit-p-name').value = name; document.getElementById('edit-p-client').value = client; document.getElementById('edit-p-loc').value = loc; document.getElementById('edit-p-val').value = val; document.getElementById('edit-p-lat').value = lat; document.getElementById('edit-p-lng').value = lng; window.openModal('p-edit-mod'); };
        window.executeProjectModifySubmit = async function(e) { e.preventDefault(); const id = document.getElementById('edit-p-id').value; const payload = { name: document.getElementById('edit-p-name').value, client: document.getElementById('edit-p-client').value, location: document.getElementById('edit-p-loc').value, lat: Number(document.getElementById('edit-p-lat').value), lng: Number(document.getElementById('edit-p-lng').value), contract_value: Number(document.getElementById('edit-p-val').value) }; await fetch(`${SUPABASE_REST_URL}/projects?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify(payload) }); window.closeModal('p-edit-mod'); alert("Project updated successfully!"); initializeSecurityGatekeeper(); };
        window.deleteRowCloud = async function(table, id) { if(confirm("Are you sure?")) { const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders }); if(response.ok) { alert("Deleted successfully."); initializeSecurityGatekeeper(); } } };

        // --- 8. MAPS WRAPPERS WITH DISTINCT STACKING ---
        function renderLeafletMapLayer() { let m = document.getElementById('vantage-live-map'); if (!m) return; let mo = L.map('vantage-live-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mo); dbProjects.forEach(p => { if (p.lat) L.marker([p.lat, p.lng]).addTo(mo); }); }
        function renderLeafletRadarLayer() { let r = document.getElementById('vantage-staff-map'); if (!r) return; let ro = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(ro); dbStaff.forEach(s => { if (s.lat) L.marker([s.lat, s.lng]).addTo(ro); }); }

        // --- 9. EXCEL ENGINE ---
        window.buildExcelRowsMatrixHTML = function() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                return `<tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray text-gray-400 font-bold">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" oninput="window.updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" oninput="window.updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="window.updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="window.updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">${row.thickness ? `${(len * avgW * Number(row.thickness)).toFixed(3)} m³` : `${(len * avgW).toFixed(2)} m²`}</td><td class="p-1"><button type="button" onclick="activeExcelRows.splice(${index},1); window.buildExcelRowsMatrixHTML();" class="bg-red-950/40 text-red-400 border border-red-900/30 px-2 py-0.5 rounded font-sans text-[10px] font-bold">Purge</button></td></tr>`;
            }).join('');
        };
        window.updateExcelCell = function(idx, field, val) { activeExcelRows[idx][field] = val; window.buildExcelRowsMatrixHTML(); };
        window.addExcelRow = function() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply' }); window.buildExcelRowsMatrixHTML(); };
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
