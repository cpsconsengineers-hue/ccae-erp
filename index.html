        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) { return fallbackMockData; }
        }

        function renderLeafletMapLayer() {
            let mapContainer = document.getElementById('vantage-live-map'); if (!mapContainer) return;
            let mObj = L.map('vantage-live-map').setView([24.5854, 73.7125], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mObj);
            dbProjects.forEach(p => {
                if (p.lat && p.lng) {
                    L.marker([p.lat, p.lng]).addTo(mObj).bindPopup(`<b class="text-blue-400 uppercase font-sans">${p.name}</b><br><span class="text-gray-400">Client: ${p.client}</span>`);
                }
            });
        }

        function renderLeafletRadarLayer() {
            let radarContainer = document.getElementById('vantage-staff-map'); if (!radarContainer) return;
            activeMapObj = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9);

                if (s.lat && s.lng) {
                    L.marker([s.lat, s.lng]).addTo(activeMapObj).bindPopup(`<b class="text-emerald-400 uppercase font-sans">📡 ON DUTY: ${s.name}</b><br><span class="text-gray-400">Designation: ${s.role}</span>`);
                }
            });

        async function executeMachinerySubmit(e) { e.preventDefault(); const qty = Number(document.getElementById('m-qty').value); const rate = Number(document.getElementById('m-rate').value); const payload = [{ asset_name: document.getElementById('m-name').value, billing_type: document.getElementById('m-type').value, units_worked: qty, unit_rate: rate, total_bill: (qty * rate) }]; await fetch(`${SUPABASE_REST_URL}/machinery`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('m-mod'); initializeSecurityGatekeeper(); }
        async function executeTenderSubmit(e) { e.preventDefault(); const status = document.getElementById('t-status').value; const payload = [{ tender_name: document.getElementById('t-name').value, status: status, work_order_no: status==='Allotted'?document.getElementById('t-wono').value:'', work_order_amount: status==='Allotted'?Number(document.getElementById('t-woamt').value):0, completion_date: status==='Allotted'?document.getElementById('t-wocmp').value:'', actual_completion: status==='Allotted'?document.getElementById('t-woact').value:'' }]; await fetch(`${SUPABASE_REST_URL}/tenders`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('t-mod'); initializeSecurityGatekeeper(); }
        async function executeStaffSubmit(e) { e.preventDefault(); const payload = [{ name: document.getElementById('s-name').value.trim(), role: document.getElementById('s-role').value, pass: document.getElementById('s-pass').value.trim(), base_salary: Number(document.getElementById('s-salary').value), status: 'Active', allotted_work: 'Assigned Node Site' }]; await fetch(`${SUPABASE_REST_URL}/staff`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('s-mod'); initializeSecurityGatekeeper(); }
        async function executeUniversalDynamicSubmit(e) { e.preventDefault(); const payload = [{ category_node: currentTab, log_description: document.getElementById('dyn-log-desc').value.trim(), metric_value: Number(document.getElementById('dyn-log-val').value || 0), timestamp: new Date().toISOString(), operator_identity: currentUser.name }]; await fetch(`${SUPABASE_REST_URL}/financials`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); alert("Success: Record saved to cloud!"); closeModal('universal-dyn-mod'); initializeSecurityGatekeeper(); }
        async function deleteRowCloud(table, id) { if(confirm("Purge Record Permanently?")) { const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders }); if(response.ok) { alert("Data lines purged."); initializeSecurityGatekeeper(); } } }
        function toggleTenderWorkOrderFields(val) { const block = document.getElementById('tender-work-order-subform'); if(!block) return; if(val === 'Allotted') block.classList.remove('hidden'); else block.classList.add('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- 7. EXCEL SHEET COMPILER ENGINE SYSTEMS ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `<tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        // Start Bootloader
        initializeSecurityGatekeeper();
    </script>
</body>
</html>
