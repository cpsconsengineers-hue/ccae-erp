<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS Vantage - Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-btn { width: 100%; text-align: left; padding: 10px; border-radius: 8px; color: #9ca3af; }
        .nav-btn:hover { background: #1f2937; color: white; }
        .nav-active { background: #2563eb; color: white; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200">
    <div id="app" class="flex">
        <aside class="w-64 bg-[#111827] h-screen border-r border-[#1f2937] p-4 fixed">
            <h1 class="text-white font-bold mb-6">CPS CONSULTANTS</h1>
            <nav id="nav-container" class="space-y-1"></nav>
        </aside>
        <main class="ml-64 p-8 w-full" id="content-area"></main>
    </div>

    <script>
        // Module List (Ye kabhi gayab nahi honge)
        const modules = [
            { id: 'dashboard', label: '📊 Dashboard' },
            { id: 'lifecycle', label: '🏢 Lifecycle Projects' },
            { id: 'measurements', label: '📐 M-Book Sheets' },
            { id: 'site-photos', label: '📷 Site Photos' },
            { id: 'materials', label: '📦 Inventory Hub' },
            { id: 'tenders', label: '📄 Tenders' },
            { id: 'billing', label: '🧾 Billing Invoices' },
            { id: 'staff-mgmt', label: '👥 Staff Management' },
            { id: 'financial', label: '💰 Financial Ledger' }
        ];

        window.renderNav = () => {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = modules.map(m => `<button onclick="window.loadModule('${m.id}')" class="nav-btn ${state.tab === m.id ? 'nav-active' : ''}">${m.label}</button>`).join('');
        };

        window.loadModule = (id) => {
            state.tab = id;
            const content = document.getElementById('content-area');
            content.innerHTML = `<h2 class="text-xl font-bold mb-4">${id.toUpperCase()}</h2><div id="module-view"></div>`;
            renderNav();
            // Yahan har module ka logic alag-alag load hoga
            if(id === 'lifecycle') renderLifecycle();
            if(id === 'billing') renderBilling();
        };

        let state = { tab: 'dashboard' };
        
        // Lifecycle Module
        function renderLifecycle() {
            document.getElementById('module-view').innerHTML = `
                <div class="flex justify-between mb-4">
                    <h3 class="font-bold">Projects</h3>
                    <button class="bg-blue-600 px-3 py-1 rounded text-xs">+ Add Project</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#111827] p-4 rounded-lg border border-[#1f2937]">Udaipur Flyover <div class="mt-2 flex gap-2"><button class="bg-red-900/50 p-1 px-2 rounded text-[10px]">Delete</button></div></div>
                </div>
            `;
        }

        // Billing Module
        function renderBilling() {
            document.getElementById('module-view').innerHTML = `
                <div class="bg-[#111827] p-4 rounded-lg border border-[#1f2937]">
                    <button onclick="alert('Form Loaded')" class="bg-blue-600 px-4 py-2 rounded">+ Create Invoice</button>
                    <table class="w-full mt-4"><thead><tr class="text-left text-gray-500 text-[9px] uppercase"><th>Party</th><th>Amount</th></tr></thead></table>
                </div>
            `;
        }

        renderNav();
        window.loadModule('dashboard');
    </script>
</body>
</html>
