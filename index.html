        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return data && data.length > 0 ? data : fallbackMockData;
            } catch (e) { return fallbackMockData; }
        }

        window.initAttendanceWebcamStream = async function() {

        window.takeSelfieSnap = function() {

            if(!video || !cameraStream) return;
            const canvas = document.createElement('canvas'); canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            localCapturedSelfie = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = localCapturedSelfie; preview.classList.remove('hidden');
            alert("Selfie framework snap successfully locked in local memory context buffer!");
        };

        window.submitPunchIn = async function() {
            if (!livePunchCoordinates || !localCapturedSelfie) { alert("Kripya pehle (1) GPS Coordinate aur (2) Selfie Frame lock karein."); return; }
            
            // Core Radius Calculation Engine: Map benchmark to Udaipur Flyover Site Coordinates
            const targetLat = 24.5854; const targetLng = 73.7125;
            const R = 6371e3; 
            const phi1 = targetLat * Math.PI/180; const phi2 = livePunchCoordinates.lat * Math.PI/180;
            const deltaPhi = (livePunchCoordinates.lat - targetLat) * Math.PI/180;
            const deltaLambda = (livePunchCoordinates.lng - targetLng) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            const distanceMeters = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            if (distanceMeters > 500) {
                alert("❌ Site Location Un-identified! Aap map coordinates benchmark ke 500 meter ke work perimeter se bahar hain.");

            const payload = { staff_name: currentUser.name, date: new Date().toISOString().split('T')[0], status: "Present Geo-Verified", lat: livePunchCoordinates.lat, lng: livePunchCoordinates.lng, selfie_base64: localCapturedSelfie, net_salary: 0, advance: 0, due_payable: 0 };
            const response = await fetch(`${SUPABASE_REST_URL}/attendance`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) });
            if (response.ok) { alert("✅ Attendance Geo-Locked and punched in within 500m work radius perimeter!"); window.switchTab('dashboard'); initializeSecurityGatekeeper(); }
        };

        window.updatePettyCashStatus = async function(id, statusString) {
            // Auto Debit calculation logic attached onto Deny trigger
            const targetExpense = dbPettyCash.find(p => p.id === id);
            if (statusString === 'Denied' && targetExpense) {
                alert(`⚠️ Auto-Debit Triggered: ₹${targetExpense.amount} ka payment Supervisor '${targetExpense.supervisor_name}' ki monthly payroll clear statement se directly deduct ho jayega.`);
            }
            await fetch(`${SUPABASE_REST_URL}/petty_cash?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify({ status: statusString }) });
            initializeSecurityGatekeeper();
        };

        // --- 10. SUBMISSIONS CONSOLE ROUTERS ---
        window.savePayrollEntry = async function(e) { e.preventDefault(); const base=Number(document.getElementById('pay-base').value); const days=Number(document.getElementById('pay-days').value); const adv=Number(document.getElementById('pay-adv').value); const net=base*days; const payload={ staff_name: document.getElementById('pay-staff').value, date: new Date().toISOString().split('T')[0], status:"Paid Logged", lat:24.5854, lng:73.7125, selfie_base64:"Direct_Admin_Entry", net_salary:net, advance:adv, due_payable:(net-adv) }; await fetch(`${SUPABASE_REST_URL}/attendance`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); initializeSecurityGatekeeper(); };
        window.submitMachineryFleetRow = async function(e) { e.preventDefault(); const run=Number(document.getElementById('m-runtime').value); const rate=Number(document.getElementById('m-rate').value); const adv=Number(document.getElementById('m-adv').value); const net=run*rate; const payload={ name: document.getElementById('m-name').value.trim(), runtime_hours_trips:run, basic_rate:rate, net_payable:net, advance:adv, final_due:(net-adv), fuel_liters:Number(document.getElementById('m-fuel-liters').value || 0), fuel_cost:Number(document.getElementById('m-fuel-cost').value || 0), fuel_bill_base64:document.getElementById('m-bill-file').value || "" }; await fetch(`${SUPABASE_REST_URL}/machinery`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('machinery-modal'); initializeSecurityGatekeeper(); };
        window.submitPettyExpense = async function(e) { e.preventDefault(); const payload={ supervisor_name: document.getElementById('petty-supervisor').value, description: document.getElementById('petty-desc').value.trim(), amount: Number(document.getElementById('petty-amt').value || 0), status: "Pending" }; await fetch(`${SUPABASE_REST_URL}/petty_cash`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('petty-modal'); initializeSecurityGatekeeper(); };
        window.submitProvisionStaff = async function(e) { e.preventDefault(); const payload={ name: document.getElementById('st-name').value.trim(), role: document.getElementById('st-role').value, pass: document.getElementById('st-pass').value.trim(), base_salary: 25000 }; await fetch(`${SUPABASE_REST_URL}/staff`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('staff-modal'); initializeSecurityGatekeeper(); };
        window.submitInvoiceLedger = async function(e) { e.preventDefault(); const payload={ client_or_sub: document.getElementById('b-type').value, name: document.getElementById('b-name').value.trim(), bill_amount: Number(document.getElementById('b-amt').value || 0), invoice_no: document.getElementById('b-no').value.trim(), date: new Date().toISOString().split('T')[0] }; await fetch(`${SUPABASE_REST_URL}/billing_invoices`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('bill-modal'); initializeSecurityGatekeeper(); };
        window.submitSubcontractorMaster = async function(e) { e.preventDefault(); const payload={ name: document.getElementById('sub-firm').value.trim(), project_allotted: document.getElementById('sub-proj').value, scope_of_work: document.getElementById('sub-scope').value.trim(), rate: Number(document.getElementById('sub-rate').value || 0), unit: document.getElementById('sub-unit').value.trim() }; await fetch(`${SUPABASE_REST_URL}/subcontractors`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('sub-modal'); initializeSecurityGatekeeper(); };
        window.saveStaffSubMeasurement = async function(id, val) { await fetch(`${SUPABASE_REST_URL}/subcontractors?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify({ measurement_entry_by_staff: val }) }); alert("Measurement entry synced by staff team member."); initializeSecurityGatekeeper(); };
        window.submitLedgerEntryRow = async function(e) { e.preventDefault(); const payload={ type: document.getElementById('l-type').value, party_or_staff: document.getElementById('l-party').value.trim(), amount: Number(document.getElementById('l-amt').value || 0), payment_mode: document.getElementById('l-mode').value, date: new Date().toISOString().split('T')[0] }; await fetch(`${SUPABASE_REST_URL}/financial_ledger`, { method: "POST", headers: cloudHeaders, body: JSON.stringify([payload]) }); window.closeModal('ledger-modal'); initializeSecurityGatekeeper(); };

        // --- 11. MAP LIFECYCLES LAYER MAPPING ---
        window.initTelemetryRouteMapping = function() {
            let m = document.getElementById('telemetry-route-map'); if (!m) return;
            let mapObj = L.map('telemetry-route-map').setView([24.5854, 73.7125], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapObj);
            
            // Standard static tracking path array points matrix
            let pathPoints = [[24.5854, 73.7125], [24.5880, 73.7150], [24.5920, 73.7190], [24.5950, 73.7220]];
            L.polyline(pathPoints, { color: '#3b82f6', weight: 4, opacity: 0.85 }).addTo(mapObj);
            L.marker([24.5854, 73.7125]).addTo(mapObj).bindPopup("<b>Punch-In Start</b><br>10:00 AM Office");
            L.marker([24.5950, 73.7220]).addTo(mapObj).bindPopup("<b>Current Endpoint</b><br>Punch-Out Node Lock");
        };

        window.closeLiveCameraInterface = function() { if (cameraStream) { try { cameraStream.getTracks().forEach(t => { if(t) t.stop(); }); } catch(e){} cameraStream = null; } };
        function renderLeafletMapLayer() { let m = document.getElementById('vantage-live-map'); if (!m) return; let mo = L.map('vantage-live-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mo); dbProjects.forEach(p => { if (p.lat) L.marker([p.lat, p.lng]).addTo(mo); }); }
        function renderLeafletRadarLayer() { let r = document.getElementById('vantage-staff-map'); if (!r) return; let ro = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(ro); dbStaff.forEach(s => { if (s.lat) L.marker([s.lat, s.lng]).addTo(ro); }); }
        window.buildExcelRowsMatrixHTML = function() { const body = document.getElementById('excel-rows-body'); if(!body) return; body.innerHTML = activeExcelRows.map((row, index) => `<tr class="text-center"><td class="p-2 border-r border-borderGray text-gray-500">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray text-gray-400">25 m</td><td class="p-0 border-r border-borderGray"><input type="number" value="${row.width}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">7.500 m</td><td class="p-0 border-r border-borderGray"><input type="number" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">187.50 m²</td><td class="p-1"><button type="button" class="text-red-400">Purge</button></td></tr>`).join(''); };

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
