<body class="bg-darkBg text-gray-100 font-sans antialiased">

    <div id="app-root"></div>

    <script>
        // --- 1. ENTERPRISE DATA MATRICES SEEDING ---
        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        // Seed Core Matrix Registries
        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); // Empty for Initial Admin Setup
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI / 180; const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180; const deltaLambda = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // --- 2. MASTER REGISTRATION & LOGIN SECURITY ENGINE ---
        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            // PHASE A: INITIAL SETUP REGISTER MODAL (If no admin exists in storage)
            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">

                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>

                                <p class="text-xs text-gray-400 mt-1">Configure your primary high-level identity keys.</p>
                            </div>
                            <form id="setup-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Your Full Admin Identity Name</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="e.g. Manoj Singh Rao"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors shadow-lg">Initialize & Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim();
                    const pass = document.getElementById('setup-pass').value.trim();
                    const confirmPass = document.getElementById('setup-confirm').value.trim();

                    if(pass !== confirmPass) { alert("Error: Security Key entries mismatch!"); return; }

                    const masterAccount = { id: 's_master', name, role: 'Master Admin', pass, baseSalary: 150000, status: 'Active', allottedWork: 'All Site Nodes' };
                    staffList.push(masterAccount);
                    localStorage.setItem('vantage_staff', JSON.stringify(staffList));
                    
                    alert("Success: Master Admin configured safely. Proceeding to Secure Portal Login.");
                    renderERP();
                });
                return;
            }

            // PHASE B: SECURE AUTHLOCK GATEWAY
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">

                            </div>

                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = JSON.parse(localStorage.getItem('vantage_staff')).find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { 
                        if(user.status === 'Blocked' || user.status === 'Terminated') { alert("Access Denied: Clearance level suspended."); return; }
                        currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); currentTab = "dashboard"; renderERP(); 
                    }
                    else { alert("Security Access Denied: Mismatch keys."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');
            const notifications = JSON.parse(localStorage.getItem('vantage_notifications')) || {};

            // PHASE C: CORE WORKSPACE FRAMEWORK RENDER
            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div class="overflow-y-auto max-h-[85vh]">
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Operations Matrix</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Executive Dashboard</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Lifecycle Projects</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Measurement Sheets</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Material Logistics</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>

                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED SYSTEM ARCHITECT</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff & Salary Matrix</button>
                                    <button onclick="switchTab('tenders')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'tenders' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📈 Tender Pipeline</button>

                                    <button onclick="switchTab('reports')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'reports' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📋 Analytical Reports</button>
                                    <button onclick="switchTab('intel')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'intel' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚡ Intelligence Feed</button>
                                    <button onclick="switchTab('sys-control')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'sys-control' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🛠️ SYSTEM CONTROL</button>
                                    <button onclick="switchTab('sys-config')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'sys-config' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🔧 System Configuration</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase text-[10px]">${currentUser.name.substring(0,2)}</div>
                                <div class="truncate"><p class="font-medium text-white truncate">${currentUser.name}</p><p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">${currentUser.role}</p></div>
                            </div>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 hover:text-red-400 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Terminate Session</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        ${notifications[currentUser.name] ? `<div class="bg-blue-600 text-white p-3 rounded-xl font-bold mb-4 flex justify-between items-center animate-pulse"><span>⚡ NOTIFICATION: ${notifications[currentUser.name]}</span><button onclick="clearNotification('${currentUser.name}')" class="bg-black/20 px-2 py-0.5 rounded text-[10px]">Acknowledge</button></div>` : ''}
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }
        function clearNotification(user) { const n = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; delete n[user]; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP(); }

        // --- 3. DYNAMIC CONTENT MAPPING ROUTER PANELS ---

            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects'));
            const dbStaff = JSON.parse(localStorage.getItem('vantage_staff'));
            const dbAttendance = JSON.parse(localStorage.getItem('vantage_attendance'));
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements'));
            const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials'));
            const dbMaterials = JSON.parse(localStorage.getItem('vantage_materials'));
            const dbOdometer = JSON.parse(localStorage.getItem('vantage_odometer'));
            const dbDeductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-400 font-bold text-sm">Vantage Node Executive Dashboard Active. Access panels via sidebar menu.</div>`;
            }

            // --- MERGED & UPGRADED PROJECT LIFECYCLE MANAGEMENT (WITH EDIT/DELETE CONTROLS) ---
            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Lifecycle Execution Nodes</h3>
                            ${isAdmin ? `<button onclick="openModal('p-mod')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-bold transition-colors">+ Provision New Site</button>` : ''}
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative overflow-hidden">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-2">${p.name}</h4>
                                    <div class="space-y-1 text-gray-400 text-[11px] pt-1">
                                        <p>📍 Location: <span class="text-gray-200 font-medium">${p.location}</span></p>
                                        <p>🏢 Client Name: <span class="text-gray-200 font-medium">${p.client}</span></p>
                                        ${isAdmin ? `<p>💰 Secured Valuation: <span class="text-green-400 font-bold font-mono">₹${Number(p.contractValue).toLocaleString()}</span></p>` : ''}
                                        <p>🎯 GPS Target Vector: <span class="text-gray-400 font-mono">${p.lat}, ${p.lng}</span></p>
                                    </div>
                                    ${isAdmin ? `
                                        <div class="flex space-x-2 pt-3 mt-1 border-t border-borderGray">
                                            <button onclick="editProjectAction('${p.id}')" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-200 py-1 rounded font-bold transition-colors">Modify Parameters</button>
                                            <button onclick="deleteProjectAction('${p.id}')" class="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/60 px-3 py-1 rounded font-bold transition-colors">Purge Node</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div id="p-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 id="modal-project-title" class="text-sm font-bold text-white">Provision New Construction Node</h4>
                            <form id="p-form" class="space-y-3">
                                <input type="hidden" id="p-edit-id">
                                <div><label class="text-gray-400 block mb-1">Project Site Name</label><input type="text" id="p-name" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>

                                <div><label class="text-gray-400 block mb-1">Physical Location</label><input type="text" id="p-loc" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>

                document.getElementById('p-form')?.addEventListener('submit', function(e){

                    const contractValue = document.getElementById('p-val').value;
                    const lat = document.getElementById('p-lat').value;
                    const lng = document.getElementById('p-lng').value;

                    let projList = JSON.parse(localStorage.getItem('vantage_projects'));
                    if (id) {
                        projList = projList.map(p => p.id === id ? { id, name, client, location, contractValue, lat, lng, status: p.status } : p);

                        projList.push({ id: 'p_' + Date.now(), name, client, location, contractValue, lat, lng, status: 'Active' });
                    }
                    localStorage.setItem('vantage_projects', JSON.stringify(projList));
                    closeModal('p-mod'); renderERP();
                });

            else if (currentTab === "measurements") {

                            ${dbMeasurements.map(m=>`<tr><td class="p-3 text-white font-medium">${m.proj}</td><td class="p-3 text-gray-300">${m.desc}</td><td class="p-3 text-center font-mono text-gray-400">${m.l}m x ${m.w}m x ${m.d}m</td><td class="p-3 text-right text-blue-400 font-mono font-bold">${m.tot} m³</td></tr>`).join('')}
                            </table>
                        </div>
                    </div>
                    <div id="m-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">

                                <div><label class="block mb-1 text-gray-400">Target Site</label><select id="m-p" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                                <div><label class="block mb-1 text-gray-400">Description</label><input type="text" id="m-d" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-gray-400 block mb-1">Length</label><input type="number" step="any" id="m-l" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Width</label><input type="number" step="any" id="m-w" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Depth</label><input type="number" step="any" id="m-depth" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                </div>
                                <div class="flex justify-end space-x-2"><button type="button" onclick="closeModal('m-mod')" class="bg-gray-800 p-2 rounded">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded">Commit Dimension</button></div>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('m-form')?.addEventListener('submit', function(e){
                    e.preventDefault(); const l=Number(document.getElementById('m-l').value); const w=Number(document.getElementById('m-w').value); const d=Number(document.getElementById('m-depth').value);
                    dbMeasurements.push({ proj: document.getElementById('m-p').value, desc: document.getElementById('m-d').value, l, w, d, tot: (l*w*d).toFixed(3), recordedBy: currentUser.name });
                    localStorage.setItem('vantage_measurements', JSON.stringify(dbMeasurements)); closeModal('m-mod'); renderERP();
                });
            }

            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-white uppercase tracking-wider">📦 Logistics Yard Management Dashboard</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl p-4 text-center text-gray-500">[ Two-Way Material Control Subsystem Pipeline Engaged ]</div>
                    </div>
                `;
            }

            else if (currentTab === "machinery") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-white uppercase tracking-wider">⚙️ Fleet Machinery & Odometer Expense Matrices</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl p-4 text-center text-gray-500">[ Fleet Telematics Multiplier Engine Connected ]</div>
                    </div>
                `;
            }

            else if (currentTab === "financial") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white">💰 Operational Financial Ledger</h3><button onclick="openFinanceModal()" class="bg-red-950 text-red-400 border border-red-900 px-3 py-1 rounded font-bold">+ Record Site Expense</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Date</th><th class="p-3">Staff Node</th><th class="p-3">Summary Description</th><th class="p-3 text-right">Amount (₹)</th><th class="p-3 text-center">Audit Status</th></tr>
                            ${dbFinancials.map(f=>`
                                <tr class="border-b border-borderGray">
                                    <td class="p-3 font-mono text-gray-500">${f.date}</td><td class="p-3 font-bold text-white">${f.user}</td><td class="p-3 text-gray-300">${f.desc}</td><td class="p-3 text-right font-mono">₹${f.amount.toLocaleString()}</td>
                                    <td class="p-3 text-center">
                                        ${f.status === 'Pending' && isAdmin ? `
                                            <div class="flex justify-center space-x-2"><button onclick="auditExpense('${f.id}', 'Approved')" class="bg-green-600 px-2 py-0.5 rounded font-bold text-white">Approve</button><button onclick="auditExpense('${f.id}', 'Rejected')" class="bg-red-600 px-2 py-0.5 rounded font-bold text-white">Unapprove</button></div>
                                        ` : `<span class="px-2 py-0.5 rounded font-bold uppercase text-[10px] ${f.status==='Approved'?'bg-green-500/10 text-green-400':'bg-red-500/10 text-red-400'}">${f.status}</span>`}
                                    </td>
                                </tr>
                            `).join('')}
                            </table>
                        </div>
                    </div>
                    <div id="f-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3">
                            <h4 class="font-bold text-white text-xs">Record Site Log Expense</h4>
                            <form id="f-form" class="space-y-3">
                                <div><label class="block text-gray-400 mb-1">Expense Voucher Amount (₹)</label><input type="number" id="f-amt" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono"></div>
                                <div><label class="block text-gray-400 mb-1">Detailed Description Summary</label><input type="text" id="f-desc" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <div class="flex justify-end space-x-2"><button type="button" onclick="closeModal('f-mod')" class="bg-gray-800 p-2 rounded">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded">Submit Request</button></div>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('f-form')?.addEventListener('submit', function(e){
                    e.preventDefault();
                    dbFinancials.unshift({ id:'f_'+Date.now(), user:currentUser.name, amount:Number(document.getElementById('f-amt').value), desc:document.getElementById('f-desc').value, date:new Date().toISOString().split('T')[0], status:'Pending' });
                    localStorage.setItem('vantage_financials', JSON.stringify(dbFinancials)); closeModal('f-mod'); renderERP();
                });
            }

            else if (currentTab === "attendance") {
                const dayString = new Date().toISOString().split('T')[0];
                const activeShift = dbAttendance.find(a => a.staffName === currentUser.name && a.date === dayString);
                container.innerHTML = `
                    <div class="max-w-md mx-auto bg-panelBg border border-borderGray rounded-xl p-6 text-center space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">Shift Timeline Lock</h3>
                        <div class="grid grid-cols-2 gap-4"><button onclick="executeShiftAuthentication('In')" class="bg-blue-600 p-3 rounded font-bold uppercase text-white">☀️ Punch In</button><button onclick="executeShiftAuthentication('Out')" class="bg-indigo-600 p-3 rounded font-bold uppercase text-white">🌙 Punch Out</button></div>
                    </div>
                `;
            }

            // --- UPGRADED STAFF PROVISIONING CONTROL SYSTEM PANEL (WITH DESIGNATION & SITE WORK ALLOTMENT) ---
            else if (currentTab === "staff-mgmt") {
                if (!isAdmin) return;
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">👥 Human Capital Assets & Payroll Deployment Matrix</h3>
                            <button onclick="openModal('s-mod')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-xs font-bold font-sans transition-colors">+ Provision Profile Node</button>
                        </div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Identity Name</th><th class="p-3">Designation / Role</th><th class="p-3 font-semibold">Security Pass Key</th><th class="p-3">Allotted Site Node Work</th><th class="p-3 text-right">Base Salary</th><th class="p-3 text-right text-red-400">Deductions</th><th class="p-3 text-right text-blue-400">Net Earned</th></tr>
                            ${dbStaff.map(s => {
                                const penalty = dbDeductions[s.name] || 0;
                                return `
                                    <tr class="border-b border-borderGray hover:bg-gray-800/20">
                                        <td class="p-3 text-white font-bold">${s.name}</td>
                                        <td class="p-3"><span class="bg-darkBg px-2 py-0.5 border border-borderGray rounded text-gray-300 font-medium">${s.role}</span></td>
                                        <td class="p-3 font-mono text-gray-500">${s.pass}</td>
                                        <td class="p-3 text-gray-300 font-medium truncate max-w-[150px]">${s.allottedWork || 'All Site Nodes'}</td>
                                        <td class="p-3 text-right font-mono">₹${Number(s.baseSalary).toLocaleString()}</td>
                                        <td class="p-3 text-right text-red-400 font-bold">-₹${penalty.toLocaleString()}</td>
                                        <td class="p-3 text-right text-blue-400 font-extrabold font-mono">₹${(s.baseSalary - penalty).toLocaleString()}</td>
                                    </tr>
                                `;
                            }).join('')}
                            </table>
                        </div>
                    </div>

                    <div id="s-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 class="text-sm font-bold text-white border-b border-borderGray pb-2">Provision New Staff Profile Node</h4>
                            <form id="s-form" class="space-y-3">
                                <div><label class="text-gray-400 block mb-1">Full Identity Name ID</label><input type="text" id="s-name" placeholder="e.g. Hitesh Jain" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-medium"></div>
                                
                                <div>
                                    <label class="text-gray-400 block mb-1">Workspace Clearance Designation</label>
                                    <select id="s-role" class="w-full bg-darkBg border border-borderGray rounded p-2 text-white">
                                        <option value="Engineer">Civil Site Engineer</option>
                                        <option value="Accountant">Accountant / Quantity Surveyor</option>
                                        <option value="Supervisor">Site Supervisor</option>
                                    </select>
                                </div>
                                
                                <div><label class="text-gray-400 block mb-1">Assigned Security Key (Password)</label><input type="text" id="s-pass" placeholder="Enter custom security pass code..." required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                
                                <div>
                                    <label class="text-gray-400 block mb-1">Allot Construction Site Node Work</label>
                                    <select id="s-work" class="w-full bg-darkBg border border-borderGray rounded p-2 text-white">
                                        <option value="All Site Nodes">Global Allotment (All Sites)</option>
                                        ${dbProjects.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                                    </select>
                                </div>
                                
                                <div><label class="text-gray-400 block mb-1">Initial Base Monthly Salary (₹)</label><input type="number" id="s-salary" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-mono"></div>
                                
                                <div class="flex justify-end space-x-2 pt-2">
                                    <button type="button" onclick="closeModal('s-mod')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button>
                                    <button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold">Generate Profile Profile</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('s-form')?.addEventListener('submit', function(e){
                    e.preventDefault();
                    dbStaff.push({
                        id: 's_' + Date.now(),
                        name: document.getElementById('s-name').value.trim(),
                        role: document.getElementById('s-role').value,
                        pass: document.getElementById('s-pass').value.trim(),
                        allottedWork: document.getElementById('s-work').value,
                        baseSalary: Number(document.getElementById('s-salary').value),
                        status: 'Active'
                    });
                    localStorage.setItem('vantage_staff', JSON.stringify(dbStaff));
                    closeModal('s-mod'); renderERP();
                });
            }

            else if (currentTab === "billing") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-5 text-xs text-gray-400">[ Billing Invoicing Buffer Active ]</div>`;
            }

            else {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center font-bold text-gray-600 uppercase tracking-widest">[ Secure Elevated Node Module '${currentTab.toUpperCase()}' Active ]</div>`;
            }
        }

        // --- 4. DATA PARAMETERS HANDLER ACTIONS ENGINE ---
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function editProjectAction(id) {
            const projects = JSON.parse(localStorage.getItem('vantage_projects'));
            const p = projects.find(x => x.id === id);
            if (p) {
                document.getElementById('p-edit-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-client').value = p.client;
                document.getElementById('p-loc').value = p.location;
                document.getElementById('p-val').value = p.contractValue;
                document.getElementById('p-lat').value = p.lat;
                document.getElementById('p-lng').value = p.lng;
                document.getElementById('modal-project-title').innerText = "Modify Active Construction Node Parameters";
                openModal('p-mod');
            }
        }

        function deleteProjectAction(id) {
            if (confirm("🚨 WARNING COMMAND: Are you sure you want to completely PURGE this construction node project from all logs forever?")) {
                let projects = JSON.parse(localStorage.getItem('vantage_projects'));
                projects = projects.filter(x => x.id !== id);
                localStorage.setItem('vantage_projects', JSON.stringify(projects));
                renderERP();
            }
        }

        function executeShiftAuthentication(type) {
            const dayString = new Date().toISOString().split('T')[0];
            let logs = JSON.parse(localStorage.getItem('vantage_attendance')) || [];
            logs.push({ staffName: currentUser.name, date: dayString, timestamp: new Date().toLocaleTimeString(), status: 'PRESENT', projectName: 'Udaipur Site' });
            localStorage.setItem('vantage_attendance', JSON.stringify(logs)); alert(`Shift ${type} Authenticated Successfully.`); renderERP();
        }

        function auditExpense(id, decision) {
            let financials = JSON.parse(localStorage.getItem('vantage_financials'));
            const f = financials.find(x=>x.id===id); f.status = decision;
            if(decision==='Rejected') {
                let d = JSON.parse(localStorage.getItem('vantage_deductions')) || {}; d[f.user] = (d[f.user]||0) + f.amount;
                localStorage.setItem('vantage_deductions', JSON.stringify(d));
            }
            localStorage.setItem('vantage_financials', JSON.stringify(financials)); renderERP();
        }

        function openFinanceModal() { document.getElementById('f-form').reset(); openModal('f-mod'); }

        renderERP();
    </script>
</body>
</html>
