<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased">

    <div id="app-root"></div>

    <script>
        // --- 1. HARDWARE SYSTEM FORCE RESET RUNTIME ---
        const currentMatrixVersion = "vantage_v8_unfreeze";
        if (localStorage.getItem('vantage_matrix_version') !== currentMatrixVersion) {
            localStorage.clear();
            localStorage.setItem('vantage_matrix_version', currentMatrixVersion);
        }

        // --- 2. ENTERPRISE DATA MATRICES SEEDING ---
        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); 
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_site_photos')) localStorage.setItem('vantage_site_photos', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        // --- 3. CORE ROUTING CONTROLLER & VIEW ENGINE ---
        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            // Phase A: Admin Initialization Setup Screen
            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>
                                <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                                <p class="text-xs text-gray-400 mt-1">Configure your primary administration keys.</p>
                            </div>
                            <form id="setup-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Identity Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="Manoj Singh Rao"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors shadow-lg">Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim();
                    const pass = document.getElementById('setup-pass').value.trim();
                    if(pass !== document.getElementById('setup-confirm').value.trim()) { alert("Error: Security Keys do not match."); return; }
                    
                    const freshList = [{ id: 's_master', name, role: 'Master Admin', pass, baseSalary: 120000, status: 'Active', allottedWork: 'All Site Nodes' }];
                    localStorage.setItem('vantage_staff', JSON.stringify(freshList));
                    alert("Success: Credentials stored safely."); renderERP();
                });
                return;
            }

            // Phase B: Security Gateway Lock Screen
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const uList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
                    const user = uList.find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { 
                        if(user.status === 'Blocked' || user.status === 'Terminated') { alert("Access Denied: Node suspended."); return; }
                        currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); currentTab = "dashboard"; renderERP(); 
                    } else { alert("Verification Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');
            const notifications = JSON.parse(localStorage.getItem('vantage_notifications')) || {};

            // Phase C: Core Navigation Framework & Layout Configuration
            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div class="overflow-y-auto max-h-[85vh]">
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Core Node</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Executive Dashboard</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Lifecycle Projects</button>
                                <button onclick="switchTab('site-photos')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'site-photos' ? 'bg-blue-600 text-white' : 'text-emerald-400 hover:bg-gray-800'}">📷 Site Photo Vault</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Measurement Sheets</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Material Logistics</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>
                                
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED PRIVILEGES</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff & Salary Matrix</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase text-[10px]">${currentUser.name.substring(0,2)}</div>
                                <div class="truncate"><p class="font-medium text-white truncate">${currentUser.name}</p><p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">${currentUser.role}</p></div>
                            </div>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 hover:text-red-400 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Terminate Session</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        ${notifications[currentUser.name] ? `<div class="bg-blue-600 text-white p-3 rounded-xl font-bold mb-4 flex justify-between items-center"><span>⚡ NOTIFICATION: ${notifications[currentUser.name]}</span><button onclick="clearNotification('${currentUser.name}')" class="bg-black/20 px-2 py-0.5 rounded text-[10px]">OK</button></div>` : ''}
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }
        function clearNotification(user) { const n = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; delete n[user]; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP(); }

        // --- 4. UNFREEZE TAB RENDERING CORE CONTROLLER MODULES ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [];
            const dbStaff = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const dbAttendance = JSON.parse(localStorage.getItem('vantage_attendance')) || [];
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements')) || [];
            const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials')) || [];
            const dbMaterials = JSON.parse(localStorage.getItem('vantage_materials')) || [];
            const dbOdometer = JSON.parse(localStorage.getItem('vantage_odometer')) || [];
            const dbPhotos = JSON.parse(localStorage.getItem('vantage_site_photos')) || [];
            const dbDeductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Projects</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbProjects.length} Nodes</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Active Fleet Size</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbOdometer.length} Shift Logs</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Material Shipments</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbMaterials.length} Items</h3></div>
                        <div class="bg-panelBg border border-borderGray p-4 rounded-xl"><p class="text-gray-400 text-[10px] font-bold uppercase">Total Personnel</p><h3 class="text-xl font-extrabold mt-1 text-white">${dbStaff.length} Accounts</h3></div>
                    </div>
                    <div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-500 font-bold">Vantage Node Intelligent Core Synchronization Active. All systems fully thawed and functional.</div>
                `;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Lifecycle Execution Nodes</h3>${isAdmin ? `<button onclick="openProjectModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-bold transition-colors">+ Provision New Site</button>` : ''}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative overflow-hidden">
                                    <h4 class="font-bold text-white text-xs border-b border-borderGray pb-2">${p.name}</h4>
                                    <div class="space-y-1 text-gray-400 text-[11px] pt-1">
                                        <p>📍 Location: <span class="text-gray-200 font-medium">${p.location}</span></p>
                                        <p>🏢 Client Name: <span class="text-gray-200 font-medium">${p.client}</span></p>
                                        ${isAdmin ? `<p>💰 Valuation: <span class="text-green-400 font-bold font-mono">₹${Number(p.contractValue).toLocaleString()}</span></p>` : ''}
                                        <p>🎯 GPS Vector: <span class="text-gray-400 font-mono">${p.lat}, ${p.lng}</span></p>
                                    </div>
                                    ${isAdmin ? `
                                        <div class="flex space-x-2 pt-3 mt-1 border-t border-borderGray">
                                            <button onclick="editProjectAction('${p.id}')" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-200 py-1 rounded font-bold transition-colors">Modify Parameters</button>
                                            <button onclick="deleteProjectAction('${p.id}')" class="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/60 px-3 py-1 rounded font-bold transition-colors">Purge Node</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div id="p-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 id="modal-project-title" class="text-sm font-bold text-white">Provision New Construction Node</h4>
                            <form id="p-form" class="space-y-3">
                                <input type="hidden" id="p-edit-id">
                                <div><label class="text-gray-400 block mb-1">Project Site Name</label><input type="text" id="p-name" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Client Title</label><input type="text" id="p-client" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Physical Location</label><input type="text" id="p-loc" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div><label class="text-gray-400 block mb-1">Contract Value Sum (₹)</label><input type="number" id="p-val" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="text-gray-400 block mb-1">GPS Latitude</label><input type="number" step="any" id="p-lat" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">GPS Longitude</label><input type="number" step="any" id="p-lng" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                </div>
                                <div class="flex justify-end space-x-2 pt-2"><button type="button" onclick="closeModal('p-mod')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold">Commit Parameter Node</button></div>
                            </form>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "site-photos") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-panelBg border border-borderGray p-5 rounded-xl">
                            <h3 class="text-xs font-bold uppercase text-white mb-3">📷 Capture / Upload Site Progress Image</h3>
                            <form id="photo-upload-form" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                                <div><label class="text-gray-400 block mb-1 font-bold">Select Site</label><select id="photo-project" required class="w-full bg-darkBg border border-borderGray rounded p-2.5 text-white">${dbProjects.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                                <div><label class="text-gray-400 block mb-1 font-bold">Select Image</label><input type="file" id="photo-file" accept="image/*" required class="w-full bg-darkBg border border-borderGray rounded p-1.5 text-white text-xs"></div>
                                <button type="submit" class="bg-emerald-600 p-2.5 rounded font-bold uppercase text-white tracking-wider">Commit Photo Snap</button>
                            </form>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            ${dbPhotos.map(ph => `<div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden shadow-xl"><img src="${ph.imgData}" class="w-full h-40 object-cover bg-black"><div class="p-3 text-[10px] space-y-1 text-gray-400"><p class="text-white font-bold text-xs truncate">${ph.projectName}</p><p>👤 Uploaded By: ${ph.uploadedBy}</p><p>📅 Date: ${ph.timestamp}</p><p class="text-emerald-400 font-mono">📍 GPS: ${ph.gps}</p></div></div>`).join('')}
                        </div>
                    </div>
                `;
                document.getElementById('photo-upload-form')?.addEventListener('submit', function(e) {
                    e.preventDefault(); const file = document.getElementById('photo-file').files[0]; const reader = new FileReader();
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const gps = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                        reader.onload = function(event) {
                            dbPhotos.unshift({ id: 'ph_'+Date.now(), projectName: document.getElementById('photo-project').value, imgData: event.target.result, uploadedBy: currentUser.name, timestamp: new Date().toLocaleString(), gps });
                            localStorage.setItem('vantage_site_photos', JSON.stringify(dbPhotos)); alert("Success: Progress image uploaded safely with Geo-tag."); renderTabContent();
                        }; reader.readAsDataURL(file);
                    }, () => { alert("Error: Location matrix denied."); });
                });
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">Measurement Sheets M-Book Records</h3><button onclick="openModal('m-mod')" class="bg-blue-600 px-3 py-1.5 rounded font-bold">+ Log M-Book Dimensions</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Site Node</th><th class="p-3">Component Log Description</th><th class="p-3 text-center">Dimensions (L x W x D)</th><th class="p-3 text-right">Volume</th><th class="p-3 text-center">Logged By</th></tr>
                            ${dbMeasurements.length === 0 ? `<tr><td colspan="5" class="p-6 text-center text-gray-500">No dimensions entered in database yet.</td></tr>` : ''}
                            ${dbMeasurements.map(m=>`<tr><td class="p-3 text-white font-medium">${m.proj}</td><td class="p-3 text-gray-300">${m.desc}</td><td class="p-3 text-center font-mono text-gray-400">${m.l}m x ${m.w}m x ${m.d}m</td><td class="p-3 text-right text-blue-400 font-mono font-bold">${m.tot} m³</td><td class="p-3 text-center"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded text-gray-400">${m.recordedBy}</span></td></tr>`).join('')}
                            </table>
                        </div>
                    </div>
                    <div id="m-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3">
                            <h4 class="font-bold text-white text-xs border-b border-borderGray pb-2">Record Civil Log Measurement</h4>
                            <form id="m-form" class="space-y-3 text-xs">
                                <div><label class="block mb-1 text-gray-400">Target Construction Site</label><select id="m-p" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                                <div><label class="block mb-1 text-gray-400">Item Component Description</label><input type="text" id="m-d" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-gray-400 block mb-1">Length (m)</label><input type="number" step="any" id="m-l" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Width (m)</label><input type="number" step="any" id="m-w" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Depth (m)</label><input type="number" step="any" id="m-depth" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                </div>

            if(decision === 'Rejected') {
                let d = JSON.parse(localStorage.getItem('vantage_deductions')) || {}; d[record.user] = (d[record.user]||0) + record.amount; localStorage.setItem('vantage_deductions', JSON.stringify(d));
                const notes = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; notes[record.user] = `🚨 AUDIT WARNING: Site expense voucher of ₹${record.amount.toLocaleString()} was UNAPPROVED and DEDUCTED from salary.`;
                localStorage.setItem('vantage_notifications', JSON.stringify(notes));
            } renderERP();
        }

        function executeShiftPunch(type) {
            const dayString = new Date().toISOString().split('T')[0]; const timeString = new Date().toLocaleTimeString();
            let attList = JSON.parse(localStorage.getItem('vantage_attendance')) || []; let currentShift = attList.find(a => a.staffName === currentUser.name && a.date === dayString);
            if(type === 'In') { if(!currentShift) { attList.unshift({ staffName: currentUser.name, date: dayString, punchIn: timeString, punchOut: '', status: 'PRESENT' }); } alert("☀️ Morning Shift Authenticated."); } 
            else { if(currentShift) { currentShift.punchOut = timeString; } alert("🌙 Evening Shift Closed."); }
            localStorage.setItem('vantage_attendance', JSON.stringify(attList)); renderERP();
        }

        renderERP();
    </script>
</body>
</html>
