        // --- 📸 LIVE CAMERA AND AUTOMATIC GPS GEOLOCATION STAMP DRIVERS ---
        async function startLiveCameraStream() {
            const video = document.getElementById('hardware-video-stream');
            const placeholder = document.getElementById('camera-placeholder-text');
            
            // Step A: Request Real-time Browser GPS Coordinates
            if (navigator.geolocation) {
                document.getElementById('geo-lat-display').innerText = "Locating...";
                document.getElementById('geo-lng-display').innerText = "Locating...";
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        lockedLatitude = position.coords.latitude;
                        lockedLongitude = position.coords.longitude;
                        document.getElementById('geo-lat-display').innerText = lockedLatitude.toFixed(6) + " °N";
                        document.getElementById('geo-lng-display').innerText = lockedLongitude.toFixed(6) + " °E";
                    },
                    (error) => {
                        console.warn("GPS timeout or denied. Defaulting to Udaipur Office Node.");
                        lockedLatitude = 24.5854;
                        lockedLongitude = 73.7125;
                        document.getElementById('geo-lat-display').innerText = "24.585400 (Locked)";
                        document.getElementById('geo-lng-display').innerText = "73.712500 (Locked)";
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                alert("Aapke browser/device mein GPS infrastructure support nahi hai.");
            }

            // Step B: Trigger Device Hardware Camera Stream
            try {
                if (cameraStream) { stopLiveCameraStream(); }
                
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }, // Prefer Rear Main Camera for site inspection
                    audio: false
                });
                
                if (video) {
                    video.srcObject = cameraStream;
                    video.classList.remove('hidden');
                    if (placeholder) placeholder.classList.add('hidden');
                }
            } catch (err) {
                alert("Camera Access Error: Kripya site camera settings mein permissions check karein.");
                console.error(err);
            }
        }

        function capturePhotoFrame() {
            const video = document.getElementById('hardware-video-stream');
            const canvas = document.getElementById('hardware-canvas-buffer');
            
            if (!cameraStream || !video) {
                alert("Pehle 'Initialize Live Camera' par click karke camera active karein.");
                return;
            }

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            // Draw active video track vector directly into canvas frame buffer
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Extract standard high resolution Base64 image payload
            capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.85);
            
            // Render thumbnail update UI
            const previewBox = document.getElementById('captured-preview-box');
            const previewThumb = document.getElementById('captured-thumb-src');
            if (previewBox && previewThumb) {
                previewThumb.src = capturedImageBase64;
                previewBox.classList.remove('hidden');
            }
            alert("📸 Frame snap captured with locked coordinates successfully!");
        }

        async function uploadCapturedPhotoToCloud() {
            if (!capturedImageBase64) {
                alert("Kripya pehle 'Click Snap' button se photo capture karein.");
                return;
            }

            const targetProject = document.getElementById('photo-target-project').value;
            const now = new Date();
            const timestampStr = now.getFullYear() + "-" + 
                                 String(now.getMonth()+1).padStart(2,'0') + "-" + 
                                 String(now.getDate()).padStart(2,'0') + " " + 
                                 String(now.getHours()).padStart(2,'0') + ":" + 
                                 String(now.getMinutes()).padStart(2,'0');

            const payload = {
                project_name: targetProject,
                timestamp: timestampStr,
                lat: lockedLatitude || 24.5854,
                lng: lockedLongitude || 73.7125,
                image_data: capturedImageBase64
            };

            try {
                const response = await fetch(`${SUPABASE_REST_URL}/site_photos`, {
                    method: "POST",
                    headers: cloudHeaders,
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("📤 Geotagged Site Photo Cloud par upload ho gayi hai!");
                    stopLiveCameraStream();
                    capturedImageBase64 = null;
                    initializeSecurityGatekeeper(); // Refresh live view grid
                } else {
                    alert("Database upload failed. Response error code triggered.");
                }
            } catch (e) {
                alert("Upload network pipeline failure.");
            }
        }

        function stopLiveCameraStream() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        function logoutSession() { stopLiveCameraStream(); currentUser = null; sessionStorage.removeItem('vantage_active_session'); location.reload(); }
        function renderLeafletMapLayer() { let m = document.getElementById('vantage-live-map'); if (!m) return; let mo = L.map('vantage-live-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mo); dbProjects.forEach(p => { if (p.lat) L.marker([p.lat, p.lng]).addTo(mo); }); }
        function renderLeafletRadarLayer() { let r = document.getElementById('vantage-staff-map'); if (!r) return; let ro = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(ro); dbStaff.forEach(s => { if (s.lat) L.marker([s.lat, s.lng]).addTo(ro); }); }
        
        async function deleteRowCloud(table, id) { 
            if(confirm("Kya aap is record ko hamesha ke liye delete karna chahte hain?")) { 
                const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders }); 
                if(response.ok) { alert("Record successfully deleted."); initializeSecurityGatekeeper(); } 
            } 
        }

        initializeSecurityGatekeeper();
    </script>
</body>
