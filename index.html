<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CPS ERP | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen font-sans">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 flex flex-col">
        <h1 class="text-blue-500 font-bold mb-6 text-lg">CPS COMMAND CENTER</h1>
        <div id="nav-menu" class="space-y-1 flex-grow overflow-y-auto"></div>
        
        <div class="mt-4 pt-4 border-t border-gray-800">
            <p class="text-[10px] text-gray-500 uppercase">Logged in as:</p>
            <p id="user-profile" class="text-sm font-bold text-blue-400 mb-3 uppercase">Manoj Singh Rao</p>
            <button onclick="logout()" class="w-full bg-red-900/20 text-red-500 text-xs py-2 rounded border border-red-900 hover:bg-red-900 transition">TERMINATE SESSION</button>
            <div class="mt-4 text-[10px] text-gray-500">SYSTEM STATUS: <span class="text-green-500 font-bold">HEALTHY</span></div>
        </div>
    </aside>

    <!-- WORKSPACE -->
    <main class="flex-1 p-8 overflow-y-auto" id="workspace">
        <h2 id="workspace-title" class="text-2xl font-bold mb-8 text-white">EXECUTIVE DASHBOARD</h2>
        <div id="content-area"></div>
    </main>

    <script>
        const modules = [
            { name: 'Live Projects' }, { name: 'Site Photos' }, { name: 'Inventory Hub' }, 
            { name: 'Attendance' }, { name: 'Measurement' }, { name: 'Machinery Fleet' },
            { name: 'Subcontractors' }, { name: 'Executive Dashboard' }, { name: 'Financial Ledger' }, 
            { name: 'Live Tracking' }, { name: 'Billing Section' }, { name: 'Petty Cash' }, 
            { name: 'Tenders Matrix' }, { name: 'Telemetry' }, { name: 'Staff Identity' }
        ];

        function loadModule(name) {
            document.getElementById('workspace-title').innerText = name + " WORKSPACE";
            const area = document.getElementById('content-area');
            
            if (name === 'Live Projects') {
                area.innerHTML = `
                <div id="project-workspace" class="bg-gray-900 p-6 rounded border border-gray-800">
                    <div id="admin-entry-form" class="bg-black p-6 rounded border border-blue-900 mb-8">
                        <h3 class="text-blue-400 font-bold mb-4">+ NEW PROJECT ENTRY (Admin/Accountant Only)</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="p-name" placeholder="Name of Work" class="bg-gray-900 p-2 rounded">
                            <input type="text" id="p-client" placeholder="Name of Client" class="bg-gray-900 p-2 rounded">
                            <input type="date" id="p-commence" placeholder="Commencement Date" class="bg-gray-900 p-2 rounded">
                            <input type="date" id="p-completion" placeholder="Date of Completion" class="bg-gray-900 p-2 rounded">
                            <input type="number" id="p-cost" placeholder="Project Cost" class="bg-gray-900 p-2 rounded">
                            <input type="number" id="p-dlp" placeholder="DLP Period (Years)" class="bg-gray-900 p-2 rounded">
                            <input type="text" id="p-lat" placeholder="Latitude (Compulsory)" class="bg-gray-900 p-2 rounded border border-red-500">
                            <input type="text" id="p-lng" placeholder="Longitude (Compulsory)" class="bg-gray-900 p-2 rounded border border-red-500">
                            <button onclick="saveProject()" class="col-span-2 bg-blue-600 p-2 rounded font-bold hover:bg-blue-700">SUBMIT PROJECT</button>
                        </div>
                    </div>
                    <table class="w-full text-left">
                        <tr class="text-gray-500 text-xs uppercase"><th>Work</th><th>Client</th><th>Cost</th><th>DLP Expiry</th><th>Status</th><th>Actions</th></tr>
                        <tbody id="project-list"></tbody>
                    </table>
                </div>`;
            } else if (name === 'Site Photos') {
                area.innerHTML = `
                <div class="bg-gray-900 p-8 rounded border border-gray-800 text-center">
                    <button onclick="capturePhoto()" class="bg-blue-600 px-8 py-4 rounded font-bold hover:bg-blue-700 transition">CAPTURE & UPLOAD WITH GPS</button>
                    <p id="gps-status" class="text-gray-500 mt-4 text-sm">Waiting for GPS lock...</p>
                </div>`;
            } else {
                area.innerHTML = `<div class="p-10 bg-gray-900 border border-gray-800 rounded text-center text-gray-400">Workspace for ${name} initialized...</div>`;
            }
        }

        // Project Saving Logic
        function saveProject() {
            const lat = document.getElementById('p-lat').value;
            const lng = document.getElementById('p-lng').value;
            const dlpYears = parseInt(document.getElementById('p-dlp').value);
            const compDateVal = document.getElementById('p-completion').value;
            
            if(!lat || !lng) { alert("❌ GPS Coordinates are mandatory!"); return; }
            if(!compDateVal || isNaN(dlpYears)) { alert("Please fill completion date and DLP years."); return; }

            let dlpDate = new Date(compDateVal);
            dlpDate.setFullYear(dlpDate.getFullYear() + dlpYears);
            alert("Project saved! DLP Expiry Date: " + dlpDate.toDateString());
        }

        // Geo-Tagging Logic
        function capturePhoto() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude.toFixed(4);
                    const lng = pos.coords.longitude.toFixed(4);
                    document.getElementById('gps-status').innerText = `✅ GPS Locked: ${lat}, ${lng} | Uploading...`;
                    alert("Photo captured with Geo-Tags!");
                }, () => alert("GPS Access Required!"));
            }
        }

        function logout() { location.reload(); }

        function initApp() {
            const navMenu = document.getElementById('nav-menu');
            modules.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-2 text-sm hover:bg-gray-800 rounded transition';
                btn.innerText = m.name;
                btn.onclick = () => loadModule(m.name);
                navMenu.appendChild(btn);
            });
        }
        initApp();
    </script>
</body>
</html>
