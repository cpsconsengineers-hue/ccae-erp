        async function fetchNativeTable(endpoint, fallbackMockData) {
            try {
                const response = await fetch(`${SUPABASE_REST_URL}/${endpoint}?select=*`, { method: "GET", headers: cloudHeaders });
                if (!response.ok) return fallbackMockData;
                const data = await response.json();
                return Object.freeze(data && data.length > 0 ? data : fallbackMockData);
            } catch (e) { return fallbackMockData; }
        }

            try {
                dbStaff = await fetchNativeTable('staff', [

                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">⚙️ Machinery Assets Fleet Log & Invoicing</h3><button onclick="openModal('m-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">+ Log Assets Working Shift</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden"><table class="w-full text-left text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray font-bold uppercase"><th class="p-3">Asset Vehicle</th><th>Metric System Base</th><th>Working Quantity</th><th>Shift Rate</th><th class="text-right pr-4">Generated Bill Value</th></tr>${dbMachinery.map(m=>`<tr class="border-b border-borderGray font-mono"><td class="p-3 text-white font-sans font-bold">${m.asset_name}</td><td>${m.billing_type}</td><td>${m.units_worked} Logs</td><td>₹${m.unit_rate}</td><td class="text-right pr-4 font-bold text-orange-400">₹${Number(m.total_bill).toLocaleString()}</td></tr>`).join('')}</table></div>
                    </div>
                    <div id="m-mod" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50"><div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 space-y-3 shadow-2xl"><h4 class="font-bold text-white text-xs uppercase tracking-widest">Machinery Asset Shift Log Form</h4><form id="m-form" class="space-y-2" onsubmit="executeMachinerySubmit(event)"><input type="text" id="m-name" placeholder="Asset Name" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"><select id="m-type" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold"><option value="Per Hour">Per Hour Calculation Basis</option><option value="Per Trip">Per Trip Logistics Basis</option></select><input type="number" id="m-qty" placeholder="Units Worked (Hours / Trips)" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono"><input type="number" id="m-rate" placeholder="Base Matrix Rate (₹)" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono"><button type="submit" class="w-full bg-blue-600 py-2.5 rounded text-white font-bold uppercase">Commit Shift Log</button><button type="button" onclick="closeModal('m-mod')" class="w-full bg-gray-850 py-1.5 rounded text-gray-400 border border-borderGray uppercase text-[10px]">❌ Cancel / Back</button></form></div></div>
                `;
            }

            else if (currentTab === "tenders") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📄 Tender Pipeline Registry Nodes</h3><button onclick="openModal('t-mod')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">+ Register Tender Pipeline</button></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbTenders.map(t=>`
                                <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-2 relative"><div class="flex justify-between items-center border-b border-borderGray pb-2"><h4 class="font-bold text-white text-xs">${t.tender_name}</h4><span class="px-2 py-0.5 rounded font-mono text-[9px] font-bold ${t.status==='Allotted'?'bg-emerald-500/10 text-emerald-400':'bg-amber-500/10 text-amber-400'}">${t.status}</span></div>
                                ${t.status==='Allotted'?`<div class="p-2.5 bg-darkBg/60 border border-borderGray rounded-lg font-mono space-y-1 text-[11px]"><p class="text-gray-400">📄 Work Order No: <span class="text-white font-bold">${t.work_order_no}</span></p><p class="text-gray-400">💰 Order Value: <span class="text-green-400 font-bold">₹${Number(t.work_order_amount).toLocaleString()}</span></p><p class="text-gray-400">📅 Scheduled Finish: <span class="text-gray-200">${t.completion_date}</span></p></div>`:''}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div id="t-mod" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50"><div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 text-xs space-y-3 shadow-2xl"><h4 class="font-bold text-white text-xs uppercase border-b border-borderGray pb-1">Register Tender Parameters</h4><form id="t-form" class="space-y-2" onsubmit="executeTenderSubmit(event)"><input type="text" id="t-name" placeholder="Tender Description Name" required class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"><select id="t-status" onchange="toggleTenderWorkOrderFields(this.value)" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-bold"><option value="In Process">In Process</option><option value="Filled">Filled</option><option value="Allotted">Allotted Node Target</option></select><div id="tender-work-order-subform" class="hidden space-y-2 border-t border-borderGray pt-2 mt-2"><input type="text" id="t-wono" placeholder="Work Order ID" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white"><input type="number" id="t-woamt" placeholder="Work Order Valuation (₹)" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-mono"><input type="date" id="t-wocmp" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"><input type="date" id="t-woact" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div><button type="submit" class="w-full bg-blue-600 py-2 rounded text-white font-bold uppercase">Commit Pipeline Vector</button><button type="button" onclick="closeModal('t-mod')" class="w-full bg-gray-850 py-1.5 rounded text-gray-400 border border-borderGray uppercase text-[10px]">❌ Cancel / Back</button></form></div></div>
                `;
            }

            else if (currentTab === "geo-viewer") {
                container.innerHTML = `<div class="space-y-4"><div class="border-b border-borderGray pb-2"><h3 class="text-sm font-bold text-white uppercase tracking-wider">🗺️ Geospatial Viewer Layers</h3></div><div id="vantage-live-map" class="w-full h-[450px] bg-panelBg border border-borderGray rounded-xl shadow-lg"></div></div>`;
                setTimeout(renderLeafletMapLayer, 100);
            }

            else if (currentTab === "staff-tracking") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="border-b border-borderGray pb-2"><h3 class="text-sm font-bold text-white uppercase tracking-wider">📡 Realtime Staff Radar Tracking Layer</h3></div>
                        <div id="vantage-staff-map" class="w-full h-[450px] bg-panelBg border border-borderGray rounded-xl shadow-lg"></div>
                    </div>
                `; setTimeout(renderLeafletRadarLayer, 100);
            }
            
            else {
                // FALLBACK VIEWS
                container.innerHTML = `
                    <div class="bg-panelBg border border-borderGray rounded-xl p-6 space-y-4 shadow-xl">
                        <div class="border-b border-borderGray pb-3 flex justify-between items-center">
                            <h3 class="font-bold text-white uppercase tracking-wider text-xs">✨ Component Module: [${currentTab.toUpperCase().replace('-',' ')}]</h3>
                            <button onclick="openModal('universal-dyn-mod')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded font-sans transition-colors shadow-md">+ Add Log Entry</button>
                        </div>
                        <div class="p-8 bg-darkBg border border-borderGray border-dashed rounded-xl text-center font-mono"><span class="text-blue-400 font-bold block mb-1 uppercase tracking-widest">[ PIPELINE CHANNELS ACTIVE ]</span></div>
                    </div>
                    <div id="universal-dyn-mod" class="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-6 space-y-4 shadow-2xl">
                            <h4 class="font-bold text-white text-xs uppercase tracking-wider">📝 LOG FIELD DATA PACKET</h4>
                            <form id="universal-dyn-form" class="space-y-3" onsubmit="executeUniversalDynamicSubmit(event)">
                                <input type="text" id="dyn-log-desc" required placeholder="Enter logging details..." class="w-full bg-darkBg border border-borderGray p-3 rounded text-white"><input type="number" id="dyn-log-val" placeholder="Valuation sum reference" class="w-full bg-darkBg border border-borderGray p-3 rounded text-white font-mono"><button type="submit" class="w-full bg-blue-600 font-bold py-2.5 rounded uppercase shadow-md">Commit Parameters Matrix</button><button type="button" onclick="closeModal('universal-dyn-mod')" class="w-full bg-gray-800 text-gray-300 font-bold py-2 rounded uppercase border border-borderGray">❌ Close / Back</button>
                            </form>
                        </div>
                    </div>
                `;
            }
        }

        // --- 5. CAMERA FILE CONVERSION INTERFACE ---
        function previewCapturedImage(event) {
            const input = event.target;
            const previewBox = document.getElementById('cam-preview-box');
            const previewImg = document.getElementById('img-preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewBox.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- 6. GEOTAGGED PHOTOGRAPH SYNC SUBMISSION ---
        async function executePhotoVaultSubmit(e) {
            e.preventDefault();
            const projName = document.getElementById('cam-proj').value;
            const imgDataString = document.getElementById('img-preview').src || "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?w=400";
            
            // Fetch live automated hardware location cords on the snapshot fly
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    const payload = [{
                        project_name: projName,
                        timestamp: new Date().toISOString().replace('T',' ').split('.')[0],
                        lat: lat,
                        lng: lng,
                        image_data: imgDataString
                    }];
                    
                    const response = await fetch(`${SUPABASE_REST_URL}/site_photos`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) });
                    if(response.ok) {
                        alert("📸 Success: GPS Geotagged photograph recorded inside central cloud database vault!");
                        closeModal('cam-mod');
                        initializeSecurityGatekeeper();
                    }
                }, (err) => {
                    // Geolocation Blocked Fallback coordinates matching main Udaipur Office points
                    alert("GPS block active. Uploading with Master central grid tags.");
                    const payloadFallback = [{ project_name: projName, timestamp: new Date().toISOString().replace('T',' ').split('.')[0], lat: 24.5854, lng: 73.7125, image_data: imgDataString }];
                    fetch(`${SUPABASE_REST_URL}/site_photos`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payloadFallback) }).then(()=> {
                        closeModal('cam-mod'); initializeSecurityGatekeeper();
                    });
                });
            }
        }

        // --- 7. STRUCTURAL CONTROLLERS DRIVERS ---
        function renderLeafletMapLayer() { let mContainer = document.getElementById('vantage-live-map'); if (!mContainer) return; let mObj = L.map('vantage-live-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mObj); dbProjects.forEach(p => { if (p.lat) L.marker([p.lat, p.lng]).addTo(mObj).bindPopup(`<b>${p.name}</b>`); }); }
        function renderLeafletRadarLayer() { let rContainer = document.getElementById('vantage-staff-map'); if (!rContainer) return; activeMapObj = L.map('vantage-staff-map').setView([24.5854, 73.7125], 9); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(activeMapObj); dbStaff.forEach(s => { if (s.lat) L.marker([s.lat, s.lng]).addTo(activeMapObj).bindPopup(`<b>📡 STAFF: ${s.name}</b>`); }); }
        async function executeProjectSubmit(e) { e.preventDefault(); const payload = [{ name: document.getElementById('p-name').value, client: document.getElementById('p-client').value, location: document.getElementById('p-loc').value, lat: Number(document.getElementById('p-lat').value), lng: Number(document.getElementById('p-lng').value), contract_value: Number(document.getElementById('p-val').value) }]; await fetch(`${SUPABASE_REST_URL}/projects`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('p-mod'); initializeSecurityGatekeeper(); }
        async function executeProjectModifySubmit(e) { e.preventDefault(); const id = document.getElementById('edit-p-id').value; const payload = { name: document.getElementById('edit-p-name').value, client: document.getElementById('edit-p-client').value, location: document.getElementById('edit-p-loc').value, lat: Number(document.getElementById('edit-p-lat').value), lng: Number(document.getElementById('edit-p-lng').value), contract_value: Number(document.getElementById('edit-p-val').value) }; await fetch(`${SUPABASE_REST_URL}/projects?id=eq.${id}`, { method: "PATCH", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('p-edit-mod'); alert("Project fields updated safely!"); initializeSecurityGatekeeper(); }
        async function executeGodownSubmit(e) { e.preventDefault(); const payload = [{ name: document.getElementById('g-name').value.trim(), location: document.getElementById('g-loc').value.trim() }]; await fetch(`${SUPABASE_REST_URL}/godowns`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('g-mod'); initializeSecurityGatekeeper(); }
        async function executeInwardSubmit(e) { e.preventDefault(); const payload = [{ godown_name: document.getElementById('st-godown').value, item: document.getElementById('st-item').value.trim(), qty: Number(document.getElementById('st-qty').value), unit: document.getElementById('st-unit').value.trim() }]; await fetch(`${SUPABASE_REST_URL}/stock_book`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); closeModal('s-mod'); initializeSecurityGatekeeper(); }
        async function executeUniversalDynamicSubmit(e) { e.preventDefault(); const payload = [{ category_node: currentTab, log_description: document.getElementById('dyn-log-desc').value.trim(), metric_value: Number(document.getElementById('dyn-log-val').value || 0), timestamp: new Date().toISOString(), operator_identity: currentUser.name }]; await fetch(`${SUPABASE_REST_URL}/financials`, { method: "POST", headers: cloudHeaders, body: JSON.stringify(payload) }); alert("Record saved!"); closeModal('universal-dyn-mod'); initializeSecurityGatekeeper(); }
        async function deleteRowCloud(table, id) { if(confirm("Are you sure you want to delete this row permanently?")) { const response = await fetch(`${SUPABASE_REST_URL}/${table}?id=eq.${id}`, { method: "DELETE", headers: cloudHeaders }); if(response.ok) { alert("Data lines purged."); initializeSecurityGatekeeper(); } } }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- 8. EXCEL MULTI-ROW MATRIX SHEET ENGINE ---
        function buildExcelRowsMatrixHTML() {
            const body = document.getElementById('excel-rows-body'); if(!body) return;
            body.innerHTML = activeExcelRows.map((row, index) => {
                let len = 0; const cFrom = parseChainage(row.chainageFrom); const cTo = parseChainage(row.chainageTo);
                if (!isNaN(cFrom) && !isNaN(cTo)) { len = Math.abs(cTo - cFrom); }
                let avgW = Number(row.width || 0); if (index > 0) { avgW = (Number(row.width || 0) + Number(activeExcelRows[index - 1].width || 0)) / 2; }
                let yld = 0; const thick = row.thickness ? Number(row.thickness) : 0;
                if (row.formula === 'Multiply') { yld = thick > 0 ? (len * avgW * thick) : (len * avgW); }
                activeExcelRows[index].computedLength = len; activeExcelRows[index].computedAvgWidth = avgW; activeExcelRows[index].yieldResult = yld;
                return `<tr class="hover:bg-panelBg/40 text-center"><td class="p-2 border-r border-borderGray">${index+1}</td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageFrom',this.value)" value="${row.chainageFrom}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-0 border-r border-borderGray"><input type="text" oninput="updateExcelCell(${index},'chainageTo',this.value)" value="${row.chainageTo}" class="w-full bg-transparent text-center focus:outline-none"></td><td class="p-2 border-r border-borderGray font-bold text-gray-400">${len} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'width',this.value)" value="${row.width}" class="w-full bg-transparent text-center font-bold focus:outline-none"></td><td class="p-2 border-r border-borderGray text-orange-400 font-bold">${avgW.toFixed(3)} m</td><td class="p-0 border-r border-borderGray"><input type="number" oninput="updateExcelCell(${index},'thickness',this.value)" value="${row.thickness}" placeholder="[m]" class="w-full bg-transparent text-center focus:outline-none text-emerald-400 font-bold"></td><td class="p-2 text-right text-blue-400 font-bold pr-4">${thick > 0 ? `${yld.toFixed(3)} m³` : `${yld.toFixed(2)} m²`}</td></tr>`;
            }).join('');
        }
        function updateExcelCell(idx, field, val) { activeExcelRows[idx][field] = val; buildExcelRowsMatrixHTML(); }
        function addExcelRow() { const last = activeExcelRows[activeExcelRows.length - 1]; activeExcelRows.push({ chainageFrom: last?last.chainageTo:'0/000', chainageTo: '', width: 7.5, thickness: '', formula: 'Multiply', yieldResult: 0 }); buildExcelRowsMatrixHTML(); }
        function parseChainage(str) { if(!str) return NaN; const c = str.replace('/','.'); const p = c.split('.'); return p.length===2 ? (Number(p[0])*1000)+Number(p[1]) : Number(str); }

        initializeSecurityGatekeeper();
    </script>
</body>
</html>
