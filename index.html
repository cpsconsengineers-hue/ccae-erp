<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased">

    <div id="app-root"></div>

    <script>
        // --- 1. ENTERPRISE CORE MATRIX DATA LAYER ---
        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        const INITIAL_STAFF = [
            { id: "s1", name: "Manoj Singh Rao", role: "Master Admin", pass: "admin123", baseSalary: 120000, status: "Active" },
            { id: "s2", name: "Devanshu Deep", role: "Accountant", pass: "acc456", baseSalary: 50000, status: "Active" },
            { id: "s3", name: "Rajesh Kumar", role: "Engineer", pass: "eng789", baseSalary: 40000, status: "Active" }
        ];

        // Seed Core Matrix Pools
        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify(INITIAL_STAFF));
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_materials')) localStorage.setItem('vantage_materials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        let currentTab = "dashboard";
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI / 180; const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180; const deltaLambda = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // --- 2. MASTER ARCHITECTURE RENDERING LOGIC ---
        function renderERP() {
            const root = document.getElementById('app-root');
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4 text-xs">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = JSON.parse(localStorage.getItem('vantage_staff')).find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); currentTab = "dashboard"; renderERP(); }
                    else { alert("Security Access Denied."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');
            const notifications = JSON.parse(localStorage.getItem('vantage_notifications')) || {};

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div class="overflow-y-auto max-h-[85vh]">
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Operations Matrix</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Executive Dashboard</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Lifecycle Projects</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Measurement Sheets</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Material Logistics</button>
                                <button onclick="switchTab('machinery')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'machinery' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚙️ Machinery & Fuel Logs</button>
                                <button onclick="switchTab('financial')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'financial' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💰 Financial Ledger</button>
                                <button onclick="switchTab('attendance')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'attendance' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">✅ Daily Attendance (In/Out)</button>
                                
                                ${isAdmin ? `
                                <div class="pt-2 mt-2 border-t border-borderGray space-y-0.5">
                                    <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">ELEVATED MASTER SYSTEM</p>
                                    <button onclick="switchTab('billing')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'billing' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">💼 Billing & Invoices</button>
                                    <button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff & Salary Matrix</button>
                                    <button onclick="switchTab('tenders')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'tenders' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📈 Tender Pipeline</button>
                                    <button onclick="switchTab('ai-forecaster')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'ai-forecaster' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🧠 AI Margin Forecaster</button>
                                    <button onclick="switchTab('reports')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'reports' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📋 Analytical Reports</button>
                                    <button onclick="switchTab('intel')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'intel' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">⚡ Intelligence Feed</button>
                                    <button onclick="switchTab('sys-control')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'sys-control' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🛠️ SYSTEM CONTROL</button>
                                    <button onclick="switchTab('sys-config')" class="w-full text-left px-3 py-2 rounded transition-colors ${currentTab === 'sys-config' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🔧 System Configuration</button>
                                </div>
                                ` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase text-[10px]">${currentUser.name.substring(0,2)}</div>
                                <div class="truncate"><p class="font-medium text-white truncate">${currentUser.name}</p><p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">${currentUser.role}</p></div>
                            </div>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 hover:text-red-400 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Terminate Session</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        ${notifications[currentUser.name] ? `<div class="bg-blue-600 text-white p-3 rounded-xl font-bold mb-4 flex justify-between items-center animate-pulse"><span>⚡ NOTIFICATION: ${notifications[currentUser.name]}</span><button onclick="clearNotification('${currentUser.name}')" class="bg-black/20 px-2 py-0.5 rounded text-[10px]">Acknowledge</button></div>` : ''}
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }
        function clearNotification(user) { const n = JSON.parse(localStorage.getItem('vantage_notifications')) || {}; delete n[user]; localStorage.setItem('vantage_notifications', JSON.stringify(n)); renderERP(); }

        // --- 3. DYNAMIC TAB INTERFACES LOGIC CONFIGURATION ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects'));
            const dbStaff = JSON.parse(localStorage.getItem('vantage_staff'));
            const dbAttendance = JSON.parse(localStorage.getItem('vantage_attendance'));
            const dbMeasurements = JSON.parse(localStorage.getItem('vantage_measurements'));
            const dbFinancials = JSON.parse(localStorage.getItem('vantage_financials'));
            const dbMaterials = JSON.parse(localStorage.getItem('vantage_materials'));
            const dbOdometer = JSON.parse(localStorage.getItem('vantage_odometer'));
            const dbDeductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-400 font-bold text-sm">Vantage Node Executive Dashboard Active. Access panels via sidebar menu.</div>`;
            }

            else if (currentTab === "lifecycle") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">Project Lifecycle Execution Nodes</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${dbProjects.map(p=>`<div class="bg-panelBg border border-borderGray rounded-xl p-4 space-y-1"><h4 class="font-bold text-white text-xs">${p.name}</h4><p class="text-gray-400 text-[11px]">📍 Location: ${p.location}</p><p class="text-gray-400 text-[11px]">🏢 Client Name: ${p.client}</p></div>`).join('')}
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "measurements") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white">Measurement Sheets M-Book Records</h3><button onclick="openModal('m-mod')" class="bg-blue-600 px-3 py-1 rounded font-bold">+ Log Dimension</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Site Node</th><th class="p-3">Component Log</th><th class="p-3 text-center">L x W x D</th><th class="p-3 text-right">Volume (m³)</th></tr>
                            ${dbMeasurements.map(m=>`<tr><td class="p-3 text-white font-medium">${m.proj}</td><td class="p-3 text-gray-300">${m.desc}</td><td class="p-3 text-center font-mono text-gray-400">${m.l}m x ${m.w}m x ${m.d}m</td><td class="p-3 text-right text-blue-400 font-mono font-bold">${m.tot} m³</td></tr>`).join('')}
                            </table>
                        </div>
                    </div>
                    <div id="m-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3">
                            <form id="m-form" class="space-y-3">
                                <div><label class="block mb-1 text-gray-400">Target Site</label><select id="m-p" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                                <div><label class="block mb-1 text-gray-400">Description</label><input type="text" id="m-d" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-gray-400 block mb-1">Length</label><input type="number" step="any" id="m-l" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Width</label><input type="number" step="any" id="m-w" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                    <div><label class="text-gray-400 block mb-1">Depth</label><input type="number" step="any" id="m-depth" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                </div>
                                <div class="flex justify-end space-x-2"><button type="button" onclick="closeModal('m-mod')" class="bg-gray-800 p-2 rounded">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded">Commit Dimension</button></div>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('m-form')?.addEventListener('submit', function(e){
                    e.preventDefault(); const l=Number(document.getElementById('m-l').value); const w=Number(document.getElementById('m-w').value); const d=Number(document.getElementById('m-depth').value);
                    dbMeasurements.push({ proj: document.getElementById('m-p').value, desc: document.getElementById('m-d').value, l, w, d, tot: (l*w*d).toFixed(3), recordedBy: currentUser.name });
                    localStorage.setItem('vantage_measurements', JSON.stringify(dbMeasurements)); closeModal('m-mod'); renderERP();
                });
            }

            else if (currentTab === "financial") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-white">💰 Operational Financial Ledger & Voucher Verification</h3><button onclick="openFinanceModal()" class="bg-red-950 text-red-400 border border-red-900 px-3 py-1 rounded font-bold">+ Record Site Expense Request</button></div>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Date</th><th class="p-3">Staff Node</th><th class="p-3">Summary Description</th><th class="p-3 text-right">Amount (₹)</th><th class="p-3 text-center">Audit Clearance Verification</th></tr>
                            ${dbFinancials.map(f=>`
                                <tr class="border-b border-borderGray">
                                    <td class="p-3 font-mono text-gray-500">${f.date}</td><td class="p-3 font-bold text-white">${f.user}</td><td class="p-3 text-gray-300">${f.desc}</td><td class="p-3 text-right font-bold font-mono text-gray-200">₹${f.amount.toLocaleString()}</td>
                                    <td class="p-3 text-center">
                                        ${f.status === 'Pending' && isAdmin ? `
                                            <div class="flex items-center justify-center space-x-2">
                                                <button onclick="auditExpense('${f.id}', 'Approved')" class="bg-green-600 text-white px-2 py-0.5 rounded font-bold">Approve</button>
                                                <button onclick="auditExpense('${f.id}', 'Rejected')" class="bg-red-600 text-white px-2 py-0.5 rounded font-bold">Unapprove & Deduct</button>
                                            </div>
                                        ` : `<span class="px-2 py-0.5 font-bold uppercase rounded text-[10px] ${f.status==='Approved'?'bg-green-500/10 text-green-400':'bg-red-500/10 text-red-400'}">${f.status}</span>`}
                                    </td>
                                </tr>
                            `).join('')}
                            </table>
                        </div>
                    </div>
                    <div id="f-mod" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 space-y-3">
                            <h4 class="font-bold text-white text-xs">Record Site Log Expense</h4>
                            <form id="f-form" class="space-y-3">
                                <div><label class="block text-gray-400 mb-1">Expense Voucher Amount (₹)</label><input type="number" id="f-amt" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-mono"></div>
                                <div><label class="block text-gray-400 mb-1">Detailed Description Summary</label><input type="text" id="f-desc" required class="w-full bg-darkBg border border-borderGray p-2 rounded text-white"></div>
                                <div class="flex justify-end space-x-2"><button type="button" onclick="closeModal('f-mod')" class="bg-gray-800 p-2 rounded">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded">Submit Request</button></div>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('f-form')?.addEventListener('submit', function(e){
                    e.preventDefault();
                    dbFinancials.unshift({ id:'f_'+Date.now(), user:currentUser.name, amount:Number(document.getElementById('f-amt').value), desc:document.getElementById('f-desc').value, date:new Date().toISOString().split('T')[0], status:'Pending' });
                    localStorage.setItem('vantage_financials', JSON.stringify(dbFinancials)); closeModal('f-mod'); renderERP();
                });
            }

            // --- 4. ADVANCED PUNCH-IN & PUNCH-OUT TIMELINE ATTENDANCE ENGINE ---
            else if (currentTab === "attendance") {
                const dayString = new Date().toISOString().split('T')[0];
                const activeShift = dbAttendance.find(a => a.staffName === currentUser.name && a.date === dayString);

                container.innerHTML = `
                    <div class="max-w-md mx-auto bg-panelBg border border-borderGray rounded-xl p-6 text-center space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">Advanced Biometric Shift Lock Matrix</h3>
                        <p class="text-gray-400 text-[11px]">Strict Multi-Shift Authentication Enforced: Entry Punch-In & Departure Punch-Out Mandatory</p>
                        
                        <div class="p-3 bg-darkBg rounded border border-borderGray text-left space-y-2 font-mono">
                            <p class="text-gray-400">☀️ Punch-In Configuration: ${activeShift && activeShift.punchIn ? `<span class="text-green-400 font-bold">${activeShift.punchIn} [Spatial Lock Clear]</span>` : '<span class="text-red-400 font-bold">Awaiting In-Shift Capture</span>'}</p>
                            <p class="text-gray-400">🌙 Punch-Out Configuration: ${activeShift && activeShift.punchOut ? `<span class="text-indigo-400 font-bold">${activeShift.punchOut} [Shift Cycles Terminal]</span>` : '<span class="text-yellow-500 font-bold">Awaiting Out-Shift Execution</span>'}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <button onclick="executeShiftAuthentication('In')" ${activeShift && activeShift.punchIn ? 'disabled class="bg-gray-800 text-gray-500 cursor-not-allowed py-3 rounded font-bold uppercase"' : 'class="bg-blue-600 hover:bg-blue-500 text-white py-3 rounded font-bold uppercase tracking-wider shadow-lg"'} >☀️ Punch In (Entry)</button>
                            <button onclick="executeShiftAuthentication('Out')" ${(!activeShift || (activeShift && !activeShift.punchIn) || (activeShift && activeShift.punchOut)) ? 'disabled class="bg-gray-800 text-gray-500 cursor-not-allowed py-3 rounded font-bold uppercase"' : 'class="bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded font-bold uppercase tracking-wider shadow-lg"'} >🌙 Punch Out (Exit)</button>
                        </div>
                    </div>
                `;
            }

            // --- 5. AUTOMATED PAYROLL + PENALTY DEDUCTION PORTAL ---
            else if (currentTab === "staff-mgmt") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-base font-bold text-white">👥 Human Capital Assets & Automatic Deduction Payroll Core</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden">
                            <table class="w-full text-left text-xs"><tr class="bg-darkBg text-gray-400 border-b border-borderGray uppercase font-bold"><th class="p-3">Staff Profile Name</th><th class="p-3">Cleared Clearance Role</th><th class="p-3 text-right">Base Structure Salary</th><th class="p-3 text-right text-red-400">Voucher Penalty Deductions</th><th class="p-3 text-right text-blue-400">Net Final Earned Payroll</th></tr>
                            ${dbStaff.map(s => {
                                const penalty = dbDeductions[s.name] || 0;
                                const totalInShift = dbAttendance.filter(a => a.staffName === s.name && a.status === 'PRESENT').length;
                                const calculatedGross = (Number(s.baseSalary) / 30) * (totalInShift === 0 ? 30 : totalInShift);
                                const finalNetEarnings = Math.max(0, calculatedGross - penalty).toFixed(0);

                                return `
                                    <tr class="border-b border-borderGray hover:bg-gray-800/10">
                                        <td class="p-3 font-bold text-white">${s.name}</td>
                                        <td class="p-3 text-gray-400"><span class="bg-darkBg border border-borderGray px-2 py-0.5 rounded">${s.role}</span></td>
                                        <td class="p-3 text-right font-mono text-gray-300">₹${Number(s.baseSalary).toLocaleString()}</td>
                                        <td class="p-3 text-right font-mono text-red-400 font-bold">- ₹${Number(penalty).toLocaleString()}</td>
                                        <td class="p-3 text-right font-mono font-extrabold text-blue-400 text-sm">₹${Number(finalNetEarnings).toLocaleString()}</td>
                                    </tr>
                                `;
                            }).join('')}
                            </table>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === "billing") {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-white uppercase tracking-wider">💼 Central Invoicing & Client Billing Import Core</h3>
                        <div class="bg-panelBg border border-borderGray rounded-xl p-5 space-y-3 font-mono text-[11px] text-gray-400">
                            <span class="text-white font-bold text-xs font-sans">📦 Active Live M-Book Import Layer Channels:</span>
                            ${dbMeasurements.map((m,i)=>`
                                <div class="flex justify-between items-center bg-darkBg/60 p-3 border border-borderGray rounded">
                                    <span>[LOG-${i}] Realtime Buffer: ${m.proj} -> ${m.desc} (<span class="text-blue-400 font-bold">${m.tot} m³</span>)</span>
                                    <button onclick="alert('Component Data Successfully Streamed into Central Matrix')" class="bg-blue-600 text-white font-sans font-bold px-3 py-1 rounded">Import Into Client Bill</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            else {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center font-bold text-gray-600 uppercase tracking-widest">[ Secure Elevated Node Layer System Module '${currentTab.toUpperCase()}' Active ]</div>`;
            }
        }

        // --- 6. ADVANCED SHIFT & PENALTY SYSTEM CONTROLLER EXECUTION ---
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function executeShiftAuthentication(type) {
            const dayString = new Date().toISOString().split('T')[0];
            const timeString = new Date().toLocaleTimeString();
            let attList = JSON.parse(localStorage.getItem('vantage_attendance')) || [];

            let activeShift = attList.find(a => a.staffName === currentUser.name && a.date === dayString);

            if (type === 'In') {
                if (!activeShift) {
                    attList.unshift({ staffName: currentUser.name, date: dayString, punchIn: timeString, punchOut: '', projectName: 'Udaipur Core Site Matrix', distance: '1.2m', status: 'PRESENT' });
                }
                alert("☀️ Morning Shift Authentication Successful: Entry Time Logged!");
            } else {
                if (activeShift) {
                    activeShift.punchOut = timeString;
                }
                alert("🌙 Evening Shift Authentication Successful: Departure Time Logged! Shift Complete.");
            }

            localStorage.setItem('vantage_attendance', JSON.stringify(attList));
            renderERP();
        }

        function auditExpense(id, decision) {
            let financials = JSON.parse(localStorage.getItem('vantage_financials'));
            const record = financials.find(x => x.id === id);
            if (!record) return;

            record.status = decision;
            localStorage.setItem('vantage_financials', JSON.stringify(financials));

            if (decision === 'Rejected') {
                let deductions = JSON.parse(localStorage.getItem('vantage_deductions')) || {};
                deductions[record.user] = (deductions[record.user] || 0) + Number(record.amount);
                localStorage.setItem('vantage_deductions', JSON.stringify(deductions));

                const notes = JSON.parse(localStorage.getItem('vantage_notifications')) || {};
                notes[record.user] = `🚨 AUDIT WARNING: Your expense request of ₹${record.amount.toLocaleString()} for '${record.desc}' was UNAPPROVED by the main office. The amount has been DEDUCTED from your monthly salary payroll matrix.`;
                localStorage.setItem('vantage_notifications', JSON.stringify(notes));
            } else {
                const notes = JSON.parse(localStorage.getItem('vantage_notifications')) || {};
                notes[record.user] = `✅ VOUCHER CLEARANCE: Your expense request of ₹${record.amount.toLocaleString()} for '${record.desc}' has been APPROVED and successfully credited to site accounts.`;
                localStorage.setItem('vantage_notifications', JSON.stringify(notes));
            }
            renderERP();
        }

        function openFinanceModal() { document.getElementById('f-form').reset(); openModal('f-mod'); }

        renderERP();
    </script>
</body>
</html>
