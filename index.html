<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Consultants & Engineers - Vantage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0b0f19', panelBg: '#111827', accentBlue: '#3b82f6', borderGray: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased text-xs">

    <div id="app-root"></div>

    <script>
        // --- 1. HARDWARE STORAGE INTERFACE VERSION CONFIG ---
        const currentMatrixVersion = "vantage_v12_supplier_return";
        if (localStorage.getItem('vantage_matrix_version') !== currentMatrixVersion) {
            localStorage.clear();
            localStorage.setItem('vantage_matrix_version', currentMatrixVersion);
        }

        const INITIAL_PROJECTS = [
            { id: "p1", name: "Udaipur City Flyover Survey", client: "Udaipur Authority", location: "Udaipur, RJ", lat: 24.5854, lng: 73.7125, contractValue: 4500000, status: "Active" },
            { id: "p2", name: "Residential Complex Construction", client: "Geeta Sharma Ji", location: "Sarada, Salumber", lat: 24.1234, lng: 73.5678, contractValue: 7500000, status: "Active" }
        ];

        if (!localStorage.getItem('vantage_projects')) localStorage.setItem('vantage_projects', JSON.stringify(INITIAL_PROJECTS));
        if (!localStorage.getItem('vantage_staff')) localStorage.setItem('vantage_staff', JSON.stringify([])); 
        if (!localStorage.getItem('vantage_attendance')) localStorage.setItem('vantage_attendance', JSON.stringify([]));
        if (!localStorage.getItem('vantage_measurements')) localStorage.setItem('vantage_measurements', JSON.stringify([]));
        if (!localStorage.getItem('vantage_financials')) localStorage.setItem('vantage_financials', JSON.stringify([]));
        if (!localStorage.getItem('vantage_odometer')) localStorage.setItem('vantage_odometer', JSON.stringify([]));
        if (!localStorage.getItem('vantage_site_photos')) localStorage.setItem('vantage_site_photos', JSON.stringify([]));
        if (!localStorage.getItem('vantage_notifications')) localStorage.setItem('vantage_notifications', JSON.stringify({}));
        if (!localStorage.getItem('vantage_deductions')) localStorage.setItem('vantage_deductions', JSON.stringify({}));

        // Inventory Stock Database Registry
        if (!localStorage.getItem('vantage_godowns')) localStorage.setItem('vantage_godowns', JSON.stringify([
            { id: "g1", name: "Udaipur Central Godown", location: "Gordhan Vilas, Udaipur" }
        ]));
        if (!localStorage.getItem('vantage_stock_book')) localStorage.setItem('vantage_stock_book', JSON.stringify([
            { godownName: "Udaipur Central Godown", item: "53 Grade Cement", qty: 500, unit: "Bags" },
            { godownName: "Udaipur Central Godown", item: "TMT Steel Bars 12mm", qty: 15, unit: "Tons" }
        ]));
        if (!localStorage.getItem('vantage_dispatches')) localStorage.setItem('vantage_dispatches', JSON.stringify([]));
        if (!localStorage.getItem('vantage_supplier_returns')) localStorage.setItem('vantage_supplier_returns', JSON.stringify([])); // Supplier Return Book

        let currentTab = "materials"; 
        let currentUser = JSON.parse(localStorage.getItem('vantage_current_user')) || null;

        // --- 2. MASTER ENTRY USER REGISTRATION & LOCK KERNEL ---
        function renderERP() {
            const root = document.getElementById('app-root');
            const staffList = JSON.parse(localStorage.getItem('vantage_staff')) || [];
            const hasAdmin = staffList.some(u => u.role === 'Master Admin');

            if (!hasAdmin) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6">
                                <span class="bg-blue-500/10 text-blue-400 font-mono text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-bold">System Initialization</span>
                                <h2 class="text-xl font-bold text-white tracking-wider mt-3">MASTER ADMIN INITIAL SETUP</h2>
                            </div>
                            <form id="setup-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Admin Identity Name ID</label><input type="text" id="setup-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500 font-medium" placeholder="Manoj Singh Rao"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Secret Security Key (Password)</label><input type="password" id="setup-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <div><label class="block text-gray-400 mb-1 font-bold uppercase">Confirm Security Key</label><input type="password" id="setup-confirm" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors shadow-lg">Save Master Credentials</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('setup-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('setup-name').value.trim(); const pass = document.getElementById('setup-pass').value.trim();
                    if(pass !== document.getElementById('setup-confirm').value.trim()) { alert("Error: Security Keys mismatch."); return; }
                    localStorage.setItem('vantage_staff', JSON.stringify([{ id: 's_master', name, role: 'Master Admin', pass, baseSalary: 120000, status: 'Active', allottedWork: 'All Site Nodes' }]));
                    alert("Success: Master profile generated."); renderERP();
                });
                return;
            }

            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-darkBg px-4">
                        <div class="max-w-md w-full bg-panelBg border border-borderGray rounded-xl p-8 shadow-2xl">
                            <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wider">CPS CONSULTANTS & ENGINEERS</h2><p class="text-xs text-gray-400 mt-1">Vantage Secure Cryptographic Portal</p></div>
                            <form id="login-form" class="space-y-4">
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Identity Code ID</label><input type="text" id="login-name" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <div><label class="block text-gray-400 mb-2 font-bold uppercase">Security Key</label><input type="password" id="login-pass" required class="w-full bg-darkBg border border-borderGray rounded p-3 text-white focus:outline-none focus:border-blue-500"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded uppercase tracking-wider transition-colors">Authenticate</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = JSON.parse(localStorage.getItem('vantage_staff')).find(u => u.name.toLowerCase() === document.getElementById('login-name').value.trim().toLowerCase() && u.pass === document.getElementById('login-pass').value.trim());
                    if (user) { currentUser = user; localStorage.setItem('vantage_current_user', JSON.stringify(user)); renderERP(); }
                    else { alert("Verification Mismatch."); }
                });
                return;
            }

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            root.innerHTML = `
                <div class="min-h-screen flex bg-darkBg text-xs">
                    <!-- SIDEBAR -->
                    <aside class="w-64 bg-panelBg border-r border-borderGray flex flex-col justify-between shrink-0">
                        <div>
                            <div class="p-4 border-b border-borderGray"><h1 class="font-bold text-white tracking-wider truncate">CPS CONSULTANTS</h1><p class="text-[10px] text-blue-400 font-bold uppercase">Vantage Core Grid</p></div>
                            <nav class="p-3 space-y-0.5">
                                <button onclick="switchTab('dashboard')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📊 Dashboard Matrix</button>
                                <button onclick="switchTab('materials')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'materials' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📦 Godown & Materials Hub</button>
                                <button onclick="switchTab('measurements')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'measurements' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">📐 Measurement Sheets</button>
                                <button onclick="switchTab('lifecycle')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'lifecycle' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">🏗️ Project Nodes</button>
                                ${isAdmin ? `<button onclick="switchTab('staff-mgmt')" class="w-full text-left px-3 py-2 rounded ${currentTab === 'staff-mgmt' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800'}">👥 Staff Control Matrix</button>` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-borderGray bg-darkBg/40">
                            <p class="text-white font-bold truncate mb-2">👤 ${currentUser.name}</p>
                            <button onclick="logoutSession()" class="w-full bg-gray-800 hover:bg-red-950/40 text-gray-400 py-1.5 rounded font-bold uppercase border border-borderGray text-[10px]">🔒 Logout Node</button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto p-6 bg-darkBg">
                        <div id="tab-content-window"></div>
                    </main>
                </div>
            `;
            renderTabContent();
        }

        function switchTab(t) { currentTab = t; renderERP(); }
        function logoutSession() { currentUser = null; localStorage.removeItem('vantage_current_user'); renderERP(); }

        // --- 3. DYNAMIC INVENTORY & SUPPLIER RETURN INTERFACE PANELS ---
        function renderTabContent() {
            const container = document.getElementById('tab-content-window');
            const dbProjects = JSON.parse(localStorage.getItem('vantage_projects')) || [];
            const dbGodowns = JSON.parse(localStorage.getItem('vantage_godowns')) || [];
            const dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || [];
            const dbDispatches = JSON.parse(localStorage.getItem('vantage_dispatches')) || [];
            const dbReturns = JSON.parse(localStorage.getItem('vantage_supplier_returns')) || [];

            const isAdmin = (currentUser.role === 'Master Admin' || currentUser.role === 'Accountant');

            if (currentTab === "dashboard") {
                container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-8 text-center text-gray-400 font-bold">Vantage Operations Matrix Core Online.</div>`;
            }

            else if (currentTab === "materials") {
                container.innerHTML = `
                    <div class="space-y-6">
                        <!-- CONTROL TRIGGER ROW -->
                        <div class="flex justify-between items-center bg-panelBg border border-borderGray p-4 rounded-xl shadow-lg">
                            <div>
                                <h3 class="text-sm font-bold text-white uppercase tracking-wider">📦 Godown Logistics & Material Ledger Matrix</h3>
                                <p class="text-gray-400 text-[11px] mt-0.5">Control storage profiles, accept bulk freight items, and execute supplier return cycles.</p>
                            </div>
                            <div class="flex space-x-2">
                                ${isAdmin ? `<button onclick="openModal('godown-modal')" class="bg-gray-800 border border-borderGray hover:bg-gray-700 text-white font-bold px-3 py-1.5 rounded">🏢 + Create Godown</button>` : ''}
                                ${isAdmin ? `<button onclick="openModal('stock-modal')" class="bg-emerald-950 border border-emerald-900 text-emerald-400 hover:bg-emerald-900/60 font-bold px-3 py-1.5 rounded">📥 + Stock Inward</button>` : ''}
                                ${isAdmin ? `<button onclick="openSupplierReturnModal()" class="bg-red-950/60 border border-red-900 text-red-400 hover:bg-red-900/50 font-bold px-3 py-1.5 rounded">⏪ - Return Stock to Supplier</button>` : ''}
                                <button onclick="openModal('dispatch-modal')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded shadow-md">🚛 + Dispatch to Site</button>
                            </div>
                        </div>

                        <!-- REPOSITORIES SUMMARY GRID -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 h-fit">
                                <h4 class="font-bold text-white mb-3 uppercase text-[10px] tracking-widest text-gray-400">🏢 Registered Godowns</h4>
                                <div class="space-y-2 max-h-64 overflow-y-auto">
                                    ${dbGodowns.map(g => `<div class="bg-darkBg p-3 border border-borderGray rounded-lg"><p class="text-white font-bold">${g.name}</p><p class="text-gray-400 text-[10px] mt-0.5">📍 ${g.location}</p></div>`).join('')}
                                </div>
                            </div>

                            <div class="bg-panelBg border border-borderGray rounded-xl p-4 lg:col-span-2">
                                <h4 class="font-bold text-white mb-3 uppercase text-[10px] tracking-widest text-gray-400">📋 Godown Live Inventory Stock Book Balance</h4>
                                <div class="overflow-hidden border border-borderGray rounded-xl">
                                    <table class="w-full text-left border-collapse">
                                        <tr class="bg-darkBg text-gray-400 font-bold border-b border-borderGray uppercase"><th class="p-2.5">Storage Godown</th><th class="p-2.5">Material Commodity</th><th class="p-2.5 text-right">Available Balance</th></tr>
                                        ${dbStockBook.length === 0 ? `<tr><td colspan="3" class="p-4 text-center text-gray-500">No stock loaded.</td></tr>` : ''}
                                        ${dbStockBook.map(s => `<tr class="border-b border-borderGray hover:bg-darkBg/40"><td class="p-2.5 text-gray-400 font-medium">${s.godownName}</td><td class="p-2.5 text-white font-bold">${s.item}</td><td class="p-2.5 text-right font-mono font-extrabold text-blue-400">${s.qty} ${s.unit}</td></tr>`).join('')}
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- SITE DISPATCH TRANSIT TABLES -->
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden shadow-xl">
                            <div class="p-3 bg-darkBg/60 border-b border-borderGray font-bold text-gray-400 uppercase tracking-wider">🚛 Active Site Dispatch Transit Pipeline Logs</div>
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 font-bold border-b border-borderGray uppercase"><th class="p-3">Timestamp</th><th class="p-3">Source Godown</th><th class="p-3">Target Project Site</th><th class="p-3">Item Name</th><th class="p-3 text-right">Dispatched Qty</th></tr>
                            ${dbDispatches.length === 0 ? `<tr><td colspan="5" class="p-4 text-center text-gray-500 font-mono">No site dispatches circulating.</td></tr>` : ''}
                            ${dbDispatches.map(d=>`<tr class="border-b border-borderGray font-mono text-[11px]"><td class="p-3 text-gray-500">${d.timestamp}</td><td class="p-3 text-white font-sans">${d.fromGodown}</td><td class="p-3 text-gray-300 font-sans">${d.toSite}</td><td class="p-3 text-gray-400 font-sans font-bold">${d.item}</td><td class="p-3 text-right font-bold text-orange-400">${d.qty} ${d.unit}</td></tr>`).join('')}
                            </table>
                        </div>

                        <!-- ⏪ NEW: HIDDEN CORE SUPPLIER RETURN LEDGER LOGS -->
                        ${isAdmin ? `
                        <div class="bg-panelBg border border-borderGray rounded-xl overflow-hidden shadow-xl border-red-900/30">
                            <div class="p-3 bg-red-950/10 border-b border-borderGray font-bold text-red-400 uppercase tracking-wider">⏪ Permanent Supplier Stock Return Logs (Admin/Accountant Eyes Only)</div>
                            <table class="w-full text-left"><tr class="bg-darkBg text-gray-400 font-bold border-b border-borderGray uppercase"><th class="p-3">Timestamp</th><th class="p-3">Returned From Godown</th><th class="p-3">Material Commodity</th><th class="p-3 text-right">Quantity Sent Back</th><th class="p-3 font-semibold">Return Voucher Remarks</th></tr>
                            ${dbReturns.length === 0 ? `<tr><td colspan="5" class="p-4 text-center text-gray-500 font-mono">No supplier return entries executed in this cycle.</td></tr>` : ''}
                            ${dbReturns.map(r=>`<tr class="border-b border-borderGray font-mono text-[11px] text-red-200/80"><td class="p-3 text-gray-500">${r.timestamp}</td><td class="p-3 font-sans font-medium text-white">${r.godownName}</td><td class="p-3 font-sans text-gray-300 font-bold">${r.item}</td><td class="p-3 text-right font-bold text-red-400">${r.qty} ${r.unit}</td><td class="p-3 font-sans text-gray-400 italic">${r.remarks}</td></tr>`).join('')}
                            </table>
                        </div>
                        ` : ''}
                    </div>

                    <!-- MODAL 1: CREATE GODOWN -->
                    <div id="godown-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 class="text-sm font-bold text-white border-b border-borderGray pb-2">🏢 Register New Storage Godown</h4>
                            <form id="godown-form" class="space-y-3">
                                <div><label class="text-gray-400 block mb-1">Godown Title Name</label><input type="text" id="g-name" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-medium"></div>
                                <div><label class="text-gray-400 block mb-1">Location Address</label><input type="text" id="g-loc" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div class="flex justify-end space-x-2 pt-2"><button type="button" onclick="closeModal('godown-modal')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold">Deploy Godown Node</button></div>
                            </form>
                        </div>
                    </div>

                    <!-- MODAL 2: VENDOR STOCK INWARD -->
                    <div id="stock-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 class="text-sm font-bold text-white border-b border-borderGray pb-2">Inward Procurement Material Freight</h4>
                            <form id="stock-form" class="space-y-3">
                                <div><label class="text-gray-400 block mb-1">Target Storage Godown</label><select id="st-godown" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select></div>
                                <div><label class="text-gray-400 block mb-1">Material Item Name</label><input type="text" id="st-item" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="text-gray-400 block mb-1">Quantity</label><input type="number" id="st-qty" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-mono"></div>
                                    <div><label class="text-gray-400 block mb-1">Unit</label><input type="text" id="st-unit" placeholder="Bags/Tons/Cum" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white"></div>
                                </div>
                                <div class="flex justify-end space-x-2 pt-2"><button type="button" onclick="closeModal('stock-modal')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button><button type="submit" class="bg-emerald-600 p-2 rounded text-white font-bold">Commit Inward</button></div>
                            </form>
                        </div>
                    </div>

                    <!-- MODAL 3: DISPATCH MATERIAL TO SITE -->
                    <div id="dispatch-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4">
                            <h4 class="text-sm font-bold text-white border-b border-borderGray pb-2">🚛 Initialize Materials Dispatch Shipment</h4>
                            <form id="disp-form" class="space-y-3">
                                <div><label class="text-gray-400 block mb-1">Source Godown Node</label><select id="ds-from" onchange="populateLogisticsDropdown('ds-from', 'ds-item')" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select></div>
                                <div><label class="text-gray-400 block mb-1">Select Stock Commodity</label><select id="ds-item" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold"></select></div>
                                <div><label class="text-gray-400 block mb-1">Transit Qty</label><input type="number" id="ds-qty" required class="w-full bg-darkBg border border-borderGray rounded p-2 text-white font-mono"></div>
                                <div><label class="text-gray-400 block mb-1">Target Destination Project Node</label><select id="ds-to" class="w-full bg-darkBg border border-borderGray p-2 rounded text-white font-semibold">${dbProjects.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
                                <div class="flex justify-end space-x-2 pt-2"><button type="button" onclick="closeModal('dispatch-modal')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel</button><button type="submit" class="bg-blue-600 p-2 rounded text-white font-bold">Execute Dispatch</button></div>
                            </form>
                        </div>
                    </div>

                    <!-- ⏪ NEW MODAL 4: RETURN MATERIAL TO SUPPLIER (STRICT ELEVATED SECURITY ACTION) -->
                    <div id="return-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
                        <div class="bg-panelBg border border-borderGray max-w-sm w-full rounded-xl p-5 text-xs space-y-4 border-red-900/50">
                            <h4 class="text-sm font-bold text-red-400 border-b border-borderGray pb-2">⏪ Return Active Stock Parameters to Supplier Node</h4>
                            <form id="return-form" class="space-y-3 text-xs">
                                <div><label class="text-gray-400 block mb-1 font-bold">Select Source Godown Yard</label><select id="ret-from" onchange="populateLogisticsDropdown('ret-from', 'ret-item')" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-semibold">${dbGodowns.map(g=>`<option value="${g.name}">${g.name}</option>`).join('')}</select></div>
                                <div><label class="text-gray-400 block mb-1 font-bold">Select Material Item to Reject</label><select id="ret-item" class="w-full bg-darkBg border border-borderGray p-2.5 rounded text-white font-semibold"></select></div>
                                <div><label class="text-gray-400 block mb-1 font-bold">Quantity to Send Back</label><input type="number" id="ret-qty" required class="w-full bg-darkBg border border-borderGray rounded p-2.5 text-white font-mono font-bold focus:border-red-500 focus:outline-none"></div>
                                <div><label class="text-gray-400 block mb-1 font-bold">Reason/Voucher Remarks for Return</label><input type="text" id="ret-remarks" placeholder="e.g. Expired batch or Damaged during unloading..." required class="w-full bg-darkBg border border-borderGray rounded p-2.5 text-white focus:border-red-500 focus:outline-none"></div>
                                <div class="flex justify-end space-x-2 pt-2">
                                    <button type="button" onclick="closeModal('return-modal')" class="bg-gray-800 p-2 rounded text-gray-300">Cancel Execution</button>
                                    <button type="submit" class="bg-red-600 hover:bg-red-500 text-white font-bold p-2 rounded uppercase">Approve Supplier Return</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
                populateLogisticsDropdown('ds-from', 'ds-item');
            }

            else if (currentTab === "measurements") { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-5 text-center text-gray-400">[ M-Book Core Spreadsheet Active ]</div>`; }
            else if (currentTab === "lifecycle") { container.innerHTML = `<div class="bg-panelBg border border-borderGray rounded-xl p-5 text-center text-gray-400">[ Site Profiles Active ]</div>`; }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function openSupplierReturnModal() {
            openModal('return-modal');
            populateLogisticsDropdown('ret-from', 'ret-item');
        }

        // Dropdown Auto-Populator Subsystem
        function populateLogisticsDropdown(sourceId, targetId) {
            const sourceElement = document.getElementById(sourceId);
            const targetElement = document.getElementById(targetId);
            if(!sourceElement || !targetElement) return;

            const selectedGodown = sourceElement.value;
            const dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || [];
            const items = dbStockBook.filter(x => x.godownName === selectedGodown);

            targetElement.innerHTML = items.map(x => `<option value="${x.item}">${x.item} (Avail: ${x.qty} ${x.unit})</option>`).join('');
        }

        // Unified Inward Submit Interceptor Controller
        document.body.addEventListener('submit', function(e) {
            if (e.target.id === 'godown-form') {
                e.preventDefault(); const dbGodowns = JSON.parse(localStorage.getItem('vantage_godowns')) || [];
                dbGodowns.push({ id: 'g_'+Date.now(), name: document.getElementById('g-name').value.trim(), location: document.getElementById('g-loc').value.trim() });
                localStorage.setItem('vantage_godowns', JSON.stringify(dbGodowns)); closeModal('godown-modal'); renderERP();
            }
            if (e.target.id === 'stock-form') {
                e.preventDefault(); const godownName = document.getElementById('st-godown').value; const item = document.getElementById('st-item').value.trim(); const qty = Number(document.getElementById('st-qty').value); const unit = document.getElementById('st-unit').value.trim();
                let dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || []; const existing = dbStockBook.find(x => x.godownName === godownName && x.item.toLowerCase() === item.toLowerCase());
                if (existing) { existing.qty += qty; } else { dbStockBook.push({ godownName, item, qty, unit }); }
                localStorage.setItem('vantage_stock_book', JSON.stringify(dbStockBook)); closeModal('stock-modal'); renderERP();
            }
            if (e.target.id === 'disp-form') {
                e.preventDefault(); const fromGodown = document.getElementById('ds-from').value; const item = document.getElementById('ds-item').value; const qty = Number(document.getElementById('ds-qty').value); const toSite = document.getElementById('ds-to').value;
                let dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || []; const stockItem = dbStockBook.find(x => x.godownName === fromGodown && x.item === item);
                if (!stockItem || stockItem.qty < qty) { alert("Error: Insufficient stock matrix balance!"); return; }
                stockItem.qty -= qty; localStorage.setItem('vantage_stock_book', JSON.stringify(dbStockBook));
                let dbDispatches = JSON.parse(localStorage.getItem('vantage_dispatches')) || []; dbDispatches.unshift({ id: 'disp_'+Date.now(), fromGodown, toSite, item, qty, unit: stockItem.unit, timestamp: new Date().toLocaleString() });
                localStorage.setItem('vantage_dispatches', JSON.stringify(dbDispatches)); closeModal('dispatch-modal'); renderERP();
            }

            // --- ⏪ NEW: EXPLICIT SUPPLIER MATERIAL RETURN INTERCEPTOR MATH ENGINE ---
            if (e.target.id === 'return-form') {
                e.preventDefault();
                const godownName = document.getElementById('ret-from').value;
                const item = document.getElementById('ret-item').value;
                const qty = Number(document.getElementById('ret-qty').value);
                const remarks = document.getElementById('ret-remarks').value.trim();

                let dbStockBook = JSON.parse(localStorage.getItem('vantage_stock_book')) || [];
                const stockItem = dbStockBook.find(x => x.godownName === godownName && x.item === item);

                if (!stockItem || stockItem.qty < qty) {
                    alert(`Logistical Rejection Error: Cannot return ${qty} units. Only ${stockItem ? stockItem.qty : 0} units left in ${godownName}!`);
                    return;
                }

                // Strictly deduct structural stock from registry balance
                stockItem.qty -= qty;
                localStorage.setItem('vantage_stock_book', JSON.stringify(dbStockBook));

                // Commit parameters into historical return book logs ledger
                let dbReturns = JSON.parse(localStorage.getItem('vantage_supplier_returns')) || [];
                dbReturns.unshift({
                    id: 'ret_' + Date.now(),
                    godownName, item, qty, unit: stockItem.unit, remarks,
                    timestamp: new Date().toLocaleString()
                });
                localStorage.setItem('vantage_supplier_returns', JSON.stringify(dbReturns));

                alert(`Success Vector Locked: ${qty} ${stockItem.unit} of '${item}' safely purged and dispatched back to Supplier ledger profile.`);
                closeModal('return-modal');
                renderERP();
            }
        });

        renderERP();
    </script>
</body>
</html>
